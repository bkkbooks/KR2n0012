body:
  text: 集古録卷十宋歐陽修撰瘞鶴銘嵗月未詳瘞鶴銘黃庭遺教經雖傳自晉而公疑唐人所書故附此右瘞鶴銘題云華陽真逸撰刻於焦山之足常為江水所沒好事者伺水落時模而傳之往往秪得其數字云鶴夀不知其幾而已世以其難得尤以為竒惟余所得六百餘字獨為多也按潤州圖經以為王羲之書字亦竒特然不類羲之筆法而類顔魯公不知何人書也華陽真逸是顧况道號今不敢遂以為况者碑無年月不知何時疑前後有人同斯號者也右集本又右在焦山之足常為江水所沒好事者伺水落時模而傳之往往秪得其數字云鶴夀不知其幾而止世以其難得尤以為竒惟余所得獨若此之多也潤州圖經以為王羲之書字亦竒放然不類羲之筆法而類顔魯公不知何人書也或云華陽真逸是顧况道號銘其所作也右真蹟黃庭經永和十二年右黃庭經一篇晉永和中刻石世傳王羲之書書雖可喜而筆法非羲之所為黃庭經者魏晉時道士養生之書也今道藏别有三十六章者名曰內景而謂此一篇為外景又分為上中下三部者皆非也蓋內景者乃此一篇之義疏爾流俗又有一篇名曰中景者尤為繁雜鄙俚之所傳也余嘗患世人不識其真多以內景三十六章為本經因取永和刻石一篇為之注解余非學異說者哀世人之惑於繆妄爾右真蹟又今道藏别有三十六章曰黃庭內景而謂此一篇者為外景又有分為上中下三部者流俗所行又别有中景者皆非也所謂內景者乃此經之義疏爾中景一篇尤為繁雜蓋妄人之所作也此本晉永和中刻石文字時亦脫繆然比今世俗所傳頗為精也右見綿本拾遺又右黃庭别本一作刻續得之京師書肆不知此石刻在何處其字畫頗類顔魯公甚可愛而不完更俟求訪以足之治平丁未閏月三日書右見綿本拾遺又右黃庭經二篇皆不著書人姓名余初得後本已愛其字不俗遂録之既而又得前本於殿中丞裴造造好古君子也自言家藏此本數世矣與其藏于家不若附見余之集録可以傳之不朽也余因以舊本較其優劣而竝存之使覽者得以自擇焉世傳王羲之嘗寫黃庭經此豈其遺法歟右集本遺教經右遺教經相傳云羲之書僞也蓋唐世寫經手所書集本有爾字唐時佛書今在者大抵書體皆類此第其精粗不同爾近有得唐人所書經題其一云薛稷一云僧行敦書者皆與二人他所書不類而與此頗同即知寫經手所書也然其字亦可愛故録之蓋今士大夫筆畫能髣佛乎此者鮮矣右真蹟小字道德經開元二十七年右小字八分道德經不著書人名氏亦不知其所自來或云在明州其石今亡矣問今藏書之家皆云未嘗見也其字畫精妙見者多疑為明皇書而知非者以其集本有者字但題御注而不云御書也右真蹟唐人臨帖右唐人所臨諸家法帖一卷其前數帖類真卿所書蓋其筆畫精徑他人未易臻此按唐書言禇無量嘗請以當時所藏竒書名畫命宰相以下跋尾而𤣥宗不許此乃有宋璟等列名于後又頗多訛繆豈後人妄增加之也然要為可玩何必窮較其真僞今流俗所傳鍾王遺迹多不同然時時各有所得故雖小小轉寫失真不害為佳物由是悉取前後所得諸家法帖分入集録蓋以資博覽云右集本小字法帖此下皆跋法帖蓋模本也故類於唐人臨帖之後右小字法帖者近時有尚書郎潘師旦者以官法帖私自模刻于家為别本以行於世余因分以為類散入集録諸袟而程邈衛夫人鍾繇王廙宋儋皆以小字為一類於此余嘗辨鍾繇賀捷表為非真而此帖字畫筆法皆不同傳模不能不失本體以此真僞尤為難辨也治平元年七月三十日書右真蹟又近時有尚書郎潘師旦者竊取官法帖中數十帖别自刻石以遺人而傳寫字多轉失然亦時有可佳者因又擇其可録者分為十餘卷以入集目聊為一時之玩爾其小字尤精故録於此右集本十八家法帖右世傳十八帖者實二十五帖蓋書有十八家爾而流俗又自集本無此字有羲之十八帖然皆出於官法帖也太宗皇帝時嘗遣使者天下購募前賢真蹟集以為法帖十卷鏤板而藏之每有大臣進登二府者則賜以一本其後不賜或傳板本在御書院往時禁中火灾板被焚遂不復賜或云板今在但不賜爾故人間尤以官法帖為難得此十八家者蓋官法帖之尤精者也余得自薛公期云是家藏舊本頗真今世人所有皆轉相傳模者也右真蹟雜法帖六嚮於薛十三處得法帖一部闕其第一久而始獲南朝諸帝筆法雖不同大率意思不逺眇然都不復有豪氣但清婉若可佳耳二學書不必憊精疲神於筆硯多閲古人遺跡求其用意所得宜多三羲獻世以書自名而筆法相去逺甚父子之間不同如此然皆有足喜也四吾有集古録一千卷晚又得此法帖歸老之計足矣寓心於此其樂何涯嘉祐壬寅大雩攝事致齊間題五古今事異一時人語亦多不同傳模之際又多轉失時有難識處惟當以意求之爾嘉祐七年大饗明堂致齊于中書東閣偶題六老年病目不能讀書又艱於執筆惟此與集古録可以把玩而不欲屢閲者留為歸潁銷日之樂也蓋物維不足然後其樂無窮使其力至於勞則有時而厭爾然內樂猶有待於外物則退之所謂著山林與著城廓何異宜為有道者所笑也熙寧辛亥清心堂書右見綿本别集二十三卷懷州孔子廟記後魏太和中誤置于此右宣尼廟記文辭事實皆不足采其書亦非佳獨其字畫多異故特録之以備博覽右見綿本拾遺景福遺文余在夷陵時得之民家見當時縣有驅使官衙直典然云米一作來不缺者莫詳其語嘉祐七年五月二十六日右見綿本别集二十三卷浮槎寺八紀詩右浮槎寺八紀詩者自云鴈門釋僧皎字廣明作集本無此字詩雖非工而所載事蹟皆圖經所無可以資博覽浮槎山在今廬州慎縣其上有泉其味與無錫惠山水相上下而鴻漸茶經及張又新等水記皆不載嘉祐中李留後端願守廬州以其水遺余因為之記其事余甚愛山水而浮槎水特佳頗怪前世遺而不録及得僧皎紀浮槎八事亦無之乃知物之晦顯有時也治平元年七月三十日書右真蹟福州永泰縣無名篆右在福州永泰縣觀音院後山上世俗多傳以為仙篆太常博士黃孝立閩人也嘗為余言其山無名上多頑石無復鐫刻之蹟如人以手指畫泥而成文文隨圓石之形環布之如車輪循環莫知其首尾又言孝立嘗至廣州見南蕃人以夷法事天日夕焚香拜金書字號為天篆者正類此然不能曉也今人亦有以道家之言譯之者曰勤道守三一中有不死術亦莫知其是非也右真蹟又右在福州永泰縣觀音院後山上太常博士黃孝立閩人也為余說曰山無名而甚高峻石皆頑無復鐫刻之迹如人以手指畫泥而成文文隨圓石之形環布之又曰孝立嘗至廣州見南蕃人以夷法事天日夕拜金書字圖號天篆者視其字與此篆正同然不能考也今世人亦有以道家之言譯之者曰勤道守三一中有不死術亦莫得而詳焉右集本謝仙火右謝仙火字在今嶽州華容縣廢玉真宫柱上倒書而刻之不知何人書也傳云大中祥符中玉真宫為天火所焚惟留一柱有此字好事者遂模于石慶厯中衡山女子號何仙姑者絶粒輕身人皆以為仙也有以此字問之者輒曰謝仙者靁部中鬼也夫婦皆長三尺其色如玉掌行火於世間後有聞其說者於道藏中檢之云實有謝仙名字主行火而餘說則無之由是益以仙姑為真仙矣近見衡州奏云仙姑死矣都無神異客有自衡來者云仙姑晚年羸瘦面皮皺黑第一衰媪也嚮時蘇州有一丐者臥道中相傳云是得仙者也自天聖中余已聞之後二十餘年尚在其人姓沈舉世皆傳為沈臥仙云臥而飲食不漏州縣吏屢使人監守或潜伺察之皆實臥而不起亦不漏遂相傳以為神既而亦以病死雖素信惑其事喜為之稱說者亦不云死時有異也斯二人者皆今世人以為仙者如此故并載之右集本張龍公碑乾寧元年右張龍公碑趙耕撰云君諱路斯潁上百社人也隋初明經登第景龍中為宣城令夫人關州石氏生九子公罷令歸每夕出自戌至丑歸常體冷且濕石氏異而詢之公曰吾龍也蓼人鄭祥逺亦龍也騎白牛據吾池自謂鄭公池吾屢與戰未勝明日取決可令吾子挾弓矢射之繫鬛以青綃者鄭也絳綃者吾也子遂射中青綃鄭怒東北去投合肥西山死今龍穴山是也由是公與九子俱復為龍亦可謂怪矣余嘗以事至百社村過其祠下見其林樹隂蔚池水窈然誠異物之所託嵗時禱雨屢獲其應汝隂人尤以為神也右集本又龍公之事怪哉余嘗以事至百社村過其祠下見其林樹隂蔚池水窈然誠異物之所託嵗時禱雨屢獲其應汝隂人尤以為神也右真蹟周伯著碑右周伯著碑者在今宿州出於近嵗蓋官部春夫開汴渠於泥沙中掘得之其文字古怪而磨滅無首尾了不可讀伯著不知為何人其僅可見者云渤海君𤣥孫季景長子也其事蹟不可考文辭莫曉而字書不工徒以其古怪而録之此誠好古之弊也治平元年七月三十日書右真蹟衛秀書梁思楚碑上元元年秀筆工之善模者也其自謂集書信矣無足多取也書譬君子皆學乎聖人而其所施為未必同也右集本裴夫人志天寶四年右裴夫人志辭翰瀟灑固多清思惜乎不見其名氏石在長安之萬年矮槐文亦佳在亳州法相寺二者皆後得故續附于此熙寧二年六月二十有八日青州山齊書右見綿本拾遺五代時人署字右五代時帝王將相等署字合一卷前人遺蹟往往因人家告身莊宅劵契故後世傳之猶在此署字乃北京人家好事者類而模傳之爾右集本楊凝式題名李西臺詩附右楊凝式題名并李西臺詩附自唐亡道喪四海困於兵戈及聖宋興天下復歸于治蓋百有五十餘年而五代之際有楊少師建隆以集本作已後稱李西臺二人者筆法不同而書名皆為一時之絶故竝録于此右真蹟徐鉉雙溪院記右雙溪院記徐鉉書鉉與其弟鍇皆能八分小篆而筆法頗少力其在江南皆以文翰知名號二徐為學者所宗蓋五代干戈之亂儒學道喪而二君能自奮然為當時名臣而中國既苦於兵四方僣僞割裂皆褊迫擾攘不暇獨江南粗有文物而二君者優遊其間及宋興違命侯來朝二徐得為王臣中朝人士皆傾慕其風采蓋亦有以過人者故特録其書爾若小篆則與鉉同時有王文秉者其筆甚精徑然其人無足稱二字集本作所聞也治平元年上元日書右真蹟王文秉小篆千字文紫陽石磬銘附右小篆千字文者江南人王文秉書其後題云大唐庚申嵗者建隆元年也僞唐李煜自周師取淮南畫江為界以稱臣遂削去年號奉周正朔然世宗特許其稱帝故文秉猶稱唐而不書年號直云庚申嵗也文秉在江南篆書逺過徐鉉而鉉以文學名重當時文秉人罕知者學者皆云鉉筆雖未工而有字學一㸃一畫皆有法也文秉所書獨余集録屢得之此本得於太學楊南仲紫陽石磬銘者張獻撰亦文秉書也右集本王文秉紫陽石磬銘右紫陽石磬銘余獨録於此而不附他書者文秉之書罕見於今也小篆自李陽冰後未見工者文秉江南人其字畫之精逺過徐鉉而中朝之士不知文秉但稱徐常侍者鉉以文章有重名於當時故也嵗在辛酉晉天福六年李忭之升元五年也五代干戈之際士之藝有至於斯者太平之世學者可不勉哉右見綿本拾遺郭忠恕小字說文字源右小字說文字源郭忠恕書忠恕者集本有五代漢周之際為湘隂公從事十二字及事皇朝其事見實録頗竒怪世人但知小篆而不知其楷法尤精然其楷字亦不見刻石者蓋惟有此耳故尤可惜也五代干戈之際學校廢是謂集本作為君子道消之時然猶有如忠恕者國家為國百年天下無事儒學盛矣獨於字書忽廢幾於中絶今求如忠恕小楷不可得也故余每與君謨歎息於此也石在徐州集本無此四字嘉祐八年十二月二十日書右真蹟郭忠恕書隂符經右隂符經郭忠恕書篆法自唐李陽冰後未有臻於斯者近時頗有學者曽未得其髣佛也實録言忠恕死時甚怪豈亦異人乎其楷書尤精也嘉祐六年九月十五日宴後歇泊假閒覽因題右真蹟太清石集本作西闕題名余自至亳始得悉閲太清之碑其佳者皆集本作悉已入余集古録矣乃知余之集録所得多矣惟兩石闕題名集本無二字未有今集本無此字續録于此熙寧元年二月十九日書右真蹟太清東闕題名熙寧元年二月十八日余率僚屬謁太清諸殿裴回兩闕之下周視八檜之異窺九井禹步之竒酌其水以烹茶而歸十九日書右見綿本拾遺賽陽山文太和九年誤置于此右跋尾者六人皆知名士也時余在翰林以孟饗致齊唐書局中六人者相與飲奕歡然終日而去蓋一時之盛集也明年夏鄰幾聖俞卒又九年而原甫長文卒自嘉祐己亥至今熙寧辛亥一紀之間亡者四存者三而擇之遭酷吏以罪廢景仁亦以言事得罪獨余頑然䝉上保全貪冒寵榮不知休止然筋骸憊矣尚此勉强而交遊零落無復情悰其盛衰之際可以悲夫是時同修書者七人今亡者五宋子京王景彞呂縉叔劉仲更與聖俞也存者二余與次道爾次道去年為知制誥亦以封還李定詞頭奪職因感夫存亡今昔之可歎也遂并書之熙寧四年三月十五日病告中書右見綿本拾遺瘞鶴銘元第八十八竒特一作放黃庭經元第二百四十又元題作續跋又三日一作二十日又姓名一作名氏已愛其字一作愛其字盡此本一無此二字余因一無余字較其一無其字擇焉一作之庭經一無經字治平元年十月十三日致齊東閣書一有此十四字遺教經元第二百六十三可愛二字上有自字小字道德經元第九百二十二至九百二十五唐人臨帖元第七百八十真卿二字上一有顔字乃有一作安得然時時三字一作然時博覽六此下一有此本得於李丕紱少卿治平元年夏至日書十七字小字法帖元第七百二十九官法帖此下一有本字又元第七百七十三於此一作于此十八家法帖元第四百二十集以一無以字進登一作登進雜法帖六元無卷第五時有二字上一有以字六則有時而厭五字一作時則有厭懷州孔子廟記元第二百八十五記一作碑景福遺文元無卷第米不一作采不浮槎寺八紀詩元第七百五十三紀浮槎八事一作記浮槎八紀事無名篆元第一百八十七環布之三字一作旋布又此篆一無篆字謝仙火元第二百六十六傳云一作傳者云絶粒二字上一有能字世間一作人間而餘一作而其餘死矣二字上一有已字客有至衰媪一無此二十一字縣吏一作官實臥二字上一有云字并載一無并字治平元年上元日書一有此八字張龍公碑元第二百五周伯著碑元第七百缺十九渤碑作渤而録一無而字梁思楚碑元第一百七十五裴夫人志元附一百八亦佳一作亦可佳五代時人署字元第七百三十楊凝式題名元第八百一十四雙溪院記元第二百六十九皆能一無皆字及宋一無及字其筆一無其字小篆千字文元第五百二十六紫陽至書也一無此十三字治平元年四月九日書一有此九字紫陽石磬銘元附五百二十六小字說文字源元第一百八十四但知此下一有其字郭忠恕書隂符經元第五百八十八太清西闕題名元第五百二十三太清東闕題名元第五百二十二賽陽山文元第五百四十三得罪此下一有致社二字翰林學士吳奎知制誥劉敞祠部郎中集賢校理江休復工部員外郎直集賢院祖無擇屯田員外郎編修唐書梅堯臣嘉祐四年四月六日於編修院同觀范鎮景仁後至後見真蹟題此六人官職姓名集古碑千卷每卷碑在前跋在後銜幅用公名印其外褾以緗紙束以縹帶題其㡨曰每碑卷第幾皆公親蹟至今猶有存者按公嘗自云四百餘篇有跋今世所傳本是也其間如唐鄭權碑乃熙寧辛亥嵗跋又至明年正月方跋鄧艾碑李德裕山居詩四月題前漢鴈足鐙銘後數月而公薨殆集録之絶筆也方嵩卿裒聚真蹟刻板廬陵得二百四十餘篇以校集本頗有異同疑真蹟一時所書集本後或改定今於逐篇各注何本若異同不多則以真蹟為主而以集本所改注其下或繁簡遼絶則兩存之謂如後漢樊常侍碑真蹟作永夀四年四月而集本改作二月訪得古碑二月為是至於以始元為漢宣帝年號又稱後周大統十六年唐大足二年之類乃公一時筆誤不敢有所更改集古跋既刻成方得公子叔弼目録二十卷具列碑之嵗月雖朝代僅差一二而紀年先後頗有倒置已具注其下集古録卷十
