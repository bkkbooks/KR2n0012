body:
  text: 集古録卷四宋歐陽修撰魏受禪碑歲月見本文右魏受禪碑世傳為梁鵠書而顔眞卿又以為鍾繇書莫知孰是按漢獻帝紀延康元年十月乙夘皇帝遜位魏王稱天子又集本無此字按魏志是歲十一月葬士卒死亡者猶稱集本有王字令是月丙午集本作寅漢帝使張愔奉璽綬庚午王升壇受禪又是月癸酉奉漢帝為山陽公而此碑云十月辛未受禪於漢三家之説皆不同今據裴松之注魏志備列漢魏禪代詔冊書令羣臣奏議甚詳葢漢實以十月乙夘策詔魏王使張愔奉璽綬而魏王辭讓往返三四而後受也又據侍中劉廙奏問太史令許芝今月十七日己未可治壇場又據尚書令桓階等奏云輙下太史令擇元辰今月二十九日可登壇受命葢自十七日己未至二十九日正得辛未以此推之漢魏二紀皆繆而獨此碑為是也漢紀乙夘遜位者書其初命而畧其辭讓往返遂失其實爾魏志十一月癸夘猶稱令者當是十月衍一字爾丙午張愔奉璽綬者辭讓往反容集本作殆有之也惟庚午升壇最為繆爾癸夘去癸酉三十一日不得同為十一月此尤繆也禪代大事也而二紀所書如此則史官之失以惑後世者可勝道哉嘉祐八年九月十七日書右眞蹟魏公卿上尊號表黄初元年右魏公卿上尊號表唐賢多傳為梁鵠書今人或謂非鵠也乃鍾繇書爾未知孰是也嗚呼漢魏之事讀其書者可為之流涕也其鉅碑偉字其意惟恐傳之不逺也豈以後世為可欺歟不然不知恥者無所不為乎右眞蹟魏鍾繇表歲月見本文右鍾繇法帖一字集本作表者曹公破闗侯賀捷表也其後書云建安二十四年閏月九日南蕃東武亭侯鍾繇上集賢校理孫思恭精於歴學余問孫君建安二十四年閏在何月思恭為余以漢家所用四分乾象歴推之是歲己亥二歴皆閏十月而陳壽三國志所書時月雖為簡畧然以思恭言考之則合按魏志是歲冬十月軍還洛陽其下遂書孫權請討闗公自効於呉志則書閏月權討公以魏呉二志參較是閏十月矣呉志又書十二月權獲公及其子平魏志明年正月乃書權傳公首至洛陽葢二志相符乃權以閏十月方征荆至十二月獲之明年正月始傳首至洛原本有陽字理可不疑然則鍾繇安得於閏十月先賀㨗也由是此表可疑為非眞而今世盛行復有両本字大小不同小字差類繇書然不知其果是否姑並存之以俟識者治平元年七月二十六日書右眞蹟又集本右魏鍾繇書其辭云戎路兼行履險冐寒因述曹仁徐晃破闗公事其後題云建安二十四年閏月九日南蕃東武亭侯臣繇上按建安二十四年冬曹公軍於摩陂而仁等破公後未嘗出征履險冐寒之役又古人牋啓不書年此二事可疑又云公已被手刃據三國志公圍曹仁於樊為仁所敗而走後為孫權兵斬於沮與此帖不同魏劉熹學生冢碑歲月未詳右魏劉熹學生冢碑在襄州穀城縣界中余為乾德令時嘗以公事過穀城見數荒冢在草間傍有古碑傾側半埋土中問其村人為何人冢皆不能道而碑文磨滅不暇讀而去後數年在河北始集録古文思嚮所見穀城碑疑為漢碑求之又數年乃獲按襄州圖經云學生冢在縣東北水經注云魏濟南劉熹字德怡博學好古立碑載生徒百餘人其不終業而卒者葬于集本作於此號學生冢今碑雖殘缺而熹與生徒名字往往尚可見葢余昔所見乃學生冢而碑魏時碑也熹穀城令也治平元年正月十日書右眞蹟魏賈逵碑歲月未詳右魏賈逵碑魏志逵傳云逵為絳邑長為賊郭援所攻絳人與援約不害逵乃降而援欲以逵為將怒逵不肯叩頭欲殺之絳人乘城呼曰負集本作若要殺我賢君寧俱死援義之遂不殺又按裴松之注引魏畧云援捕得逵怒不肯拜促斬之諸將覆䕶囚於壺闗土窖中守者祝公道釋其械而逸之集本有已字與魏志不同而此碑但云為援所執臨以白刃不屈而已不載絳人約援事如傳所載不獨逵有德於絳人而絳人臨危能與逵生死亦可謂賢矣自古碑碣稱述功德常患過實如逵與絳人德義集本有俱隆字碑不應畧而不著頗疑陳壽作傳集本無此二字好竒而所得非實也松之又注魏書逵年五十五而碑云五十有四亦當以碑為正嘉祐八年十一月十四日書右眞蹟魏鄧艾碑歲月未詳右鄧艾碑考其事蹟終始即魏集本無此字鄧艾碑也艾嘗為兖州刺史據碑云晉初嘗發兖州兵討叛羌艾降巫者傳言授以用兵之法因以破羌兖人神之遂為艾立廟建碑紀其事艾於三國時為名將嘗有大功其姓名聞於世甚顯史與兖人皆不應誤而艾乂三名不同如此此君子所以慎於傳疑也余謂古人艾乂常通用漢書曰黎民艾安與懲艾創艾注皆讀為乂豈非鄧侯名艾音乂而書碑者從省歟後人讀史無音注乃且以為蒿艾之艾而流俗轉失久而訛繆遂不復正此理或然覽者詳之熈寧壬子正月晦日六一堂書右眞蹟呉九眞太守谷府君碑鳳皇元年四月右谷朗者事呉為九眞太守碑無書撰人名氏其序云府君諱朗字義先桂陽耒陽人豫章府君之曽孫公府君之孫郎中君之子也其先出自顓頊益為舜虞賜姓嬴氏至於扉子封於秦谷因而氏焉谷氏在呉不顯史傳無所見所謂豫章府君而下三世皆莫知其名字按秦本紀非子邑於秦而此與朗子永寧侯相碑皆為扉子莫詳其義也治平元年四月二十六日書右眞蹟呉國山碑歲月見本文右呉國山碑者孫皓天冊元年禪于國山改元天璽因紀其所獲瑞物刋石于山隂是歲晉咸寧元年後五年晉遂滅呉以皓昬虐其國將亡而衆瑞並出不可勝數後世之言祥瑞者可以鑒矣熈寧元年中元後一日書右眞蹟晉南鄉太守頌泰始中右南鄉太守司馬整集本作晉南鄉太守頌南鄉太守者司馬整也按晉書宣帝弟曰安平獻王孚孚次子曰義陽成王望望第三子曰隨穆王整整先望卒後武帝分義陽之隨縣封整為王諡曰穆整以魏咸熈二年為南鄉太守是歲晉武受禪改元泰始泰始三年徙整南陽而南鄉人為整建此碑晉書地理志當魏末荆州分屬三國而南鄉南陽皆屬魏後晉武改南鄉為順陽此碑今在光化軍軍即襄州穀城縣之隂城鎭隂城當魏晉時為南鄉屬縣也余貶乾德縣令時得此碑今二紀矣嘉祐八年九月二十六日書眞蹟晉南鄉太守碑泰始四年右南鄉太守碑不著書撰人名氏題曰宣威將軍南鄉太守司馬府君紀德頌碑云君諱整字孔修太宰安平王之孫太尉義陽王之子按晉書宣帝弟曰安平獻王孚孚次子曰義陽成王望望第三子隨穆王整整先望卒後武帝分義陽之隨縣封整為王諡曰穆整以太始三年自南鄉太守徙南陽而南鄉人共立此碑今在光化軍軍即襄州穀城縣之隂城鎮按晉志不列南鄉郡據此碑所載縣令名氏有武陵築陽丹水隂城順陽祈六縣此葢南鄉郡所治也晉志但云南鄉魏時屬荆州武帝平呉改為順陽郡而不著順陽治所興廢屬縣之名而獨此碑可見也又整傳但云整歴南中郎將封清泉侯薨贈冠軍將軍亦不言其為宣威將軍南鄉南陽二郡守皆其所漏畧也右集本南鄉太守碑隂集本右南鄉太守將吏三百五十人分為二卷其磨滅者猶有二十餘人人皆有邑姓名字而無次序其名號有令有長有南閤祭酒門下督主簿部督郵監汀督郵部勸農五官掾文學掾營軍掾軍謀掾府門亭長主記史待事掾待事史部曲將部曲督又有賊曹功曹議曹户曹金曹水曹科曹倉曹鎧曹左右兵曹曹皆有掾又有祭酒有史有書佐有修行有從掾位有從史位有史有小史等魏晉之際太守官屬之制葢如此他書或時見一二不能如此之備也晉陸喈碑歲月見本文右晉陸喈碑喈為宣威内史建武元年卒碑以咸和七年立而碑後題云咸和七年歲在庚辰咸和成帝年號也成帝以泰寧三年八月即位是歲乙酉明年改元咸和據厯七年當為壬辰而此為集本作云庚辰者繆也陸氏有二碑余家集録皆有之據陸褘碑後題云泰寧三年歲在乙酉與今厯合則當時厯官不應至咸和而頓爾差失然則庚辰特書碑者誤爾治平元年六月二十九日書右眞蹟晉蘭亭修禊序永和九年集本右蘭亭修禊序世所傳本尤多而皆不同葢唐數家所臨也其轉相傳模失眞彌逺然時時猶有可喜處豈其筆法或得其一二邪想其眞蹟宜如何也哉世言眞本葬在昭陵唐末之亂昭陵為温韜所發其所藏書畫皆剔取其裝軸金玉而棄之於是魏晉以來諸賢墨蹟遂復流落於人間太宗皇帝時購募所得集以為十卷俾模傳之數以分賜近臣今公卿家所有法帖是也然獨蘭亭眞本亡矣故不得列於法帖以傳今予所得皆人家舊所藏者雖筆畫不同聊並列之以見其各有所得至於眞偽優劣覽者當自擇焉其前本流俗所傳不記其所得其二得於殿中丞王廣淵其三得於故相王沂公家又有别本在定州民家二家各自有石較其本纎毫不異故不復録其四得於三司蔡給事君謨世所傳本不出乎此其或尚有所未傳更俟博采范文度模本蘭亭序附余嘗集録前世遺文數千篇因得悉覽諸賢筆蹟比不識書遂稍通其學然則人之於學其可不勉哉今老矣目昏手顫雖不能揮翰而開卷臨几便别精麤若范君所書在余集録實為難得也竊幸覽之一作焉為之忘倦嘉祐七年夏五月二十八日廬陵歐陽修書右眞蹟書雖列於六藝非如百工之藝也蔡君謨以書名當世其稱范君者如此不為誤矣滁山醉翁題右眞蹟又自唐末干戈之亂儒學文章掃地而盡宋興百年之間雄文碩儒比肩而出獨字學久而不振未能比蹤唐之一無此字人余每以為恨今乃獲見范君筆法信乎時不乏人而患知之不博不然有於中必形於外若范君者筆迹不傳於世而獨傳其家葢其潛光晦德非止其書閟不傳也右眞蹟又與前跋相類疑是藁本今兩存之自唐末兵戈之亂儒學文章掃地而盡聖宋興百餘年間雄文碩學之士相繼不絶文章之盛遂追三代之隆獨字書之法寂寞不振未能比蹤唐室余每以為恨今迺獲見范君之書信乎時不乏人而患聞見之不博也然若君之筆法宜傳於世久閟於家葢其潛光晦伏非獨其書之閟也右集本晉樂毅論永和四年右晉樂毅論石在故高紳學士家紳死家人初不知惜好事者往往就閲或模傳其本其家遂祕藏之漸為難得後其子弟以其石質錢於富人而富人家失火遂焚其石今無復有本矣益為可惜也後有集本有此二字甚妙二字吾亡友聖俞書也論與文選所載時時不同考其文理此本為是惜其不完也右眞蹟晉王獻之法帖歲月未詳眞蹟右王獻之法帖予嘗喜覽魏晉以來筆墨遺蹟而想前人之高致也所謂法帖者其事率皆弔哀候病叙睽離通訊問施於家人朋友之間不過數行而已葢其初非用意而逸筆餘興淋漓揮灑或妍或醜百態橫生披卷發函爛然在目使人驟見驚絶徐而視之其意態集本無此三字愈無窮盡故使後世得之以為竒翫而想見其人也至於高文大冊何甞用此而今人不然至或棄百事弊精疲力以學書為事業用此終老而窮年者是眞可咲也治平甲辰秋社日書又獻之帖葢唐人所臨其筆法類顔魯公更俟識者辨之右眞蹟晉賢法帖眞蹟右晉賢法帖太宗皇帝萬幾之餘留精翰墨嘗詔天下購募鍾王眞蹟集為法帖十卷模刻以賜羣臣往時故相劉公沆在長沙以官法帖鏤板遂布於人間後有尚書郎潘師旦者又擇其尤妙者别為卷第與劉氏本並行至余集録古文不敢輙以官本參入私集遂於師旦所傳又取其尤者散入録中俾夫啓帙披卷者時一得之把翫欣然所以忘倦也治平元年五月十日書晉七賢帖右晉七賢帖得之李丕緒少卿眞蹟無此二字家丕緒多藏古書然不知此為眞否七子書蹟世罕傳故録之右集本宋文帝神道碑歲月未詳右宋文帝神道碑云太祖文皇帝之神道凡八大字而别無文辭惟以此為表識爾古人刻碑一作碑刻正當如此而後世鐫刻功德爵里世系惟恐不詳然自後漢以來門生故吏多相與立碑頌德矣余家集古所録三代以來鐘鼎彛盤銘刻備有至後漢以後始有碑文欲求前漢時碑碣卒不可得是則冢墓碑自後漢以來始有也此碑無文疑非宋世立葢自漢以來碑文務載世德宋氏子孫未必能超然獨見復古簡質又南朝士人氣尚卑弱字書工者率以纎勁清媚為佳未有偉然巨筆如此者益疑後世所書按宋書文帝為元兇劭所弑初諡曰景廟號中宗孝武立改諡曰文號太祖其墓曰長寧陵也右眞蹟宋宗慤母夫人墓誌歲月見本文右宗慤母夫人墓誌不著書撰人名氏有誌無銘其後云謹牒子孫男女次第名位婚嫁如左葢一時之制也按慤本傳與此誌歴官終始不同本傳云宋孝武即位以慤為左衛將軍累遷豫州刺史監五州諸軍使討竟陵王誕入為左衛將軍廢帝即位為寧蠻校尉雍州刺史卒此誌乃大明六年作誌云為右衛將軍監交廣二州湘州之始興冠軍將軍平越中郎將廣州刺史始遷豫州監五州軍事又為散騎常侍左衛將軍領太子中庶子荆州大中正而傳皆畧之也慤南陽湼陽人而此誌云湼陽縣都鄉安衆里人又云􅉎於秣陵縣都鄉石泉里都鄉之制前史不載右集本齊鎮國大銘像碑天統三年集本右齊鎭國大銘像碑銘像文辭固無足取所以録之者欲知愚民當南北割㩀之際事佛尤篤爾其字畫頗異雖為訛繆亦其傳習時有與今不同者其録之亦以此也南齊海陵王墓銘歲月未詳右南齊海陵王墓銘長兼中書侍郎謝朓撰海陵王昭文者文惠太子次子也初明帝鸞既廢鬱林王昭業而立昭文又廢為海陵王而殺之遂自立按謝朓傳朓當海陵王時為驃騎諮議領記室又掌中書郎後遷尚書吏部郎此誌題云長兼中書侍郎而據傳朓未嘗為中書侍郎史之闕也按南齊書劉悛為長兼侍中後魏臨淮王彧為長兼御史中尉南北史多有此名葢集本有長兼者三字當時兼官之稱如唐檢校官之類也嘉祐八年九月十七日書右眞蹟梁智藏法師碑普通三年眞蹟右梁智藏法師碑梁湘東王蕭繹撰銘新安太守蕭幾作叙尚書殿中郎蕭挹書世號三蕭碑法師者姓顧氏幾挹皆稱弟子衰世之弊遂至於斯余於集古録而不忍遽棄者以其字畫集本作書粗可佳捨其所短取其所長斯可矣嘉祐八年五月晦日書陳張慧湛墓誌銘貞觀二十三年九月右陳張慧湛墓誌銘不著書撰人名氏陳隋之間字書之法極於精妙而文章頽壊至於鄙俚豈其時俗弊薄士遺其本而逐其末乎予家集録所見頗多自開皇仁壽而後至唐高宗己前碑碣所刻往往不減歐虞而多不著名氏如鉗耳君清德頌或有名而其人不顯如丁道䕶之類不可勝數也慧湛陳人至唐太宗時始改葬爾其銘刻字書遒勁有法翫之忘倦惜乎不知為何人書也治平元年四月晦日書右眞蹟陳浮屠智永書千字文歲月未詳右千字文今流俗多傳此本為浮屠智永書考其字畫時時有筆法不類者雜於其間疑其石有亡缺後人妄補足之雖識者覽之可以自擇然終汨其眞遂去其二百六十五字其文既無所取而世復多有所佳者字爾故輙去其偽者不以文不足為嫌也蔡君謨今世知書者猶云未能盡去也嘉祐八年十月十八日書右眞蹟又梁書言武帝得王羲之所書千字命周興嗣以韻次之今官集本作觀法帖有漢章帝所書百餘字其言有海鹹河淡之類葢前世學書者多為此語不獨始於羲之也右眞蹟大代修華嶽廟碑歲月見本文右大代修華嶽廟碑按魏書文成帝興光二年三月己亥改元為太安故魏書興光無二年而此碑云集本有興光二字二年三月甲午立者葢立碑後六日始改元也其曰闡皇風於五葉者自道武明元太武至於文成纔四世爾太武之弑南安王余立不踰年亦被弑不得成君集本無此十九字而景穆太子文成父也追尊為帝立廟稱宗故以為世也魏自道武天興元年議定國號羣臣欲稱代而道武不許乃仍稱魏自是之後無改國稱代之事今魏碑數數有之碑石當時所刻不應妄但史失其事爾由是言之史家闕繆可勝道哉然予於史家非長故書之以待博學君子也嘉祐八年歲在癸夘七月三十日書昔在南譙自號醉翁晚又更號六一居士右眞蹟又按魏書文成帝興光二年三月己亥改元太安而此碑書二年三月甲午立葢立碑後六日乃改元故碑猶得稱二年也其曰闡皇風於五葉者自道武明元太武至於文成纔四世爾太武之弑南安王余立不踰年亦被弑不得成君為一世而景穆太子文成父也追尊為帝立廟稱恭宗故以為世也魏自道武天興元年議定國號羣臣欲稱代而道武不許乃稱魏自是之後無改國稱代之事今魏碑數數有之碑石當時所刻不應妄誤但史失其事爾由是言之史家闕繆多矣右眞蹟後魏孝文北巡碑歲月見本文右魏孝文北巡碑云太和二十一年修省方之典北臨舊京又云渉西河出平陽斜順唐逵指遊咸櫟路邇龍門遂紆雕軒按後魏本紀是歲正月乙巳北巡二月次太原至平城四月幸龍門以太牢祭夏禹遂幸長安汎渭浮河迺東歸與此碑所書皆合也碑無題首故依本紀為北巡碑也治平元年三月二十二日書右眞蹟後魏定鼎碑歲月見本文右魏定鼎碑景明三年建在今懐州流俗謂之定鼎碑也景明魏宣武年號也碑云定鼎遷中之十年按魏孝文以太和十七年遷都洛陽至此景明三年葢十年矣右集本後魏石門銘歲月見本文右魏石門銘云此門葢漢永平中所穿自晉氏南遷斯路廢矣皇魏正始元年漢中獻地褎斜遂開假節龍驤將軍梁秦二州刺史羊嗣開創舊路詔遣左校令賈三德共成其事起四年十月訖永平二年正月畢功其餘文字尚完而其大畧如此石門在漢中所謂漢永平中所穿者乃明帝時司隷校尉楊厥所開也厥自有碑述其事甚詳正始永平皆後魏宣武年號也治平元年五月十日書右眞蹟後魏神龜造碑像記歲月見本文右神龜造碑像記魏神龜三年立余所集録自隋以前碑誌皆未嘗輕棄者以其時集本無此字有所取於其間也然患其文辭鄙淺又多言浮屠然獨其集本作以字畫往往工妙惟後魏北齊差劣而又字法多異不知其何從而得之遂與諸家相戻亦意其夷狄昧於學問而所傳訛繆爾然録之以資廣覽也此碑字畫時時遒勁尤可佳也神龜孝明年號按魏書集本有神龜二字三年七月辛夘改元正光而此碑是月十五日立不知辛夘是其月何日也當俟治歴者推之嘉祐八年七月十一日書右集本東魏任城王造浮圖記歲月見本文右任城王造浮圖記不著其名云武定四年建武定東魏孝靜年號也按後魏書景穆皇帝子雲雲子澄集本有子􅃔二字相襲為任城王其後國絶不封其去孝靜時差逺不知武定四年王任城者為誰也治平元年八月八日書右眞蹟東魏造石像記歲月見本文右東魏造石像記其碑云大魏武定七年歲次己巳武定孝靜年號也今世所行歴譜惟龔潁運歴圖與今亳州宋退相紀年通譜為最詳而以潁所書推之武定七年歲當己巳與此碑合而武定止於八年是歲庚午東魏滅其事與東魏北齊書亦合而通譜以七年為戊辰八年為己巳又有九年為庚午而東魏滅按孝靜以後魏大統十六年滅是歲庚午則知宋公所記甲子不繆惟武定不當有九年而七年不得為戊辰此其失爾葢孝靜始即位改元天平盡四年而五年正月改為元象今通譜天平止於三年以四年為元象葢自元象以後遞差一年故以武定七年為戊辰也苟不見斯碑則運歴圖與通譜二家得失其何以決右集本魏九級塔像銘歲月見本文眞蹟右魏九級塔像銘不見書撰人名氏葢北齊時人所作也其年號見於文者三曰眞君九年者後魏太武號也又曰武定四年者東魏孝靜號也又曰天保三年者北齊文宣號也按高洋以後周大統十六年受東魏禪是歲庚午改元天保三年壬申此碑云歲在涒灘是矣碑文淺陋葢鄙俚之人所為惟其字畫多異往往竒怪故録之以備廣覽集本有云字治平元年三月二十三日書北齊常山義七級碑歲月見本文右不著書撰人名氏文為聲偶頗竒怪而字畫亦佳往往有古法碑云常山太守六州大都督儀同三司綦連公以天保九年造浮圖天保齊文宣年號也北齊書有綦連猛而不為常山太守都督儀同等官不知此所謂綦連公者何人也嘉祐八年九月二十日書右眞蹟又右常山義七級碑不著書撰人名氏文辭聲偶而甚怪書字頗有古法其碑首題云慕容儀同麴常山石氏諸邑義七級之碑其文云常山太守六州大都督儀同三司綦連公以天保九年為國敬造七級浮圖一區至天統中使持節都督𤓰州諸軍事驃騎大將軍儀同三司𤓰州刺史常山太守六州大都督頻陽縣開國子樂平縣開國男慕容樂及散騎常侍郎驃騎大將軍前給事黄門侍郎繕州大中正食新市縣幹新除常山太守麴顯貴與功曹石子和等増成之葢北齊時碑也綦連公不見其名北齊有綦連猛不為常山太守不知此何人而慕容樂官兼刺史太守並封兩縣不可詳也食縣幹入官銜葢當時之制亦不可詳也義者衆成之名猶若今謂義井之類也右集本永樂十六角題名附出右永樂十六角題名不著年月列名人甚多皆無顯者莫可考究不知為何時碑其字畫頗怪而不精似是東魏北齊人所書十六角者庸俗所造佛塔其後又書云造十六角鎭國大浮圖則知為塔矣其謂之十六角只見此碑而後魏時又有常山義七級碑葢當時俚俗語類皆如此治平元年八月八日書右眞蹟魯孔子廟碑附出興和三年右魯孔子廟碑後魏北齊時書多若此筆畫不甚佳然亦不俗而往往相類疑其一時所尚集本作傳當自有法又其㸃畫多異故録之以備廣覽右眞蹟北齊石浮圖記歲月見本文右齊造石浮圖記云河清二年歲在癸未河清北齊高湛年號也碑文鄙俚而鐫刻訛繆時時字有完者筆畫清婉可喜故録之又其前列題名甚多而名特竒怪如馮戬郎馮貴買之類皆莫曉其義若名野乂伽耶者葢出於浮圖爾自中華喪亂以來中國人名如此者多矣最後有馮黑太者予謂太亦音撻意隋末有劉黑闥呉黑闥皆以此為名者太闥轉寫不同爾然隋去北齊不逺不知黑闥為何等語也右集本後周大像碑大象三年右周大像碑宇文氏之事迹無足采者惟其字畫不俗亦有取焉翫物以忘憂者惟怪竒變態眞偽相雜使覽者自擇則可以忘倦焉故余於集古所録者博矣嘉祐八年六月二日書右眞蹟魏受禪碑元第七十二受禪此下一有壇字往返一作反下同魏公卿上尊號表元第七十三至七十四鉅一作巨鍾繇表元第四百九十小字二字上一有而字劉熹學生冢碑元第三百六十五賈逵碑元第一百二十八鄧艾碑元第七百五十或然此下一有也字谷府君碑元第五百九十二呉國山碑元第三百四至三百五南鄉太守頌元第九十二後晉武一有帝字隂城當魏晉時眞蹟無城時三字集本有之南鄉太守碑元第九十二紀德一作之德南鄉太守碑隂元第九十四二卷一作三卷碑隂官屬何其多邪葢通從史而盡列之當時猶於其間以取士人故吏亦清修其勢然耳右莆陽蔡君謨書今十年矣嘉祐八年九月二十七日一有此五十六字陸喈碑元第一百三十七蘭亭叙元第九百九十六數家一作諸家嘉祐八年六一作八月十日一有此八字范文度模本蘭亭叙蔡君謨題跋附右軍蘭亭最著今世尚有榻本祕閣一本蘓才翁一本周越一本猶有氣象存焉今觀橅倣葢得之矣嘉祐壬寅五月二十六日莆陽蔡襄同前又唐末眞蹟作室寂寞眞蹟作寥唐室眞蹟作尉於世眞蹟此于有而字閟也眞蹟此下有嘉祐七年五月旬休日廬陵歐陽某十四字樂毅論元第八十三論石此下一有本字王獻之法帖元第八百六十八又元第三百一十九晉賢法帖元第七百三十五沆眞蹟無此字晉七賢帖元第七十六宋文帝神道碑元第四百四十九鐫刻一作銘刻墓碑此下一有銘字末世此下一有所字士人一作人士治平元年三月十六日書一有此十字宗慤母墓誌元第一百五十三齊鎮國大銘像碑元第一百二十南齊海陵王墓銘元第八十五右海陵王墓銘南齊謝朓撰海陵王者齊文惠太子之次子也名昭文初明帝鸞既廢鬱林王昭業而立昭文又廢為海陵王而殺之鸞立是為明帝按朓傳朓當海陵王時為驃騎諮議領記室又掌中書郎後遷尚書吏部郎此誌題云長兼中書侍郎臣謝朓立而傳不書朓為侍郎也按齊書劉悛為長兼侍中魏臨淮王彧為長兼御史中尉南北史多有葢長兼似當時兼官之稱如唐檢校官也此與前本不同故兩存之梁智藏法師碑元第六十二余於一無於字可佳一作取所短一無所字陳張慧湛墓誌銘元第六百一十三智永書千字文元第四十六大代修華嶽廟碑元第五百二十四興光無一作無興光元也一作年於史家一作學後魏孝文北巡碑元第八十九後魏定鼎碑元第一百九石門銘元第七百八至七百九神龜造碑像記元第四百九任城王造浮圖記元第八百三十五東魏造石像記元第八百三十九退相一作丞相後魏此下一有永熈三年立在位十七年十字大統二字上有至字記甲子一作紀首尾以決此下一有然後知余之集録不為無益也治平元年閏五月九日書二十一字九級塔像銘元第四百七十七常山義七級碑元第十四永樂十六角題名元第九百八十五魯孔子廟碑元第二百九十北齊石浮圖記元第九百七十六後周大像碑元第二百九十八集古錄卷四
