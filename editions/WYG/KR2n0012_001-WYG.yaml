body:
  text: 集古錄巻一宋歐陽修撰古敦銘毛伯敦龔伯彛伯庻父敦右毛伯敦銘嘉祐中原父以翰林侍讀學士出為永興軍路安撫使其治在長安原父博學好古多藏古奇器物能讀古文一作之銘識考知其人事蹟而長安秦漢故都時時發掘所得原父悉購而藏之以予方集錄古文故每有所得必模其銘文以見遺此敦原父得其盖於扶風而有此銘原父為予考按其事云史記武王克商尚父牽牲毛叔鄭奉明水則此銘謂鄭者毛叔鄭也銘稱伯者爵也史稱叔者字也敦乃武王時器也盖余集録最後得此銘當作錄目序時但有伯冏銘吉日癸巳字最逺故叙言自周穆王以來叙已刻石始得斯一作此銘乃武王時器也其後二銘一得盩厔曰龔伯尊彛其一亦得扶風曰伯庻父作舟姜尊敦皆不知為何人也三器銘文皆完可識具列如左右真蹟毛伯敦銘釋文惟二年正月初吉王在周昭宫丁亥王格于宣射毛伯入門位中庭右祝鄭王呼内史冊命鄭王曰鄭昔先王既命女作邑一字未詳五邑祝今余佳亂商乃命錫女赤芾同冕齊黃䜌旗用事鄭拜稽首敢對揚天子休命鄭用作朕皇考龔伯尊敦鄭其鬻壽萬年無疆子子孫孫永寶用享薛尚功釋云惟二年正月初吉王在周召宫丁亥王格于宣榭毛伯内門立中庭佑祝􅌏王呼内史冊命􅌏王曰􅌏昔先王既命女作邑繼五邑祝今余惟疃京乃命錫女赤芾彤冕齊黄鑾旂用事􅌏拜稽首敢對揚天子休命􅌏用作朕皇考龔伯尊敦􅌏其眉夀萬年無疆子子孫孫永寶用享龔伯彛銘釋文作皇祖懿公文公武伯皇考龔伯尊彛其熙萬年無疆霝終霝命其子子孫孫永寶用享于宗室薛尚功釋云作皇祖益公文公武伯皇考龔伯彛其熙萬年無疆令終令命其子子孫孫永寶用享于宗室伯庻父敦銘釋文惟二月戊寅伯庻父作王姑舟姜尊敦其永寶用薛尚功釋舟為周餘同上韓城鼎銘右原甫既得鼎韓城遺余以其銘而太常博士楊南仲能讀古文篆籀為余以今文寫之而闕其疑者原甫在長安所得古奇器物數十種亦自為先秦古器記原甫博學無所不通為余釋其銘以今文而與南仲時有不同故并著二家所解以竢博識君子具之如左右真蹟惟王九月乙亥晉姜曰余惟司朕先姑君晉邦余不缺安寧巠雝明德宣缺我猷用缺所辭辟缺剿䖍不缺㠯寵我萬民嘉遺我錫鹵賚千兩㐱灋文侯缺征綏缺堅久吉金用作寶尊鼎用康妥懷逺邦君子晉姜用蘄缺麋壽作恵缺亟萬年無疆用德畯保其孫子三壽是利右原父所寫如此隹惟王九月乙亥晉姜曰余佳惟司嗣孠同朕先姑君晉邦余不叟今作敢者㨨文省妄寧巠經雝朙德宣祁省隸作䘏我用辝辟疑即母字久􅊍䖍不疑遂字讀為墜諸覃享􅎧帥我萬民我疑易字或胷字省千兩勿灋文侯頵令畢疑卑字疑毌字讀為貫通征疑字湯受乆吉金用伦寶􅳛鼎用康疑西夏字妥妥讀為誰襄君子晉姜用疑所字讀為旂疑釁字讀為眉為亟極萬秊無彊疆用亯享用德㽙疑允字保其孫子三是右嘉祐己亥歳馮掖有得鼎韓城者摹其欵識于石樂安公以南仲職典書學命釋其字謹按其銘葢多古文竒字古文自漢世知者已稀字之傳者賈逵許慎輩多無其說葢古之事物有不與後世同者故不能盡通其作字之本意也其不傳者今或得於古器無所依據難以臆斷大抵古字多省偏㫄而趣簡易故隹司巠􅎧等字皆假借也鄭司農說周禮云古者書儀但為義又云古者立位同字古文春秋經公即位為公即立者是也者進取也从􅗸故疑為母从女而象乳子形故疑為母而讀為緐雝用邕聲邕从巛古文作􅳓今此从水从吕故疑為雝魯字古作􅨞即旅字古人旅作者字用為聲葢古文魯旅者三字通用故疑為諸易者篆文象蜥易形故㣗疑為易而讀為錫為賜皆以聲假借也鹵从􅒾古西字中象鹽形胃胃上象胃中穀形故胃二字卑者从􅚀在甲下􅚀今但用左古者尚右故􅚀在甲下為卑故疑為卑亦恐借為俾讀毌音冠象穿寶貨形貫字从之或即毌字今毛詩有串夷字俗用為串穿之串而說文不載豈非字之省也故疑讀為貫通从辶凡从辶彳之字多通用故疑為通古語二字相屬者多為一字書之若秦鍾銘有小字二二方四方之字是也鹵古西字故疑為西夏字秦鍾銘亦有此字妥字說文無之葢古綏字省糸尒其後相承讀如媠故疑讀為綏㫃音偃石鼓文皆作㣿古之旌旂悉載於車故疑即旂字而从車借讀為祈近嘗有得敦藍田者二銘皆有用萬之文故知然也釁今幡為許刃而釁芑之釁音門用之為聲詩鳧鷖音醫在釁又省為釁易繫辭釁又讀如尾釁門尾眉聲相近又古者字音多與今異徐鉉所謂如亦音釁亦音門乃音亦仍它皆倣此是也豈釁眉古亦同音歟秦鍾銘亦有釁字故釁疑為眉為者母猴也从𤓰而象其形故疑為㽙㽙字字書所無而於文埶宜為允葢用甽省聲也它字不可識者猶十一二與其偏㫄之異者若刃之類皆今所不傳以小篆參求之不能仿佛以今揆之其間或當時書者器者不必無謬誤矣姑盡淺學以塞公命云􅈛嘉祐壬寅冬十月太常博士知國子監書學豫章楊南仲識嘗觀石鼔文愛其古質物象形埶有遺思焉及得原甫鼎器銘又知古之篆字或多或省或移之左右上下惟其意之所欲然亦有工拙秦漢以來裁歸一體故古文所見者止此惜哉治平甲辰正月莆陽蔡襄商雒鼎銘右商雒鼎銘者原甫在長安時得之上雒其銘云惟十有四月既死覇王在下都雝公作􅳛鼎用追享丁于皇且考用气麋壽萬年無疆子子孫孫永寶用雝公不知為何人原甫謂古丁寧通用葢古字簡略以意求之則得爾而蔡君謨謂十有四月者何原甫亦不能言也治平元年中伏曰書右器銘鐘銘二甗銘二缶器銘一寶敦銘一字疑非缶右古器銘六余甞見其二曰甗也寶龢鍾也太宗皇帝時長安民有耕地得此甗初無識者其狀下為鼎三足上為方甑中設銅箄可以開闔製作甚精有銘在其側學士句中正工於篆籕能識其文曰甗也遂藏於秘閣余為校勘時常閲于秘閣下景祐中修大樂冶工給銅更鑄編鍾得古鍾有銘于腹因存而不毁即寶龢鐘也余知太常禮院時常於太常寺按樂命工扣之與王朴夷則清聲合初王朴作編鐘皆不圓至李照等奉詔修樂皆以朴鐘為非及得寶龢其􅃺正與朴鐘同乃知朴為有法也嘉祐八年六月十八日書右真蹟同前綏和鐘寶盉寶敦右古器銘四尚書屯田員外郎楊南仲為余讀之其一曰綏和林鍾其文磨滅不完而字有南仲不能識者其二曰寶盉其文完可讀曰伯玉般子作寶盉其萬斯年子子孫孫其永寶用其三其四皆曰寶敦其銘文亦同曰惟王四年八月丁亥散季肇作朕王母弟姜寶敦散季其萬年子子孫孫永寶葢一敦而二銘余家集錄所藏古器銘多如此也治平元年七月十三日以服藥假家居書右真蹟自余集録古文所得三代器銘必問於楊南仲章友直暨集録成書而南仲友直相繼以死古文竒字世罕識者而三代器銘亦不復得矣治平三年七月二十一有八字日一有以字孟饗攝事大廟齋宫書右真蹟終南古敦銘右終南古敦銘大理評事蘇軾為鳯翔府判官得古器於終南山下其形制與今三禮圗所畫及人家所藏古敦皆不同初莫知為敦也葢其銘有寶尊敦之文遂以為敦爾右集本叔高父煮簋銘右煑簋銘曰叔高父作煑簋其萬年子子孫孫永寶用原父在長安得此簋於扶風原甫曰簋容四升其形外方内圓而小堶之似龜有首有尾有足有甲有腹今禮家作簋亦外方内圓而其形如桶但於其盖刻為龜形一有爾字與原甫所得真古簋不同一有也字君謨以謂禮家傳其說不見其形制故名存實亡原甫所見可以正其謬也故并録之以見君子之於學貴乎多見而博聞也治平元年六月二十日書右真蹟周穆王刻石右周穆王刻石曰吉日癸巳在今賛皇壇山上壇山在縣南十三里穆天子傳云穆天子登贊皇一有山字以望臨城置壇此山遂以為名癸巳誌其日也圖經所載如此而又别有四望山者云是穆王所登者一作山據穆天子傳但云登山不言刻石然字畫亦奇怪土人謂壇山為馬蹬山以其字形類也慶厯中宋尚書祁在鎮陽遣人於壇山模此字而趙州守將武臣也遽命工鑿山取其字龕于州廨之壁聞者為之嗟惜也治平甲辰秋分日書右真蹟敦銘周姜寶敦張伯煑右伯冏敦銘曰伯冏父作周姜寶敦用夙夕享用蘄萬壽尚書冏命序曰穆王命伯冏為周大僕正則此敦周穆王時器也按史記年表自厲王以上有世次而無年數共和以後接乎春秋年數乃詳葢自穆王傳共孝懿夷厲五王而至於共和自共和至今葢千有九百餘年斯敦之作在共和前五世而逺也古之人之欲存乎乆逺者必托於金石而後傳其堙沉埋没顯晦出入不可知其可知者久而不朽也然岐陽石鼔今皆在而文字剥缺者十三四惟古器銘在者皆完則石之堅又不足恃是以古之君子器必用銅取其不為燥濕寒暑所變為可貴者以此也古之賢臣名見詩書者常為後世想望矧得其器讀其文器古而文竒自可寶而藏之邪其後張伯銘曰張伯作煑其子子孫孫永寶用張伯不知何人也三銘皆得之原父也古集本敦􅔆銘伯冏敦張仲􅔆嘉祐六年原父以翰林侍讀學士出為永興軍路安撫使其治在長安原父博學好古多藏古奇器物而咸鎬周秦故都其荒基破冡耕夫牧兒往往有得必購而藏之以余方集古錄文乃模其銘刻以為遺故余家集古録自周武王以來皆有者多得於原父也歸自長安所載盈車而以其二器遺余其一曰伯冏之敦其一曰張仲之􅔆其形制與今不同而極精巧敦􅔆皆有銘而云􅔆獲其二皆有葢而上下皆銘銘文皆同甚矣古之人慮逺也知夫物必有弊而百世之後埋没零落幸其一在尚冀或傳爾不然何丁寧重複若此之煩也其於一用器為慮猶如此則其操修施設所以垂後世者必不苟二子名見詩書伯冏周穆王時人張仲宣王時人太史公表次三代以來自共和以後年世乃詳葢自共和元年逮今千有九百餘年而穆王又共和前五世可謂逺矣而斯器也始獲於吾二人其中間晦顯出入不可知以其無文字以志之也葢其出或非其時而遇或非其人者物有幸不幸也今出而遭吾二人者可謂幸矣不可以不傳故為之書且以為贈我之報歐陽修記右集本張仲器銘集本医銘雖四而文則一今類轉注偏􅅖之或異者分注釋文四十一字於其下薛尚功編鼎彛款識有此釋文五十一字附見于此右張仲器銘四其文皆同而轉注偏傍左右或異葢古人用字如此爾嘉祐中原父在長安獲二古器於藍田形制皆同有盖而上下有銘甚矣古人之為慮逺也知夫物必有弊而百世之後埋没零落幸其一在尚冀或傳爾不然何丁寧重複一作復若此之煩也詩六月之卒章曰侯誰在矣張仲孝友葢周宣王時人也距今實千九百餘年而二器始復出原甫藏其器予録其文葢仲與吾二人者相期於二千年之間可謂逺矣方仲之作斯器也豈必期吾二人者哉葢久而必有相得者物之常理爾是以君子之於道不汲汲而志常在於逺大也原甫在長安得古器數十作先秦古器記而張仲之器其銘文五十有一其可識者四十一具之如左其餘以俟博學君子石鼓文右石鼓文岐陽石鼔初不見稱於前世至唐人始盛稱之而韋應物以為周文王之鼓一有至字宣王刻詩一有爾字韓退之直以為宣王之鼓在今鳳翔孔子廟中鼓有十先時散棄於野鄭餘慶置于廟而亡其一皇祐四年向傳師求於民間得之一有十鼔二字迺足其文可見者四百六十五一有磨滅二字不可識者過半余所集録文之古者莫先於此然其可疑者三四今世所有漢桓靈時碑往往尚在其距今未及千歲大書深刻而磨滅者十猶八九此鼓按太史公年表自宣王共和元年至今嘉祐八年實千有九百一十四年鼓文細而刻淺理豈得存此其可疑者一也其字古而有法其言與雅頌同文而詩書所傳之外三代文章眞蹟在者惟此而已然自漢以來博古好竒之士皆畧而不道此其可疑者二也隋氏藏書最多其志所録秦始皇刻石婆羅門外國書皆有而獨無石鼓遺近録逺不宜如此此其可疑者三也前世傳記所載古逺竒怪之事類多虚誕而難信况傳記不載不知韋韓二君何據而知為文宣之鼔也隋唐古今書籍粗備豈當時猶有所見而今不見之耶然退之好古不妄者余姑取以為信爾至於字畫亦非史籀不能作也廬陵歐陽某記嘉祐八年六月十日書右眞蹟秦度量銘右秦度量銘二按顔氏家訓隋開皇二年之推與李德林見長安官庫中所藏秦鐵稱權傍有鑴銘二其文正與此二銘同之推因言司馬遷秦始皇帝本紀書丞相隗林當依此銘作隗狀遂録二銘載之家訓余之得此二銘也迺在祕閣校理文同家同蜀人自言嘗遊長安買得一有此字二物其上刻二銘出以示余其一乃銅鍰不知為何器其上有銘循環刻之乃前一銘也其一乃銅方版可三四寸許所刻乃後一銘也考其文與家訓所載正同然之推所見是鐵稱權而同所得乃二銅器余意秦時兹二銘刻於器物者非一也及後又於集賢校理陸經家得一銅板所刻與前一銘亦同益知其然也故并録之云嘉祐八年七月十日書右眞蹟秦昭和鐘銘右秦昭和鐘銘曰秦公曰不顯朕皇祖受天命奄有下國十有二公按史記秦本紀自非子邑秦而秦仲始為大夫卒莊公立卒襄公文公寧公出公武公德公宣公成公穆公康公共公桓公景公相次立太史公於本紀云襄公始列為諸侯於諸侯年表則以秦仲為始今據年表始秦仲則至康公為十二公此鍾為共公時作也據本紀自襄公始則至桓公為十二公而銘鐘者當為景公也故並列之以俟博識君子治平元年二月社前一日書右眞蹟秦祀巫咸神文一作秦誓文右秦祀巫咸神文今流俗謂之詛楚文其言首述秦穆公與楚成王事遂及楚王熊相之罪按司馬遷史記世家自成王以後王名有熊良夫熊適熊懐熊元而無熊相據文言穆公與成王盟好而後云倍十八世之詛盟今以世家考之自成王十八世為頃襄王而頃襄王名横不名熊相又以秦本紀與世家參較自楚平王娶婦於秦昭王時呉伐楚而秦救之其後歴楚惠簡聲悼肅五王皆寂不與秦相接而宣王熊良夫時秦始侵楚至懐王熊槐頃襄王熊横當秦惠文王及昭襄王時秦楚屢相攻伐則此文所載非懐王則頃襄王也而名皆不同又以十八世數之則當是頃襄然則相之名理不宜謬但史記或失之爾疑相傳寫為横也右集本之罘山秦篆遺文集本右秦篆遺文纔二十一字曰於久逺也如後嗣焉成功盛德臣去疾御史大夫臣德其文與嶧山碑泰山刻石二世詔語同而字畫皆異惟泰山為眞李斯篆爾此遺者或云麻温故學士於登州海上得片木有此文豈杜甫所謂棗木傳刻肥失眞者邪秦泰山刻石一作書李斯篆後集本右秦二世詔李斯篆天下之事固有出於不幸者矣苟有可以用於世者不必皆賢聖之作也蚩尤作五兵紂作漆器不以一人之惡而廢萬世之利也篆字二字一作小篆之法出於秦李斯斯之相秦焚棄典籍遂欲滅先王之法而獨以已之所作刻石而示萬世何哉十四字一作至已之所作則為萬世不可朽之計何其愚哉按史記秦始皇帝行幸天下凡六刻石及二世立乂刻詔書于一作於其旁今皆亡矣獨泰山頂上二世一有此字詔僅在所一無二字存數十字爾今俗傳嶧山碑者史記不載又其字體差大六字一作其字特大不類泰山存者其本出於徐鉉一無此六字又有别本云一無此字出於夏竦家者以今市人所鬻校之無異一無此十一字自唐封演已言嶧山碑非眞而杜甫直謂棗木傳刻爾皆不足貴也一無此五字余友江鄰幾一作休復謫官於奉符嘗自至泰山頂上視秦所刻石處云石頑不可鐫鑿不知當時何以刻也然而二字一作其四面皆一有石字無草木而野火不及故能若此之久一有也字然風雨所剥其存者纔此數十字一無此三字而已本鄰幾遺余也比今俗傳嶧山碑本特為眞者爾一無此十九字只作休復字隣幾秦嶧山刻石右秦嶧山碑者始皇帝東巡羣臣頌德之辭至二世時丞相李斯始以刻石今嶧山實無此碑而人家多有傳者各有所自來昔徐鉉在江南以小篆馳名鄭文寶其門人也嘗受學於鉉亦見稱於一時此本文寶云是鉉所模文寶又言嘗親至嶧山訪秦碑莫獲遂以鉉所模刻石於長安世多傳之余家集録别藏泰山李斯所書數十字尚存以較模本則見眞偽之相逺也治平元年六月立秋日右眞蹟同前一作秦二世詔右鄒嶧山秦二世刻石以泰山所刻較之字之存者頗多而磨滅尤甚其趙嬰楊樛姓名以史記考之乃微可辨其文曰大夫趙嬰五大夫楊樛皇帝曰金石刻盡始皇帝所為也今襲號而金石刻凡二十九字多於泰山存者而泰山之石又滅盛德二字其餘則同而嶧山字差小又不類泰山存者刻畫完好而附録于一作於此者古物難得兼資博覽爾葢集録成書後八年得此于一作於青州而附之熈寧元年秋九月六日書右眞蹟前漢二器銘林華宫行鐙一蓮勺宫博山爐嵗月見本文劉原父帖近又獲一銅器刻其側云林華宫行鐙重一斤十四兩五鳳二年造第一今附墨本上呈右林華宫行鐙銘一蓮勺宫銅博山爐下盤銘一皆漢五鳳中造林華宫漢書不載宣帝本紀云困於蓮勺鹵中注云縣也亦不云有宫葢秦漢離宫别館不可勝數非因事見之則史家不能備載也余所集録古文自周穆王以來莫不有之而獨無前漢時字求之久而不獲每以為恨嘉祐中友人劉原甫出為永興守長安秦漢古都多古物竒器埋没於荒基敗冢往往為耕夫牧豎得之遂復傳於人間而原甫又雅喜藏古器由此所獲頗多而以余方集古文故每以其銘刻為遺既獲此二銘其後又得谷口銅甬銘乃甘露中造由是始有前漢時字以足余之所闕而大償其素願焉余所集録既博而為日滋久求之亦勞得於人者頗多而最後成余志者原甫也故特誌之嘉祐八年歲在癸卯七月二十日書右眞蹟前漢谷口銅甬銘歲月見本文右漢谷口銅甬原父在長安時得之其前銘云谷口銅甬容十其下滅兩字始元四年左馮翊造其後銘云谷口銅甬容十斗重四十斤甘露元年十月計掾章平左馮翊府下滅一字原父以今權量校之容三斗重十五斤始元甘露皆宣帝年號一有也字余所集録千卷前漢時文字惟此與林華行鐙蓮勺博山鑪盤銘爾治平元年六月九日書右眞蹟前漢鴈足鐙銘此跋本與漢二器銘銅甬銘共為一卷裴如晦帖煜頃嘗謂周秦東漢往往有銘傳於世間獨西漢無有王原叔言華州片瓦有元光字急使人購得之乃好事者所為非漢字也侍坐語及公亦謂家集所闕西漢字耳煜守丹楊日蘇氏者出古物有銅鴈足鐙制作精巧因辨其刻則黄龍元年所造其言榮宫二史間未始概見遂摹之欲寄左右以為集古録之一事㑹悲苦不果昨偶開篋見之謹以上獻亦聞原甫於秦中得西漢數器不知文字與此類不煜再拜治平元年十二月十四日後三年余出守亳社而裴如晦以疾卒于京師明年原甫卒于南都二人皆年壯氣盛相次以殁而余獨巋然而存也熈寧壬子四月右眞蹟後漢西嶽華山廟碑歲月見本文右漢西嶽華山廟碑文字尚完可讀其述自漢以來云高祖初興改秦淫祀太宗承循各詔有司其山川在諸侯者以時祠之孝武皇帝修封禪之禮巡省五嶽立宫其下宫曰集靈宫殿曰存仙殿門曰望仙門中宗之世使者持節歲一禱而三祀後不承前至於亡新寖用丘虚建武之元事舉其中禮從其省但使二千石歲時往祠自是以來百有餘年所立碑石文字磨滅延熹四年𢎞農太守袁逢修廢起頓易碑飾闕㑹遷京兆尹孫府君到欽若嘉業遵而成之孫府君諱璆其大畧如此所謂集靈宫者他書皆不見惟見此碑一有爾字則余之集録不為無益矣一無此十字治平元年閏五月十六日書右眞蹟後漢樊毅華嶽碑歲月見本文右漢樊毅華嶽碑云泰華之山削成四方其高五千仞廣十里周禮識方氏華謂之西嶽祭視三公者以能興雲雨産萬物通精氣有益於人則祀之故帝舜受堯親自巡省暨夏殷周未之有改秦違其典璧遺鄗池二世以亡漢祖應運禮遵陶唐祭則獲福奕世克昌亡新滔逆鬼神不享建武之初彗掃頑凶光和二年有漢元舅五侯之胄謝陽之孫曰樊府君諱毅字仲德命守斯邦孟冬十月齋祠西嶽以傳窄狹不足處尊卑廟舍舊久牆屋傾亞特部行事荀班縣令先讜以漸補治此其事也又云功曹郭敏等遂刋𤣥石銘勒鴻勲其字畫頗完其文彬彬可喜惟以周禮職方氏為識方氏其字畫分明非訛缺疑當時周禮之學自如此葢識誌其義皆通也治平元年五月十日書右眞蹟同前右漢樊毅修華嶽廟碑云惟光和元年歲在戊午名曰咸池季冬己巳𢎞農太守河南樊君諱毅字仲德下車之初恭肅神祀西嶽至尊詔書奉祀躬親自往齋室逼窄法齋無所於是與令巴郡朐忍先讜圖議繕故二年正月己卯興就刻兹碑號吏卒挾路據此碑乃即時所立而太守生稱諱者何哉治平元年末伏日書右眞蹟後漢修西嶽廟復民賦碑歲月見本文右漢修西嶽廟復民賦碑云光和二年十二月庚午朔十三日壬午𢎞農太守臣毅頓首死罪上尚書臣毅頓首頓首死罪死罪謹按文書臣以去元年十一月到官其十二月奉祀西嶽華山省視廟舍及齋衣祭器率皆久逺有垢臣以神嶽至尊宜加恭肅輙遣行事荀班與華隂令先讜以漸繕治成就之又曰讜言縣當孔道加奉尊嶽一歲四祠養牲百日用穀藁三千餘斛或有請雨齋禱役費兼倍小民不堪有饑寒之窘違宗神之敬乞差諸賦復華下十里以内民租田口算臣輙聼盡力奉宣詔書思惟惠利増異復上臣毅誠惶誠恐頓首頓首死罪死罪上尚書漢家制度今不復見惟余家集録漢碑頗多故於磨滅之餘時見一二而此碑粗完故録其首尾以傳臣毅者樊毅也右集本後漢北嶽碑歲月見本文集本右漢北嶽碑文字殘滅尤甚莫詳其所載何事第其隱隱可見者曰光和四年以此知為漢碑爾其文㫁續不可次序葢多言珪幣牲酒黍稷豐穰等事似是禱賽之文其後有二人姓名偶可見云南陽冠軍馮巡字季祖甘陵夏方字伯陽其餘則莫可考矣後漢無極山神廟碑歲月見本文右漢無極山神廟碑文字磨滅斷續然尋繹次序其可見者尚可成文云太常臣躭丞敏頓首上尚書謹按文書男子常山葢高上黨范遷為元氏三公神山去年五月常山相巡詣山請雨山神即使高傳言白國縣即與封龍靈山無極山共興雲雨常山相巡元氏令王翊各以一白羊賽復使高與遷俱詣太常為無極山神索法食臣疑高遷言不實輙移本國今常山相巡書言郡督郵言無極山體可三里所立石為體長二丈五尺所山周匝二十餘里其三公封龍靈山皆得法食乞令無極山比三山祠牲出王家以珪璧為信愚臣如巡言請少府給珪璧故事湏報臣躭愚戇頓首頓首上尚書制曰可尚書令忠奏雒陽宫太常承書從事光和四年八月十七日丁酉尚書令忠下太常躭丞敏下常山相其奏章如此其後遂言造廟事而有銘其文多不載按漢奏章首尾皆言臣某頓首頓首死罪死罪上尚書而此碑所載太常一有奏字章首尾不稱死罪而丞敏又不稱臣莫曉其制碑後又列常山官屬云常山相南陽馮巡字季祖元氏令王翊字元輔云治平元年四月二日書右眞蹟後漢桐柏廟碑歲月見本文右漢桐柏廟碑磨滅雖不甚而文字斷續粗可考次葢南陽太守修廟碑也其辭云延熹六年正月乙酉南陽太守中山盧奴君奴下正闕一字當是其姓又云尊神敬祀立廟桐柏春秋宗禜災異告變水旱請求位比諸侯聖漢所尊一作宗太守奉祀二十餘年不復身至遣丞行事簡畧不敬明神弗歆災害以生五嶽四瀆與天合德仲尼愼祭常若神在君凖則大聖親之桐柏來見廟祠﨑嶇逼狹開拓神門立闕四望増廣壇場又云執玉以沈為民祈福靈祗報祐天地清和其大意止於如此其後有頌亦可讀第不見太守姓名爾然不著他事惟修廟祀神爾桐柏淮瀆廟也治平元年六月十三日書右眞蹟後漢殽阬君神祠碑光和四年右漢殽阬君神祠碑在鄭縣慶歴中樞宻直學士施君為陜西都轉運使為余模此本云碑文已磨滅初不可辨以麫塡其刻稍尋其㸃畫命工鑴治之乃可讀漢碑今在者類多磨滅不完故斯碑歴歴可見也惟裴曄姓名為鄉人鑱去矣殽阬所以畜洩水患據碑文云自亡新以來廢之則前漢時已有之矣光和中曄為鄭縣令始修復之事見水經及華州圖經殽阬君祠今謂之五部神廟其像有石隄西戍樹谷五樓先生東臺御史王翦將軍皆莫曉其義施君名昌言今為涇原路安撫使右集本古敦銘録目元第九百四十一敦乃武王下二字一作文武韓城鼎銘元第七百六十一亦自一作嘗商雒鼎銘元附九百四十一古器銘元第三百七十一存而一無而字同前元第五百九十一般子款識法帖無子字斯年款識法帖無斯字八月款識法帖此下有初吉字暨集録一作古終南古敦銘元第二百四十一初莫知為敦也一無此六字煮簋銘元第四十一煮款識法帖作旅此葢銘此腹銘右一器其銘云叔高父作煮簋其萬年子子孫孫永寶用其容四升外方内圜而小堶之望之畧似龜有首有尾有足有腹有甲也今禮家作簋内正圜外正方刻葢正為龜形猶有近也不全與古同耳此銘劉原甫在永興得古銅簋模其銘以見寄其後原甫所書也禮家作簋傳其説不知其形制故名存實亡此器可以正其繆也甲辰正月十二日襄周穆王刻石元第七百六十一天子登上二字一作三此山一作北山癸巳至如此而十三字一作圖經云癸巳誌其日也鑿山一無山字敦銘元附八百九十一一作款識法帖作匜史記此下一有本紀二字治平元年正月二日書一有此九字敦医銘元無卷第張仲器銘元第八百九十一古人一作古之人嘉祐八年十二月二十八日書一有此十二字石鼓文元第二百一右石鼓文此下一有在字千有一無有字獨無石鼔此下一有文字猶有一作獨冇秦度量銘元第六百六十一秦昭和鐘銘元第三百四十一秦祀巫咸神文元第四百一熊適一作啇又别本秦祀巫咸神文祀朝那文附右秦祀巫咸神文今流俗謂之詛楚文者一無此字以其言楚王熊相之罪也史記世家楚自成王以後王名一無此二字有熊疑熊良夫熊啇熊槐熊元而無熊相詛一作據文言穆公與成王盟好而後云一無此二字倍十八世之詛盟則秦一無此二字自穆公十八世為惠文王也又按秦本紀與楚世家自平王娶婦於秦其後累世不以兵交至宣王熊良夫時秦始侵楚及惠文王時與楚懐王熊槐屢相攻伐則秦所詛者是懐王也但史記以為熊槐者失之爾槐相二字相近葢轉寫之誤當從詛文石刻以相為正又有祀朝那湫文其文一無此一字與此同今附于後熈寧三年四月二十三日書秦篆遺文元第三百六十一嗣焉石刻作為臣斯石刻作徳此遺一有文字或云一作曰治平元年六月二十日書一有此十字泰山刻石元第一百二十一賢聖一作聖賢秦始一無秦字此詔一作詔書余友一有人字嘉祐八年五月十日書一無此九字嶧山刻石元第九百五十一而附一無而字漢二器銘元第八百一十一茲久一作滋久得於一作得之於銅甬銘鴈足鐙銘元附八百二十一華山廟碑元第八百四十一如此此下一有其記漢祠四岳事見本末十字華嶽碑元第七百二十一享古碑作亨班古碑作斑同前元第三百一復民賦碑元第二百一十一西一作華嶽廟山下一有請字荀班古碑作斑就之此下亦有後仍雨廿有五字口一有筭字治平元年六月十四日書一有此十字北嶽碑元第七百三十一考矣一作也治平元年五月十日書一有此九字無極山神廟碑元第四百九十一愚臣古碑作㠯請少府一作請以少府桐柏廟碑元第一百九十一又云一無此二字災害一作異殽阬神祠碑元第二百九十一在一作今在或作在今斯碑二字上一有獨字復之此下一有時字治平元年二月一日書一有此九字集古録卷一
