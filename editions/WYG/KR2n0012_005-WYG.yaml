body:
  text: 集古錄卷五宋歐陽修撰隋老子廟碑開皇二年右老子廟碑隋薛道衡撰道衡文體卑弱然名重當時余所取者特得字畫近古故錄之唐人二字集本作其碑後所題唐人姓名字皆不俗亦可佳也右真蹟隋尒朱敞碑開皇五年右尒米敞碑敞者榮從弟彦伯之子也按敞傳云字乾羅而此碑字天羅傳云為金州總管而碑又為徐州總管碑文雖殘闕然班班尚可讀其述徐州事頗多事為史家不取可也不書其官盖闕繆也其字不同亦當以碑為是余於集錄正前史之闕繆者多矣治平元年二月十六日書右真蹟隋龍藏寺碑開皇六年右齊開府長兼行參軍九門張公禮撰不著書人名氏字畫遒勁有歐虞之體隋開皇六年建在今鎮州碑云太師上柱國大威公之世子左威衛将軍上開府儀同三司使持節恒州諸軍事恒州刺史鄂國公金城王孝􅋖奉勅勸奨州人一萬共造此寺其述孝僊云世業重於金張器識逾於許郭然北齊周隋諸史不見其父子名氏不詳何人也右集本又開皇六年右隋龍藏寺碑齊張公禮撰龍藏集本無此字寺已廢此碑今在常山府署之集本無此二字門書字頗佳第不見其人姓名爾碑以隋開皇六年立後題二字集本作而張公禮猶稱齊按周武帝建徳六年虜齊㓜主高常齊遂滅後四年隋建開皇之號至六年齊滅盖集本有已字十年矣集本有不知二字公禮尚稱齊官集本無此字何也嘉祐八年九月二十九日書右真蹟隋太平寺碑開皇元年右太平寺碑不著書撰人名氏南北文章至於陳隋其弊極矣以唐太宗之致治幾乎三王之盛獨於文章不能少變其體豈其積習之勢其來也逺非久而衆勝之則不可以驟革也是以羣賢奮力墾闢芟除至於元和然後蕪穢蕩平嘉禾秀草争出而葩華荑實爛然在目矣此碑在隋尤為文字淺陋者疑其俚巷庸人所為然視其字畫又非常俗所能盖當時流弊以為文章止此為佳矣文辭既爾無取而浮圖固吾儕所貶集本作鄙所以錄於此者第不忍棄其缺爾治平元年三月十六日書右真蹟隋李康清徳頌開皇十一年右李康清徳頌不著書撰人名氏文為聲偶而字畫竒古可愛康隴西狄道人也其碑首題云大隋冠軍将軍太中帥都督恒州九門縣令隴西李君清徳之頌予在河北時遣人於廢九門縣城中得此碑字多訛闕其後題十一年嵗在辛亥大将軍在酉二月癸丑朔十二日甲子建年上有二字訛闕不可識按隋書開皇十一年嵗在辛亥其二字乃開皇也大将軍在酉之説出於隂陽家前史不載而此碑見之右集本隋梁洋徳政碑開皇十一年右隋梁洋徳政碑在今蔡州新息隋開皇十一年行參軍事四字集本作參軍裴玉與州人為息州刺史梁洋建寳塔表徳政碑按隋書志後周於新息置息州至大業中州廢也右真蹟隋韓擒虎碑開皇十五年右韓擒虎碑不著書撰人名氏而以隋高祖為今上乃隋人所撰碑文屢言虎字獨於名下去之若避唐諱此不可知也今以碑文考隋書列傳其家世官勲大略多同惟其在齊為河長防主大都督車騎大将軍開府儀同三司白超防主轉洪超防主傳皆無之又遷和州刺史而傳為利州皆史官之闕誤當以碑為是而傳載閻羅王事甚怪而碑無之使其實有碑不宜集本作應不書以此見史家之妄也治平元年六月十日書右真蹟隋陳茂碑開皇十八年右陳茂碑不著書撰人名氏而字畫精勁可喜隋書列傳載茂事尤多闕繆傳云高祖為隋國公引為寮佐及受禪拜給事黄門侍郎在官十餘年轉益州總管司馬遷太府卿後數載卒而碑厯叙為高祖寮佐時官傳雖不書可也其自為黄門侍郎後又為行軍元帥長孫覽司馬又為蜀王府長史太僕卿判黄門侍郎上開府儀同三司梁州刺史等官史氏皆不書盖其闕也又據碑茂為蜀王長史而傳為益州總管司馬碑為太僕卿而傳云太府皆史家之繆也碑云茂字延茂史亦闕治平甲辰秋社日書右真蹟隋䝉州普光寺碑仁夀元年右䝉州普光寺碑䝉州者漢南陽郡之育陽縣也應劭曰育水出𢎞農盧氏南入於沔故後人於育加水為淯陽西魏置䝉州隋仁夀中改為淯州又為淯陽郡唐為縣屬金州碑仁夀元年建猶曰䝉州既而遂改淯州矣碑無書撰人名氏而筆畫遒美翫之亡集本作忘倦盖開皇仁夀以來碑碣字書多妙而往往不著名氏惟丁道䕶所書常自著之然碑石在者尤少余毎與蔡君謨惜之自大業已後率更與虞世南書始盛既接於唐遂大顯矣治平元年正月七日書右真蹟隋丁道䕶啓法寺碑仁夀二年此書兼後魏遺法與楊家本㣲異隋唐之交善書者衆皆出一法道䕶所得最多楊本開皇六年去此十七年書當益老亦稍縱也甲辰治平初月十日莆陽蔡襄記右啓法寺碑丁道䕶書蔡君謨博學君子也於書尤稱精鍳余所藏書未有不更其品目者其謂道䕶所書如此隋之晚年書學尤盛吾家率更與虞世南皆當時人也後顯於唐遂為絶筆余所集錄開皇仁夀大業時碑頗多其筆畫率皆精勁而往往不著名氏毎執卷惘然為之歎息惟道䕶能自著之然碑刻在者尤少余家集錄千卷止有此爾有太學官楊褒者喜收書畫獨得其所書興國寺碑是梁正明中人所藏君謨所謂楊家本者是也欲求其本而不知碑所在然不難得則不足為佳物古人亦云百不為多一不為少者正謂此也治平元年立春後一日太廟齋宫書右真蹟隋鉗耳君清徳頌大業六年右不著書撰人名氏其碑首題云大隋恒山郡九門縣令鉗耳君清徳之頌大業六年建字畫有非歐虞之學不能至也碑云君名文徹華隂朝邑人也本周王子晉之後避地西戎世為君長因以地為姓曽祖静仕魏為馮翊太守祖朗成集二州刺史父康周荆安寧鄧四州總管别駕安陸龍門二郡守而前史皆不載碑在今廢九門縣中余為河北轉運使時求得之右集本隋廬山西林道場碑大業十三年右廬山西林道場碑渤海公撰公為隋太常博士時作不著書人名氏而字法老勁疑公之書也西林道場者偽趙将竺氏捨俗出家名曇現始居於此晉太和二年光禄卿陶範始為現弟子慧永造寺而號西林按两京記隋嘗更名佛寺為道場此碑大業十三年建也顔魯公偶題碑隂百餘字尤竒偉今附於碑後右集本又右西林道場碑渤海公撰公在隋為太常博士時作不著書人名氏字畫遒勁世或以為公自書公時年尚少又字法與公書不同不知何人書也按集本有韋述二字两京記隋改佛寺為道場此碑大業中建故謂之道場也右真蹟唐孔子廟堂碑武徳九年右孔子廟堂碑虞世南撰并書余為童見時嘗得此碑以學書當時刻畫完好後二十餘年復得斯本則殘缺如此二字集本作矣因感夫物之終弊雖金石之堅不能以自久於是始欲集錄前世之遺文而藏之殆集本作逮今盖十有八年而得千卷可謂富哉嘉祐八年九月二十九日書右真蹟千文後虞世南書嵗月未詳右虞世南所書言不成文乃信筆偶然爾其字畫精妙平生所書碑刻多矣皆莫及也豈矜持與不用意便有優劣耶集本作也熈寧辛亥續右真蹟唐徳州長夀寺舍利碑武徳六年右徳州長夀寺舍利碑不著書撰人名氏碑武徳中建而所述乃隋事也其事迹文辭皆無取獨錄其書爾余屢歎文章至陳隋不勝其弊而怪唐家能臻致治之盛而不能遽革文弊以謂積習成俗難於驟變及讀斯碑有云浮雲共嶺松張盖明月與巖桂分叢迺知王勃云落霞與孤騖齊飛秋水共長天一色當時士無賢愚以為警絶豈非其餘習乎右集本唐幽州昭仁寺碑貞觀三年右昭仁寺碑在幽州唐太宗與薛舉戰處也唐自起義與羣雄戰處後皆建佛寺云為陣亡士薦福湯武之敗桀紂殺人固亦多矣而商周享國各集本作皆數百年其荷天之祐者以其心存大公為民除害也唐之建寺外雖託為戰亡之士其實自贖殺人之咎爾其撥亂開基有足壮者乃區區於此不亦陋哉碑文朱子奢撰而不著書人名氏字畫甚工此余所錄也治平甲辰秋分後一日書右真蹟唐吕州普濟寺碑貞觀六年許敬宗撰右吕州普濟寺碑吕州者霍邑也唐高祖義兵起太原始破宋老生於此義寧元年乃以霍邑趙城汾西靈石四縣置霍山郡武徳元年更曰吕州太宗十七年遂廢也右集本唐衛國公李靖碑顯慶三年當載於後同是許敬宗撰附此右李靖碑許敬宗撰唐初承陳隋文章衰弊之時作者務以浮巧為工故多失其事實不若史傳為詳惟其官封頗備史云為撫慰使而碑云安撫使其義無異而後世命官多襲古號盖靖時未嘗有撫慰使也由是言之不可不正又靖為刑部尚書時以本官行太子左衛率其封衛國公也授濮州刺史盖太宗以功臣為世襲刺史後雖不行皆史宜書集本有而不書者闕也六字其餘略之可也故聊志之治平元年三月二十二日書右真蹟唐顔師古等慈寺碑貞觀二年右等慈寺碑顔師古撰其寺在鄭州氾水唐太宗破王世充竇建徳乃於其戰處建寺云為陣亡士薦福唐初用兵破賊處多大抵皆造寺自古創業之君其英豪智略有非常人可及者矣至其卓然信道而知義則非積學誠明之士不能到也太宗英雄智識不世之主而牽惑習俗之弊猶崇信浮圖豈以其言浩博無窮而好盡物理為可喜耶盖自古文姦言以惑聼者雖聰明之主或不能免也惟其可喜乃能惑人故余於集本有其字本紀譏其牽於多愛者謂此也治平元年清明後一日書右真蹟隋郎茂碑貞觀五年右隋郎茂碑李百藥撰其弟頴亦有碑在今鎮府北大墓林中余為都轉運使時得之隋書列傳言茂卒於京師此碑云從幸江都而卒史氏之繆當以碑為正右真蹟又碑在大墓林中余為都運使時得之迨今盖二十年矣嘉祐八年三月二十二日上御延和放進士許将等及第明日歇泊假閒閲遂書隋書列傳言茂卒於京師此碑云從幸江都而卒史氏之繆當以碑為正焉右真蹟唐郎頴碑貞觀五年右唐郎頴碑李百藥撰宋才書字畫甚偉頴父名基字世業而李百藥書頴世次但云父世業又書頴兄茂碑亦然考其碑文有皇基締構之言則基字當時公私無所諱避而於書世次四字集本作百藥書頴父字而不名不詳其義也是以君子貴乎博學集本有頴事唐為大理卿隋唐之時屢定律令盖法吏也一十九字嘉祐八年九月二十四日書右真蹟唐郎頴碑隂題名嵗月未詳右郎頴碑隂題名柱國府僚佐三十二人常山公府國官一百七人合一百三十九人為一卷柱國府長史司馬掾屬各一人諮議記室司倉司功司戸司兵司鎧司法司田司士參軍事各一人又有參軍事五人行參軍十人典籖三人常山國官國令大農各一人常侍侍郎國尉各二人典衛六人舍人四人城局廟長學官各一人食官廐牧各四人典府長一人典府丞二人親事七十五人頴以貞觀四年卒此盖唐制也右集本唐九成宮醴泉銘貞觀六年右九成宮醴泉銘唐秘書監魏徴撰歐陽率更書九成宮即隋仁夀宮也太宗避暑於宮中而乏水以杖琢地得水而甘因名醴泉焉右集本唐歐陽率更臨帖嵗月未詳同是率更書附此右率更臨帖吾家率更蘭臺世有清徳其筆法精妙迺其餘事豈止士人模楷雖海外夷狄皆知為貴而後裔所宜勉旃庻幾不殞其美也右真蹟唐岑文本三龕記貞觀十五年右三龕記唐兼中書侍郎岑文本撰起居郎禇遂良書字畫尤竒偉在河南龍門山山夾伊水東西可愛俗謂其東曰香山其西曰龍門龍門山壁間鑿石為佛像大小數百多後魏及唐時所造惟此三龕像最大乃魏王泰為長孫皇后造也右集本唐孟法師碑貞觀十六年右孟法師碑唐岑文本撰禇遂良書法師名静素江夏安陸人也少而好道誓志不嫁隋文帝居之京師至徳宮至唐太宗十二年卒年九十七右集本唐皇甫忠碑貞觀十四年右皇甫忠碑著作佐郎李儼撰忠為泰州龍門令嵗滿縣民前左勲衛裴公隐等一千二百人申省請留八座報云公等請來遲晚縣令今已替訖好人堪用縣國共須豈一縣士庻獨懐恡或作怯惜所請不允忠以唐太宗時為令當時臺省文字如此可愛泰州者義寧元年以河中之汾隂龍門置治汾隂武徳二年徙治龍門太宗十七年州廢今碑後列縣人姓名有錄事鄉長鄉老里正縣博士助教佐缺今之縣吏惟錄事里正其名在爾右集本唐辨法師碑顕慶三年當載於後同是李儼撰附此右辨法師碑李儼撰薛純陀書純陀唐太宗時人集本有也字其書有筆法其遒勁精悍不減吾家蘭臺意其當時必為知名士而今世人無知者然其所書亦不傳於後世余家集錄可謂博矣所得純陀書祗此而已如其所書必不止此而已也盖其不幸堙沉泯滅非余偶錄得之則遂不見於世矣迺知士有負絶學高世之名而不幸不傳於後者可勝數哉可勝歎哉治平元年閏五月晦日書右真蹟唐孔頴逹碑貞觀二十二年右孔頴逹碑于志寧撰其文磨滅然尚可讀今以其可見者質於唐書列傳傳所缺者不載頴逹卒時年夀其與魏鄭公奉勅共修隋書亦不著又其字不同傳云字仲逹碑云字冲逺碑字多殘缺惟其名字特完可以正傳之繆不疑以冲逺為仲逹以此知文字轉易失其真者何可勝數幸而因余集錄所得以正其訛舛者亦不為少也乃知余家所藏非徒翫好而已其益豈不博哉集本無此六字治平元年端午日書右真蹟唐薛稷書貞觀永徽之間薛稷書刻石者余家集錄頗多與墨蹟互有不同唐世顔柳諸家刻石者字體時時不類謂由模刻人有工拙昨日見楊褒家所藏薛稷書君謨以為不類信矣凡世人於事不可一槩有知而好者有好而不知者有不好而不知者有不好而能知者褒於書畫好而不知者也畫之為物尤難識其精粗真偽非一言可逹得者各以其意披圖所賞未必是秉筆之意也昔梅聖俞作詩獨以吾為知音吾亦自謂舉世之人知梅詩者莫吾若也吾嘗問渠最得意處渠誦數句皆非吾賞者以此知披圖所賞未必得秉筆之人本意也右集本唐益州學館廟堂記永徽元年顔有意書高朕之名於義不安頗疑有意得於古碑之訛缺爾存之以俟博學者右集本唐徐王元禮碑咸亨三年右徐王元禮碑崔行功撰趙仙客書元禮唐高祖子也以碑考傳年夀官閥悉同而碑云使持節徐譙泗三州諸軍事徐州刺史又云贈太尉使持節大都督冀相貝滄徳缺魏博等八州諸軍事冀州刺史傳云為徐州都督又云贈冀州大都督傳既簡略又都無法而碑之所書亦失也盖刺史非兼州之官都督非一州之號碑云持節徐譙泗三州諸軍而傳獨為徐一州刺史此其失也當如前史持節秦凉州諸軍事秦凉二州刺史乃為得爾其書贈官則如碑之書是矣盖為一州刺史而兼督八州軍集本有州字事爾都者有所兼總之名也此特小故而余區區辯之者前史失之久矣又國朝自削方鎮之權而節度使都督無復兼州而舊名不除是節度都督自施於已此不可不正其失也治平甲辰中元日書右真蹟唐龍興宮碧落碑咸亨元年右碧落碑在絳州龍興宮宮有碧落尊像篆文刻其背故世傳為碧落碑據李璿之以為陳惟玉書李漢以為黄公譔書莫知孰是洛中紀異云碑文成而未刻有二道士來集本無此字請刻之閉戸三日不聞人聲人怪而破戸有二白鴿飛去而篆刻宛然此説尤怪世多不信也碑文言有唐五十三祀龍集敦䍧乃高宗總章三年嵗在庚午也又云哀子李訓誼譔諶為妣妃造石像按唐書韓王元嘉有子訓誼譔而無諶又有㓜子訥元嘉以則天垂拱四年見殺在總章三年集本有立碑二字後十八年集本有史字有子訥不足怪而不應無諶盖史官之闕也嘉祐八年十月四日書右真蹟唐智乗寺碑咸亨四年右智乗寺禪院集本有碑字者唐鄭惠王所作也惠王名元懿高祖第十三子也有子十人列於碑後而第五子樂陵公闕其名按唐書宗室世系表集本作譜樂陵公名球不知集本有碑字何為獨闕也今唐書年表以嗣王敬為璥樂平公珪為樂安公新平公璲為遂三者皆史家之失當以碑為正世系譜牒嵗久傳失尤難考正而碑碣皆當時所刻理不得差故集古所錄於前人世次是正頗多也治平元年清明前一日書右真蹟唐呉廣碑總章二年右呉廣碑不著書撰人名氏而字畫精勁可喜廣字黒闥唐初與程知節秦叔寳等俱從太宗征伐後與殺建成有功至高宗時為洪州都督以卒然唐書不見其名氏惟會要列陪𦵏昭陵人有洪州刺史呉黒闥亦不知其名廣也其名字事蹟幸見於後世者以有斯碑也碑字稍磨滅世亦罕見獨余集錄得之遂以傳者以其筆畫之工也故余嘗為蔡君謨言書雖學者之餘事而有助於金石之傳者以此也治平元年八月八日書右真蹟唐九門縣西浮圖碑上元三年右九門縣西浮圖碑唐應詔四科舉董行思文清河傅徳節書題云九門縣合鄉城人等為國建浮屠之碑浮圖在智矩寺中寺今亦廢碑上元三年建按唐有两上元此碑云嵗在丙子乃高宗上元三年也肅宗上元三年嵗在壬寅爾右集本唐陶雲徳政碑永淳三年右唐申州錄事張義感撰雲字夫舉河南伊闕人也高宗時為恒州刺史碑永淳三年立予為河北轉運使至真定府見碑仆在府門外半埋地中命工掘出立於廡下字為行書筆蹟遒麗而不著書者姓名惜哉右真蹟隋汎愛字碑大業五年誤寘此李伯藥集本作樂下同字僅存其下磨滅而書字尤可辨疑此碑伯藥自書字畫老勁可喜秋署鬱然覽之可以忘勌治平丙午孟饗攝事齋宮書南譙醉翁六一居士右真蹟老子廟碑元第二百四尒朱敞碑元第三百三十五殘闕一作缺龍藏字碑元第十七又已廢一作今廢太平寺碑元第四百四十六李康清徳頌元第二十八梁洋徳政碑元第二百二十九韓擒虎碑元第九百九十二陳茂碑元第八百二普光寺碑元第二百五十啓法寺碑元第二百五十三鉗耳君清徳頌元第三十九西林道場碑元第十五孔子廟堂碑元第一童児一作児童虞世南書元附四十六續此下亦有附字長夀寺舍利碑元第四百四十四治平元年三月十六日書一有此十字致治一作至治昭仁寺碑元第七百九十二普濟寺碑元第三百二十三廢也一無也字李靖碑元第四百六十四等慈寺碑元第四百三十二郎茂碑元第十八又為都此下一有轉字延和此下一有殿字正焉一無焉字郎頴碑元第十九郎頴碑隂題名元第二十九成宫醴泉銘元第七十七率更臨帖元第五百五十四美也一無也字三龕記元第三十四至三十五孟法師碑元第三十六皇甫忠碑元第六百三十五佐郎一無佐字縣國一作國字為令一作去縣治平元年五月二日書一有此九字辨法師碑元第八百八十二孔頴逹碑元第六百七十二薛稷書元無卷第有不好而不知者有不好而能知者一作有不好而知者有不好而不能知者得者一作之益州學館廟堂記元第一百二十二徐王元禮碑元第九百三十九碧落碑元第十三智乗寺碑元第四百一十七何為此下一有而字呉廣碑元第九百四十八九門縣西浮圖碑元第七十五智知一作炬陶雲徳政碑元第十二真定府一無府字汎愛寺碑元第六百此碑在邢州隋大業五年立合次啓法寺碑誤寘卷末集古錄卷五
