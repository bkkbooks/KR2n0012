body:
  text: 集古錄卷六宋歐陽修撰唐八都壇實錄嵗月見本文右八都壇實錄撰人名元質不見其姓又不著書人名氏其字畫亦可愛碑首題云大唐八都壇神君之實錄其文云都望八山之始壇也此地名山封龍之類有八因壇立廟遂為號焉封龍山今在鎮州其餘七山不見其名又云漢光和中有碑而今亡此碑垂拱三年立右集本唐魏載墓誌銘嵗月見本文右魏載墓誌銘其序云祖徴諡曰文正父叔玉光禄卿載以𢎞文生對策居甲授太常寺奉禮郎以疾謝職尋調懐州司兵參軍屬惟集本作維下同揚詭道不戢斯焚譴及宗姻旋加此累以垂拱三年終於嶺外春秋三十有二所謂惟揚詭道者乃徐敬業起兵於揚州誅武后不克也時敬業以前􅉦厔尉魏思温為軍師集本作帥所謂譴及宗姻者疑敬業敗載坐思温竄死嶺南耳今據新唐書宰相世系表鄭公諸房都無思温及載而叔玉但著一子膺為祕書丞豈載以官卑貶死無後而歿不見耶載死不幸而家譜不錄史官不書八字集本作家譜史官不錄非事載斯誌而誌錄於余其遂泯滅於無聞乎治平元年四月二十三日書右真蹟唐乙速孤神慶碑載初元年右乙速孤神慶碑𢎞文舘學士苗神客撰神慶唐初仕三衛高宗時為太子右虞候副率以卒乙速孤氏在唐無顯人惟以其姓見於當時者神慶一人而已元和姓纂但云代人隨魏南徙而已其叙神慶世次又多闕繆而此碑所載頗詳云其先王氏太原人有闕文代祖顯為後魏驃騎大将軍賜姓乙速孤氏遂為京兆醴泉人曽祖貴隋河州刺史和仁郡公祖安隋益州都督父晟唐驃騎将軍乙速孤氏世無可稱而其姓出夷狄莫䆒其詳惟見於此碑者可以補姓纂之略以備考求故特錄之右集本唐薛仁貴碑天寳二年右薛仁貴碑苖神客撰云公諱禮字仁貴河東河隂人也唐書列傳云仁貴絳州龍門人又不云名禮余家集錄薛氏碑尤多據仁貴子楚玉碑亦云父仁貴爾仁貴為唐名将當時甚顯著往往見於他書未嘗有云薛禮者仁貴本田家子奮身行陣其僅知姓名爾其曰名禮字仁貴者疑後世文士或其子孫為増之也列傳又載仁貴䧏九姓事云軍中為之歌曰将軍三箭定天山戰士長歌入漢闗仁貴卒於永淳中碑以天寳中建不載漢闗之歌不應遺畧疑時未有此歌五字集本作當時無此歌亦為後人所増爾治平元年端午日書右真蹟唐尹氏闕文嵗月見本文右尹氏闕文在襄州題云唐孝子尹仁恕闕萬嵗通天二年旌表萬嵗通天則天之年號也可謂昏亂之世矣然尹氏猶見旌表孔子以謂忠信可行於蠻貊信矣孝悌見尊於昏亂也唐尹孝子旌表文嵗月闕唐之致治之意深矣嗚呼不得而見矣此碑尤可惜也右集本唐孝子張常洧旌表碣貞觀五年誤雕在此右唐孝子張常洧旌表碣文字磨滅僅可見其髣髴盖孝悌之為名人之所甚慕而旌表非為一世勸也故特錄之者惜其将遂不見於後世也其文辭筆畫亦自可佳然不専取乎此也右集本唐渭南令李君碑聖厯元年右鴻州渭南縣令李君徳清碑馬吉甫撰按唐書則天天授二年析雍州之渭南慶山置鴻門縣遂以慶山鴻門渭南高陵櫟陽置鴻州大足二年廢治平二年正月十四日書右真蹟同前右渭南令李君碑其首題云大周鴻州渭南縣按新唐書則天天授二年析雍州之渭南慶山置鴻門縣遂因渭南慶山鴻門高陵以置鴻州大足二年州廢矣右集本唐流杯亭侍宴詩嵗月見本文右流杯亭侍宴詩者唐武后久視元年幸臨汝湯留宴羣臣應制詩也李嶠序殷仲容書開元十年汝水壊亭碑遂沉廢至貞元中刺史陸長源以為嶠之文仲容之書絶代之寳也乃復立碑造亭又自為記刻其碑隂武氏亂唐流毒天下其遺跡宜為唐人所棄而長源當時號稱賢者乃獨區區於此何哉然余今又錄之盖亦以仲容之書可惜是以君子患乎多愛右真蹟同前右流杯亭侍宴詩者唐武后久視元年幸汝州温湯羣臣應制詩也李嶠序殷仲容書開元中汝水壊其碑亭碑亦沉沒貞元中陸長源為刺史以為嶠序仲容書絶代之寳也乃為之造亭立碑自記其事於碑隂武氏亂唐毒流天下其遺跡宜為唐人所棄而長源當時賢者區區於此何哉然余今又錄之者特以仲容書爾是以君子患乎多愛右集本唐司刑寺大脚跡勅長安二年右司刑寺大脚跡并碑銘二閻朝隐撰附詩曰匪手擕之言示之事盖諭昏愚者不可以理曉而决疑惑者難用空言雖示之已驗之事猶懼其不信也此自古聖賢以為難語曰中人以下不可以語上者聖人非棄之也以其語之難也佛為中國大患非止中人以下聰明之智一有惑焉有不能解者矣方武氏之時毒被天下而刑獄慘烈不可勝言而彼佛者遂見光蹟於其間果何為哉自古君臣事佛未有如武氏之時盛也視朝隐等碑銘可見矣然禍及生民毒流王室亦未有若斯之甚也碑銘文辭不足錄錄之者所以有集本無此字警也俾覽者知無佛之世詩書雅頌之聲斯民䝉福者如彼有佛之世其金石文章與其人之被禍者如此可以少思焉嘉祐八年重陽後一日書右真蹟唐韓覃幽林思武后時右幽林思廬山林藪人韓覃撰余為西京留守推官時因遊嵩山得此詩愛其辭翰皆不俗後十餘年始集古金石之文發篋得之不勝其喜余在洛陽凡再登嵩嶽其始往也與集本作以梅聖俞揚子聰俱其再往也與謝希深尹師魯王㡬道揚子聰俱當發箧見此詩以入集時謝希深揚子聰已死其後師魯㡬道聖俞相繼皆死盖遊嵩在天聖十年是嵗改元明道余時年二十六距今嘉祐八年盖二十一年矣遊嵩六人獨余在余感物追往不勝二字集本作可為愴然六月旬休日書右真蹟唐武盡禮寧照寺鍾銘景龍三年右武盡禮筆法精勁當時宜自名家而唐人未有稱之見於文字者豈其工書如盡禮者往往皆是特今人罕及爾余每得唐人書未嘗不嘆今人之廢學也右真蹟唐韋維善政論先天元年右韋維善政論著作郎楊齊哲撰維先天中為坊州刺史齊哲所撰其實徳政碑也特異其名爾余嘗患文士不能有所發明以警未悟而好為新竒以自異欲以怪而取名如元結之徒是也至於樊宗師遂不勝其弊矣如齊哲之文初無高致第易碑銘為論賛爾右集本唐令長新戒開元中右令長新戒唐開元之治盛矣𤣥宗嘗自擇縣令一百六十三人賜以丁寧之戒其後天下為縣者皆以新戒刻石今猶有存者余之所得者六世人皆忽不以為貴也𤣥宗自除内難遂致集本作至太平世徒以為英豪之主然不知其興治之勤用心如此可謂為政知本末矣然鮮克有終明智所不免惜哉新戒凡六其一河内其二虞城其三不知所得之處其四氾水其五穰其六舞陽嘉祐八年六月十日書右真蹟唐華陽頌天寳九年右華陽頌唐𤣥宗詔附𤣥宗尊號曰聖文神武皇帝可謂盛矣而其自稱曰上清弟子者何其陋哉方其肆情奢淫以極富貴之樂盖窮天下之力不足以贍其欲使神僊道家之事為不無亦非其所可冀矧其實無可得哉甚矣佛老之為世惑也佛之徒曰無生者是畏死之論也老之徒曰不死者是貪生之説也彼其所以貪畏之意篤則棄萬事絶人理而為之然而終於無所得者何哉死生天地之常理畏者不可以苟免貪者不可以苟得也惟積習之久者成其邪妄之心佛之徒有臨死而不懼者妄意乎無生之可樂而以其所樂勝其所可畏也老之徒有死者則相與諱之曰彼超去矣彼觧化矣厚自誣而託之不可詰或曰彼術未至故死爾前者苟以遂其非後者從而惑之以為誠然也佛老二者同出於貪而所習則異然猶必棄萬事絶人理而為之其貪於彼者厚則捨於此者果若𤣥宗者方溺於此而又慕於彼不勝其勞是真可笑也右集本唐有道先生葉公碑開元五年右有道先生葉公碑李邕撰并書余集古所錄李邕書頗多最後得此碑於蔡君謨君謨善論書為余言邕之所書此為最佳也右真蹟唐李邕嵩嶽寺碑開元二十七年右嵩嶽寺碑唐淄州刺史李邕撰胡英書英之書世所重也其文云寺後魏孝明帝之離宫初名閒居寺仁夀二年改為嵩嶽寺也右集本唐李邕端州石室記開元十五年右端州石室記唐李邕撰不著書人名氏考其筆蹟似張庭珪書疑庭珪所書也右集本唐獨孤府君碑嵗月闕右獨孤府君碑李邕撰蕭誠書誠書世多有而此尤佳碑在峴山亭下余自夷陵徙乾徳令嘗登峴山讀此碑碑為四面而一面字完今人家所傳祗有一面而余所得有二面故其一面頗有訛缺也府君諱冊字伯謀河南人也其文不完故不見其終始右集本同前嵗月闕右碑在峴山亭下余自夷陵徙乾徳令嘗登峴山讀此碑碑為四面而一面字完人家多有之而余所得盖二面也故其一面頗有訛缺也蕭誠書世數數有之而此尤佳也右真蹟唐裴大智碑開元二十九年右裴大智碑李邕撰蕭誠書誠以書知名當時今碑刻傳於世者頗少余集錄所得纔數本爾以余之博求而得者止此故知其不多也然字畫筆法多不同疑模刻之有工拙惟此碑及獨孤冊碑字體同而最佳冊碑在襄陽而不完可惜也二碑皆李邕撰而誠書集本有焉字治平元年清明後一日書右真蹟唐張嘉正碑開元二十六年右張嘉正碑李邕撰蔡有鄰立書集本有按字李絳論事集言吐突承璀欲於安國寺為憲宗立紀聖徳碑乃先立碑建樓請學士撰文絳疏論以為不可憲宗遽命以牛百頭拽碑倒盖未撰文而先立碑建樓此碑有鄰又二字集本作文云立書亦應先立石矣今人立碑須鎸刻成文然後建立盖今昔所為不同各從其便爾治平元年七月二十日書右真蹟已上六碑類李邕所撰不以嵗月為序唐郭知運碑銘開元十年右郭知運碑銘蘇頲撰其書知運子四人皆有次第曰英傑英竒英協英彦而張説亦為集本有郭字知運撰碑其書知運子與頲集本有此碑二字正同而唐書知運傳書其子二人而無英竒英協英彦但云二子英傑英乂而已十八字集本作英傑英乂而無英竒英協英彦而蘇張三碑又無英乂英竒等三子在唐不顯史家集本作官闕畧而或有之英乂嘗為西川節度集本有使字其事甚著史官不應失集本作差其世家而集本有蘇張二字二公作銘在郭知運卒後不逺亦不應闕其子孫莫可䆒其孰失也姑志集本作誌之以俟知者嘉祐八年十月十八日書右真蹟唐御史臺精舍記開元十一年右御史臺精舍記崔湜撰梁昇卿書讀其文則湜於佛可為疑篤信者矣唐書列傳云桓彦範等當國畏武三思使湜隂伺其姦而三思恩寵日盛湜反以彦範等計告之遂勸三思速殺彦範等以絶人望因薦其外兄周利正以害彦範等又云湜貶襄州刺史以譙王事當死賴劉幽求張說救䕶得免後為宰相陷幽求嶺表諷周利正殺之不果又與太平公主逐張説其餘傾邪險惡不可勝計世言佛之徒能以禍福怖小人使不為惡又為虚語矣以斯記之言驗湜所為可知也故録之於此其碑首題名多知名士小字頗佳可愛也治平元年三月九日書右真蹟唐西嶽大洞張尊師碑開元十四年右西嶽大洞張尊師碑王延齡撰李慈書尊師名敬忠其事迹余無所取所錄者以慈書爾慈之書體兼虞禇而遒麗可喜然不知為何人以其書當時未必不見稱於世盖唐人善書者多遂不得獨擅既又無他可稱遂至泯然於後世以余集録之博慈所書碑祗得此爾尤為可惜也治平元年七月二十日書右真蹟唐景陽井銘開元二十一年右景陽樓下井銘不著撰人名氏述隋滅陳叔寳與張麗華等投井事其後有銘以為集本作著戒又有唐江寧縣丞王震井記云井在興嚴寺其石檻銘有序稱余者晉王廣也其文字皆磨滅僅可識其十一二叔寳事前集本無此字史書之甚詳不必見於此然録之以見煬帝躬自滅陳目見叔寳事又嘗自銘以為戒如此及身為淫亂則又過之豈所謂下愚之不移者哉今其銘文隐隐尚可讀處有云前車已傾負乗将沒者又可歎也嘉祐八年十二月二十六日書右真蹟唐華嶽題名嵗月見本文右華嶽題名自唐開元三十三年訖後唐清㤗二年實二百一年題名者五百集本有十字一人再題者又三十一人集本有錄為十卷四字往往當時知名士也或兄弟同遊或子侄竝侍或寮屬将佐之咸在或山人處士之相携或奉使奔命有行役之勞或窮高望逺極登臨之適其富貴貧賤歡樂憂悲非惟人事百端而亦世變多故開元二十三年集本有嵗在二字丙午集本作子是嵗天子集本有躬字耕籍田肆大赦羣臣方頌太平請封禪盖有唐極盛之時也清㤗二年集本有嵗在二字乙未廢帝簒立之明年也是嵗石敬瑭以太原反召契丹入自鴈門廢帝自焚於洛陽而晉高祖入立盖二字集本作事太原五代極亂之時也始終二百年間或治或亂或盛或衰而往者來者先者後者雖窮逹夀夭參差不齊而斯五百人者卒歸於共盡也其姓名嵗月風霜剥裂亦或在或亡其存者獨五集本作有千仞之山石爾故特録其題刻每撫卷慨然何異臨長川而歎逝者也治平元年清明後一日書右真蹟唐石臺道徳經嵗月見本文右老子道徳經唐𤣥宗注開元二十三年道門威儀司馬秀等請於两京及天下應修官齋等州皆立石臺刋勒其經文御書其注皆諸王所書此本在懐州右集本唐羣臣請立道徳經臺奏答嵗月見本文右羣臣請立道徳經臺奏答并書注諸王列名附唐𤣥宗諸子三十人其一是為肅宗其七不及得封而早夭唐書列傳所載二十二人以注經列名於此者十八人按集本有明皇既書道徳經七字道士尹愔奏請懐州依京様摹勒石臺乃開元二十五年也皇太子瑛以二十五年廢二十六年始立忠王璵為皇太子二十七年始更名紹則當書注時不得有皇太子紹也信王珵義王玼豊王珙陳王珪凉王璿汴王璥皆以二十一年封當書注時皆年尚㓜集本有疑字未能書而集本作又今經注字皆一體疑非諸王所書而後人追寓其名爾舊唐書以信王珵為瑝濟王環為瓌夀王琩為瑁瑁名集本有别字見於武惠妃碑為琩與此同當為瑁也集本無也字有不疑而三字此碑列名既可疑則瓌瑝二名未知孰是也嘉祐八年癸卯九月十日書右真蹟唐陕州盧奐㕔事讃開元二十四年右盧奐㕔事讃唐𤣥宗撰并書奐為陕州刺史𤣥宗行幸過陕州書其㕔璧而刻之右集本唐鶺鴒頌嵗月向當皇祐至和之間余在廣陵有勅使黄元吉者以唐明皇自書鶺鴒頌本示余把玩久之後二十年獲此石本於國子博士楊裒又三年來守青州始知刻石在故相沂公宅熈寧三年五月二十八日書右集本唐𤣥宗謁𤣥元廟詩嵗月闕右謁𤣥元廟詩唐𤣥宗撰并書余嘗見世有𤣥宗所書鶺鴒頌與此字法正同碑在北邙山上洛陽人謂之老君廟也右集本唐裴光庭碑嵗月見本文右裴光庭碑張九齡撰𤣥宗御書按唐書列傳云光庭素與蕭嵩不平及卒博士孫琬希嵩意以其用循資格非奨勸之誼諡曰克平帝間特賜諡曰忠憲今碑及題額皆為忠獻傳云撰榣集本作瑶山往則而碑云往記光庭以開元二十一年薨二十四年建此碑𤣥宗自書不應誤皆當以碑為是集本有也字治平元年三月二十日書右真蹟唐萬回神迹記碑開元二十五年右萬回集本有神迹記三字碑徐彦伯撰其事固已集本作可怪矣𤣥宗英偉之主彦伯當時名臣也而君臣相與尊寵稱述之如此欲使愚庸之人不信不惑其可得乎世傳道士罵老子云佛以神怪禍福恐動世人俾皆信嚮集本有故僧尼得享豊饒七字而爾徒二字集本作喜老于高談清浄遂使我曺寂寞此雖鄙語有足采也治平元年三月八日書右真蹟唐安公美政頌開元二十九年右安公美政頌房璘妻高氏書安公者名庭堅其事蹟非竒而文辭亦非佳作惟其筆畫遒麗不類婦人所書余所集本無此字集錄亦已博矣而婦人之筆二字集本作筆畫著於金石者高氏一人而已然余常與蔡君謨論書以謂書之盛莫盛於唐書之廢莫廢集本作盛於今余之所錄如于頔高駢下至集本有楷書手三字陳遊􅅛等書皆有盖集本有唐之二字武夫悍将暨楷書手輩字皆可愛今文儒之盛其書屈指可數者無三四人非皆不能盖忽不為爾唐人書見於今而名不知於當時者如張師丘繆師愈之類盖集本有又字不可勝數也非余錄之則将遂泯然於後世矣余於集古不為無益也夫治平元年正月十三日書右真蹟唐石璧寺鐵彌勒像頌開元二十九年右太原府交城縣石璧寺鐵彌勒像頌者集本有林諤撰三字參軍房璘妻高氏書余所集錄古文自周秦以下訖於顯徳凡為千卷唐居其十七八其名臣顯逹下至山林幽隐之士所書莫不皆有而婦人之書惟此高氏一人爾然其所書刻石存於今者惟此頌與安公美政頌爾二碑筆畫字體逺不相類殆非一人之書疑模刻不同亦不應相逺如此又疑好事者寓名以為竒也識者當為辨之治平元年端午日書右真蹟唐郎官石記嵗月闕右唐右司員外郎陳九言撰張旭書旭以草書知名缺字真楷可愛記云自開元二十九年已後郎官姓名列於次而此本止其序爾右集本唐開元聖像碑天寳元年右開元聖像碑陳知温書唐開元之治盛矣至於天寳而溢焉方其盛時人主意氣之驕超然遂欲追真僊於雲表其夣寐恍忽集本作惚云有見焉者雖是非真偽難明於杳藹亦其注心於物精神會通集本作通會志苟至焉無不獲也唐書著集本作紀𤣥宗事至於神仙道家頗集本作類不詳悉而此碑所集本無此字載夣真容事最備故特錄之以見其集本作當時君臣吁俞相與言語者止於如集本無此字此俾覽者得以迹其盛衰治亂云右真蹟唐大照禪師碑嵗月見本文右大照禪師碑唐吏部員外郎盧僎撰伊闕縣尉集賢院待制兼校理史惟則書碑天寳元年立唐八分書名家者四人而已韓擇木李潮蔡有隣及惟則也右集本唐舞陽侯祠堂碑嵗月見本文右舞陽侯祠堂碑唐王利器撰史惟則八分徐浩篆額天寳二年縣令張紫陽修樊噲廟文及書篆皆可愛也右集本唐崔潭龜詩天寳五年右崔潭龜詩蔡有隣書唐世以八分名家者四人韓擇木蔡有隣李潮史惟則也韓史二家傳於世者多矣李潮僅有存者有隣之書亦頗難得而小字尤佳若石經藏讃崔潭龜詩與三代彜鼎銘何異右真蹟唐興唐寺石經藏讃開元中右興唐寺石經藏讃皆其作者自書而八分者數家惟蔡有隣著其姓氏有隣名重當世杜甫嘗稱之於詩其為苑咸所書小字與三代器銘何異可謂名實相稱也余家集錄有隣書頗多皆不若此讃故尤寳之余初不識書因集古著錄所閲既多遂稍識之然則人其可不勉强於學也治平元年三月晦日書右真蹟唐蔡有隣盧舍那珉像碑開元十六年右盧舍那珉像碑蔡有隣書在定州唐世名能八分者四家韓擇木史惟則世傳頗多而李潮及十七字集本作韓擇木等四家為最而有隣特為難得慶厯中今昭文韓集本作相公在定州為余得此本余所集錄自非衆君子共成之不能若此之多也右真蹟唐植栢頌天寳元年唐世八分四家而已韓擇木史惟則之書見於世者頗多蔡有隣甚難得而李潮僅有亦或作尒皆後人莫及也不惟筆法難工亦近時學者罕復専精如前軰也右集本唐美原夫子廟碑天寳八年右美原夫子廟碑縣令王嵒字山甫撰并書碑不知在何縣嵒天寳時人字畫竒怪初無筆法而老逸不覊時有可愛故不忍棄之盖書流之狂士也文字之學傳自三代以來其體隨時變易轉相祖習遂以名家亦烏有集本有定字法邪至魏晉以後漸分真草而羲獻父子為一時所尚後世言書者非此二人集本有則字皆不為法其藝誠為精絶然謂必為法則初何所據所謂集本無此二字天下孰知夫正法哉嵒書固自放於怪逸矣聊存之以備傳覽治平元年八月十一日書右真蹟唐鄭預注多心經天寳九年右鄭預注多心經不著書人名氏疑預自書盖開元天寳之間書體類此者數家如擣練石韓公井記洛祠志皆一體而皆不見名氏此經字體不減三記而注尤精勁盖他處未嘗有故錄之而不忍棄矧釋氏之書因字而見錄者多矣余每著其所以錄之意覽者可以察也治平元年夏至日大熱翫此以忘暑因書右真蹟八都壇實錄元第三十文云一作曰魏載墓誌銘元第五百六十四居甲一作高甲乙速孤神慶碑元第八百五十二代祖二字上一有五字治平甲辰社日書一有此七字薛仁貴碑元第六百五十二尹氏闕文元第一百六十二尹孝子旌表文元附一百六十二深矣此下一有乎字孝子張常洧旌表碣元第二百三十二渭南令李君碑元第一百一十九流杯亭侍宴詩元第二百二十二臨汝此下一有温字同前碑亭一無碑字司刑寺大脚跡勅元第五百一十二脚跡一作佛跡勅一作記若斯此下一有時字甚也一作盛也斯民一作人幽林思元第二十九寧照寺鐘銘元第五百九十六韋維善政論元第八百五十治平甲辰秋社日書一有此八字唐令長新戒元第三百九華陽頌元第二百一十七所以貪畏一作所貪所畏之心一作性或曰彼術未至故死爾一無此九字於彼此下一有其字笑也此下一有日字治平元年正月四日書一有此九字有道先生葉公碑元第二百四十為最一作最為嵩嶽寺碑元第一百十七端州石室記元第四十四獨孤府君碑元第四十七伯謀一作仲謀同前缺也一無也字裴大智碑元第四百三十五張嘉正碑元第六百二十二至六百二十三郭知運碑元第三十七知者此下一者注云莫缺碑與唐書云缺第七子也今互見者五人尚闕其二御史臺精舍記元第三百七十三張尊師碑元第六百七十景陽井銘元第二百六十皆磨一作皆室華嶽題名元第四百二十一至四百三十開元二十三年真蹟碑作丙午集本又作丙子其實嵗在乙亥其無嵗月不可次第者别為一卷第十跋後一有此十五字石臺道徳經元第三十七唐羣臣請立道徳經臺奏答元第十玼一作玭廬陵歐陽某家藏一有此七字廬奐㕔事讃元第九十二鶺鴒頌元一卷沂公唐𤣥宗謁𤣥元廟詩元第七十九裴光庭碑元第四百五十七萬回碑元第三百七十八安公美政頌元第二百五十二師立一作来鐵彌勒像頌元第六百七十七唐郎官石記元第九十八至一百開元聖像碑元第二百九十七嘉祐八年嵗在癸卯初伏日書一有此十二字大照禪師碑元第五十八舞陽侯祠堂碑元第六十三崔潭龜詩元第五百四十唐興唐寺石經藏讃元第二百八十六盧舍那珉像碑元第二百三十三至二百三十四余所集錄自五字一作所集植栢頌元第一百三十九植一作桐甚難一作盖難美原夫子廟碑元第九百七十七鄭預注多心經元第七百八十二集古録卷六
