body:
  text: 集古錄卷八宋歐陽修撰唐徐方回西墉記寶應缺年右西墉記唐徐方回撰方回云寳應中為南陽令得崔子玉所作平子銘末二十一字陷於㕔之西墉按今西鄂石本末句見在方回所得乃南陽半石之末也今又亡矣惜哉右集本唐禹廟碑大厯三年段李展書崔巨文傳於今者絶少皆不及此碑季展他所書亦不偉於此治平二年上元日書右真蹟唐崇徽公主手痕詩大厯四年右崇徽公主手痕詩李山甫撰崇徽公主者僕固懐恩女也懐恩在肅宗時先以二女嫁回紇其一嫁毗伽可汗少子後號登里可汗者是也其一不知所嫁何人唐書懐恩傳及回紇傳皆不載惟懐恩所上書自陳六罪有云二女逺嫁為國和親以此知其又嘗嫁一女爾此所謂崇徽公主者懐恩㓜女也懐恩既反引羌渾奴刺為邉患永泰中病死於靈武其從子名臣以千騎䧏唐大厯四年始以懐恩㓜女為集本有崇徽二字公主又嫁回紇即此集本有公主二字也治平元年三月八日書右真蹟唐僧懐素法帖大厯十二年右懐素唐僧字藏真特以草書擅名當時而尤見珍於今世予嘗謂法帖者乃魏晉時人施於家人朋友其逸筆餘興初非用意而自然可喜後人乃棄百事而以學書為事業至終老而集本無此字窮年疲弊精神而不以為苦者是真可笑也懐素之徒是已治平元年八月八日書右真蹟唐重摹呉季子墓銘大厯十四年右呉季子墓銘自前世相傳以為孔子所書據張從紳疑記云舊石堙滅開元中𤣥宗命殷仲容摸搭其書以傳然則開元之前已有本矣至大厯中蕭定又刋於石則轉相傳模失其真逺矣按孔子平生未嘗至呉以史記世家考之其歴聘諸侯南不踰楚推其嵗月蹤跡未嘗過呉不得親銘李子之墓又其字特大非古簡牘所容第以其名傳之久不可遽廢故錄之以俟博識君子右集本又右古篆文曰嗚呼有呉延陵季子之墓自前世相傳以為孔子所書據張從紳疑記云舊石堙滅開元中𤣥宗命殷仲容搨本遂傳於世然則開元以前已有刻石矣其後貞元中鄭播又為記盧國遷建堂樹碑則今本又非仲容所模者字亦竒偉莫知何人所書按孔子未嘗至呉以史記世家考之其歴聘諸侯南不踰楚推其嵗月蹤跡無過呉之理不得親銘季子之墓又其字特大非簡牘所容惟博物君子必能辨之右真蹟唐竇叔蒙海濤志大厯中右海濤志竇叔䝉撰其書六篇一曰海濤志二曰濤厯三曰濤日時四曰濤期五曰朔望體象六曰春秋仲月漲濤解余向在揚州得此誌甚愛之張於座右之壁冀於朝夕見也已而夜為風雨所壊其後求之凡十五年而復得斯本以示京師好事者皆云未嘗見也右集本唐鹽宗神祠記大厯中右鹽宗神祠記錢義方撰近時有尚書郎張席自言家寓解州為余言安邑解縣两池鹽事云夏月鹽南風來池面紫色湏㬰凝結如雪土人謂之漫生鹽而两池嵗役畦夫數百種鹽公私耗弊而州縣吏縁以為姦利棄漫生鹽不取誣其苦不可食席博學能言漢唐事尤詳為余復言前世鹽皆自生開元中姜師度為河中尹而鹽池涸始置鹽屯故唐格自開元後遂有畦夫營種之課席因上書論鹽漫生之利官遂罷畦夫而公私皆以為然而議者或害其事乃云漫生鹽味苦不可食或云暫結復銷不可畜聼者方惑其事余因讀義方所記乃云若隂陽調和鬼神驅造不勞人而擅其利與夫鑿泉煮海不相為謀由是知唐世鹽非營種為决可信義方大厯時為𣙜鹽使余家集錄古文不獨為傳記正訛繆亦可為朝廷决疑議也右集本唐鴈門王田氏神道碑代宗時右唐魏博節度使鴈門郡王田承嗣碑營田副使裴抗撰子緒碑節度判官丘綘撰按唐書列傳承嗣十一子維朝華繹綸綰緒繪純紳縉而緒次當第七此二碑皆以緒為第六子而無綰自緒而下有繪純紛縉與史不同二碑當時故吏所作必不誤盖史之繆也其文與字皆不嘉故余特錄其世次而已右真蹟唐李憕碑大厯四年右李憕碑李紓撰新唐書列傳云憕十餘子江涵渢瀛等同被害惟源彭免據李紓載憕于見於碑者實十二人曰右補闕彭汝州刺史深華隂丞渢左驍衛兵曺瀛硤石丞沆洪州别駕澥洛陽尉渭司農主簿汶又云公之薨也彭從𤣥宗南狩次公而歿深授任他郡其在洛陽者長子江第三子涵與華隂驍衛而又少子合六人皆從公殱於敵刃硤石而下與衆孫之在者僅以孩提免如紓所記憕子盡於是矣未嘗有源也紓但言衆孫孩亦不云有未名子也然則源者史家何從而得之據史言源為司農主簿以碑考之源當為汶也又據碑方憕歿於賊也彭深沆澥渭汶六子獲免而史惟云源彭此當以碑為正紓當代宗時為憕作碑自云與憕有通家之好㓜奉升堂之慶宜知憕事不繆也右集本唐甘棠館題名嵗月見本文右甘棠館題名自唐徳宗貞元以來止於會昌文字多已磨滅惟高元裕韋夏卿所書尚可讀甚矣人之好名也其功徳之盛固己書竹帛刻金石以垂不朽矣至於登高逺望行旅往來慨然寓興於一時亦必勒其姓名留於山石非徒徘徊俯仰以自悲其身世亦欲來者想見其風流夏卿所記留連感愴意不淺也如高韋二子皆當時知名士也史傳載之詳矣昔杜預沈碑漢水謂萬世之後谷或為陵庻㡬復出以見於世其為慮深矣然預之功業不待碑而自傳其區區於此者好名之弊也故士或勤一生以自苦或餓死空山之中甚者蹈水火赴刀鋸以就後世之名為荘生所笑者有矣故余於集古每得前世題名未嘗不錄者閔夫人之甚好名也右集本唐汾陽王廟碑貞元二年右郭子儀廟碑高參文其叙子儀功業不甚詳而載破墨姓處木討沙陁處宻事則唐書列傳無之盖子儀㣲時所厯集本作立其後遂立大勲宜乎史略不書也然唐書有處宻處月朱耶孤注等皆是西突厥薛延陁别部名號余於五代史為李克用求沙陁種類卒不見其本末而參謂處密為沙陁不知其何所據也按陳翃子儀家傳亦云討沙陁處墨十二姓與參所書頗同唐書轉宻為蜜當以碑為正右真蹟唐郭忠武公将佐略貞元十二年右忠武公将佐略陳翃撰忠武公者郭子儀也翃之所書亦為盛矣猶言得其六七盖其官至宰相者七人為節度使者二十八人尚書丞郎京尹者十人亷察使者五人據翃所得而書者實六十人而顯名於世者盖五十人雖喬琳周智光李懐光僕固懐恩等陷於禍敗然杜鴻漸黄裳李光弼光進之徒偉然名見於當時而垂稱於後世者亦不為少豈惟得失相當而已哉雖汾陽功業士多喜附以成名然其亦自有以得之也其忠信之厚固出其天性至於處富貴保功名古人之所難者謀謨之際宜亦得其助也治平甲辰秋社前一日書右真蹟唐濟瀆廟祭器銘貞元十三年右濟瀆廟祭器銘張洗撰碑云置齋郎六人唐自高宗以後官不勝其濫矣洗之所記乃開元時事州縣祠廟置齋郎六人可知其濫官之弊然史家不能詳載惟於碑刻偶見其一二爾治平甲辰秋分後一日中書東閣雨中書右真蹟唐神女廟詩貞元十四年右神女廟詩李吉甫丘𤣥素李貽孫敬騫等作余貶夷陵令時嘗泛舟黄牛峽至其祠下又飲蝦蟇碚水覽其江山巉絶窮僻獨恨不得見巫山之竒秀每讀數子之詩愛其辭翰遂錄之一有遂為佳玩字右集本唐馬寔墓誌銘貞元十四年右馬寔墓誌銘唐歐陽詹撰并書其文辭不工而字法不俗故錄之寔之事跡亦無足紀也右集本又詹之文為韓退之所稱遂傳於世然其不幸早死故其傳者不多刻石之文秪有此與福州佛記耳尤可惜也右真蹟唐石洪鍾山林下集序貞元二十年右鍾山林下集序者石洪為浮圖總悟作也石洪為處士而名重當集本作一時者以常為韓退之稱道也唐世號處士者為不少矣洪終始無佗可稱於人者而至今其名獨在人耳目由韓文盛行於時也而洪之所為與韓道不同而勢不相容也然韓常歎籍湜軰叛已而不絶之也豈諸子駁雜不能入於聖賢之域而韓子集本有獨字區區誨誘思援而出於所溺歟此孔孟之用心也治平元年八月八日書是日上以霖雨不止分命羣臣祈禱余祈於太社既歸而雨遂止某謹記右真蹟唐房太尉遺愛碑隂記元和六年同是石洪撰附此石洪文字罕見於後世故特錄之右見綿本拾遺唐賀蘭夫人墓誌貞元七年右賀蘭夫人墓誌唐陸贄撰或云贄書也題曰祕書監陸公夫人墓誌銘而贄自稱姪曽孫此石在常州一有陸監名齊望五字右集本唐陸文學傳咸通十五年右陸文學傳鴻漸自撰茶之見前史盖自魏晉以來有之而後世言茶者必本陸鴻漸盖為茶著書自其始也至今俚俗賣茶肆中嘗置一甆偶人於竈側云此號陸鴻漸鴻漸以茶自名於世久矣考其傳著書頗多曰君臣契三卷源解三十卷江表四姓譜十卷南北人物志十卷呉興厯官記三卷潮州刺史記一卷茶經三卷占夣三卷其多如此豈止茶經而已哉然其他書皆不傳右集本唐辨正禪師塔院記貞元中右辨正禪師塔院記徐峴書誠能行筆而少意思也往時石曼卿屢稱峴書曼卿多得顔柳筆其書與峴不類而逺過之不知何故喜峴書也余當曼卿在時猶未見峴書但聞其所稱曼卿歿已久始得此書遂錄之爾右真蹟唐韓退之盤谷詩序貞元中右韓退之送李愿歸盤谷序盤谷在孟州濟源縣貞元中縣令刻石於其側令姓崔其名浹今已磨滅其後書云昌黎韓氏知名士也當時退之官尚未顯其道未為當世所宗師故但云知名士也然當時送愿者為不少而獨刻此序盖其文章已重於時也以余家集本校之或小不同疑刻石誤集本世已大行刻石乃當時物存之以為佳翫爾其小失不足較也右真蹟唐韓退之題名元和四年已下七篇皆韓文公撰故不與别碑嵗月為叙右韓退之題名二皆在洛陽其一在嵩山天封宫石柱上刻之集本有記龍潭遇雷事六字天聖中余為西京留守推官與梅聖俞遊嵩山入天封宫裵回柱下而去遂登山頂至武后封禪處有石記戒人逰龍潭者毋妄語笑以黷神龍龍怒則有雷恐因念退之記遇雷意其有所試也其一在福先寺塔下當時所見墨蹟不知其後何人模刻於石也治平元年三月二十二日書右真蹟唐田𢎞正家廟碑元和八年右田𢎞正家廟碑昌黎先生撰余家所藏書萬卷惟昌黎集是余為進士時所有最為舊物自天聖以來古學漸盛學者多讀韓文而患集本訛舛惟余家本屢更校正時人共傳號為善本及後集錄古文得韓文之刻石者如羅池神黄陵廟碑之類以校集本有余家二字集本舛繆猶多若田𢎞正碑則又尤甚盖由諸本不同往往妄加改易集本有今字以碑校集印本與刻石多同當以為正九字集本作初未必誤多為校讐者妄改之乃知文字之傳久而轉失其真者多矣則校讐之際决於取捨不可不慎也印本云銜訓事嗣朝夕不怠往時用他本改云銜訓嗣事今碑文云銜訓事嗣與印本同知其妄改也印本云以䧏命書用他本改為䧏以命書今碑文云以䧏命書與印本同知為妄改也印本云奉我天明用他本改云奉我王明今碑文云奉我天明與印本同知為妄改也此類甚多略舉三事要知改字當慎也治平元年三月八日書右真蹟唐韓退之南海神廟碑元和十五年右韓退之南海神廟碑陳諫書以余家舊藏集本校之皆同惟集本云蜿蜿蜒蜒而碑為集本作云蜿蜿虵虵小異當以碑為正今世所行昌黎集類多訛舛惟南海碑不舛者以此刻石人家多有故也其妄意集本無此字改易者頗多亦賴刻石為正也治平元年七月二十日書右真蹟唐韓退之羅池廟碑長慶中右羅池廟碑尚書吏部侍郎韓退之撰中書舎人史館修撰沈傳師書碑後題云長慶元年正月建按穆宗實錄長慶二年二月傳師自尚書兵部郎中翰林學士罷為中書舍人史館修撰其九月韓自兵部侍郎遷吏部集本有然則據建碑時韓未為吏部沈亦未為舍人字碑言柳侯死後三年廟成明年韓為柳人書羅池事子厚以元和十四年卒至集本有後三年字韓作碑時當是長慶三年考二君官與此碑亦同但不應在元年正月盖後人傳模者二十三字集本作則二君官當與此碑同其書元年正月盖𫝊模者誤刻之爾今世傳昌黎先生集載此碑文多同惟集本以歩有新船為渉荔子丹兮蕉黄蕉下加子二十五字集本作此文與碑多同惟集本云渉有新船而碑以渉為歩茘子丹兮蕉子黄碑蕉下無子字當以碑為是而碑云春與猿吟而集本作兮秋鶴與飛則疑碑之誤也嘉祐八年六月二日書右真蹟唐韓退之黄陵廟碑長慶元年右韓退之黄陵廟碑沈傳師書昌黎二字集本作韓集今大行於世而患本不真余家所藏最號善本世多取以為正然時時得刻石校之猶不勝其舛繆是知刻石之文可貴也不獨為翫好而已黄陵碑以家本校之不同者二十餘事如家本言䧏小君為夫人而碑云䧏小水之類皆當以碑為正也嘉祐八年十月十八日書右真蹟唐胡良公碑長慶三年右胡良公碑韓退之撰良公者名珦韓之門人張籍妻父也今以碑校余家所藏昌黎集本號為最精者文字猶多不同皆當以碑為正兹不復紀碑云珦子逞迺巡遇述遷造而集本無巡他流俗所傳本集本有又字有云遇或為巡者皆非集本有也字當以碑為正治平九年七月晦日書右真蹟唐韓文公與顛師書嵗月未詳右韓文公與顛師書世所罕傳余以集錄古文其求之既勤且博七字集本只作其求之博盖久而後獲其以易集本無此字繋辭為大傳謂著山林與著城郭無異等語宜為退之之言其後書吏部侍郎潮州刺史則非也盖退之自刑部侍郎貶潮州後移袁州召為國子祭酒遷兵部侍郎久之始遷吏部而流俗相傳但知為韓吏部爾顛師遺記雖云長慶中立盖并韓書皆國初重刻故繆為附益爾治平元年三月十三日書右真蹟唐高閑草書嵗月未詳高閑草書審如此則韓子之言為實錄矣廬陵歐陽修右見綿本别集二十三卷唐武侯碑隂記開成二年右武侯碑隂記崔備撰唐劍南西川節度使武元衡及其将佐題名者二十九人楊嗣復再題及其僚屬又六人并嗣復汝士詩两者合為一卷唐諸方鎮以辟士相高故當時布衣韋帯之士或行著鄉閭或名聞場屋者莫不為方鎮所取至登朝廷位将相為時偉人者亦皆出諸侯之幕如元衡所記裴度柳公綽楊嗣復皆相繼而為本朝名将相亦可謂盛矣哉治平元年初伏休假雨中書右真蹟唐盧頊禱聰明山記永和二年右禱聰明山記盧頊撰乃盧從史禱山神之記也閲從史官屬題名見孔戡與烏重𦙍俱列於後而感集本作覽韓退之記戡事云戡屢諌從史不聼卒為重𦙍所縳掩卷歎息者久之嗚呼禍福成敗之理甚明而先事而言則罕見從事至而言則不及矣自古敗亂之國未始不如此也右真蹟唐侯喜復黄陂記嵗月見本文右復黄陂記唐侯喜撰黄陂在汝州汝州有三十六陂黄陂最大溉田千頃始作於隋記云至貞元辛未刺史盧䖍始復之辛未貞元七年也碑元和三年建喜之文辭嘗為韓退之所稱而世罕傳者余之所得此碑而已右集本又昌黎先生甚稱侯喜其文罕傳於今余之所見止此一篇爾右真蹟唐柳宗元般舟和尚碑元和三年右般舟和尚碑柳宗元撰并書子厚所書碑世頗多有書既非工而字畫多不同疑喜子厚者竊借其名以為重子厚與退之皆以文章知名一時而後世稱為韓柳者盖流俗之相傳也其為道不同猶夷夏也然退之於文章每極稱子厚者豈以其名竝顯於世不欲有所貶毁以避争名之嫌而其為道不同雖不言顧後世當自知歟不然退之以力排釋老為己任於子厚不得無言也治平元年三月二十二日書右真蹟唐南嶽彌陁和尚碑元和五年右南嶽彌陁和尚碑柳宗元撰并書自唐以來言文章者惟韓柳柳豈韓之徒哉真韓門之罪人也盖世俗不知其所學之非第以當時軰流言之爾今余又多錄其文懼益後人之惑也故書以見余意右集本唐元稹修桐栢宫碑大和四年右唐元稹撰文并書其題云修桐栢宫碑又其文以四言為韻語既牽聲韻有述事不能詳者則自為注以觧之為文自注非作者之法且碑者石柱爾古者刻石為碑謂之碑銘碑文之類可也後世伐石刻文既非因柱石不宜謂之碑文然習俗相傳理猶可考今特題云修桐栢宫碑者甚無謂也此在文章誠為小瑕病前人時有忽略然而後之學者不可不知自漢以來墓碑多題云某人之碑者此乃無害盖目此石為某人之墓柱非謂自題其文目也今稹云修桐栢宫碑則於理何稽也右集本唐虞城李令去思頌元和四年右虞城李令去思頌李白撰文王遹篆唐世以書自名者多而小篆之學不集本作十數家自陽冰獨擅後無繼者其前惟有碧落碑而不見名氏遹開元天寳時人在陽冰前而相去不逺集本有亦工八分四字然當時不甚知名雖字畫不為工而一時未有及者所書篆字惟有此爾世亦罕傅余以集本無此字集録求集本無此字之勤且博僅得此爾今世以小篆名家如邵不疑楊南仲章友直問之皆云未嘗見也治平元年二月七日書右真蹟唐陽公舊隐碣元和中右陽公舊隐碣胡証撰黎煟書李靈省篆額唐世篆法自李陽冰後寂然未有顯於當時而能自名家者靈省所書陽公碣筆畫甚可佳既不顯聞於時亦不見於他處以余家所藏之博而見於錄者惟此雖未為絶筆亦可惜哉嗚呼士有負其能而不為人所知者可勝道哉右真蹟唐于夐神道碑元和中右于夐神道碑盧景亮撰其文辭雖不甚雅而書事能不沒其實夐之為人如其所書盖篤於信道者也碑云司馬遷儒之外五家班固儒之外八流其語雖拙盖言其集本作夐學不駁雜也然則非徒貶去釋老而已自儒術之外餘皆不學爾碑又云其弟可封好釋氏夐每非之夐于頔父也然可封之後不大顯而夐之後甚盛以此見釋氏之教信嚮者未必獲福毁貶者未必有禍也碑言夐篤於孝悌守節安貧不可動以勢利其所履如此足以興其後世矣治平元年八月十一日書右真蹟唐昭懿公主碑元和中右昭懿公主碑孟簡撰皇甫鏄書公主代宗女也號昇平公主嫁郭氏公主之號自漢以來始有謂天子之女禮不自主婚集本作壻以公主之因以為名爾後世號某國公主者雖實不以國公為主而名猶不失其義唐世始别擇佳名以加之如昇平之類是也已失其本義矣今此碑乃云諱昇平公主字昇平公主集本無此五字斯莫可曉也治平元年八月八日書右真蹟唐李光進碑元和中右李光進碑楊炎撰韓秀實書唐有两李光進其一光顔之兄其一光弼之兄弟也此碑乃光弼弟也唐史書此两人事多誤新書各為傳以附顔弼遂得其正右集本西墉記元附三十一禹廟碑元第九十七崇徽公主手痕詩元第三百六十八懐素法帖元第九百十六重摹呉季子墓銘元第二百五十一已有本一作自有真本未嘗過呉一作無過呉之理其名傳之久一作其傳也久嘉祐八年五月晦日書一有此九字海濤誌元第九百誌一作志篇内同治平元年七月二十日書一有此十字鹽宗神祠記元第九百六十九故唐一無故字官遂一無官字為然一作利不獨為傳記正訛繆亦可為朝廷决疑議也一作為傳記正訛繆多矣為朝廷决有司疑議獨斯記爾治平元年八月十二日書一有此十字鴈門王田氏神道碑元無卷第李憕碑元第四百六十九而又一作乂两六人一作子孩提一作提孩衆孫此下一有提字升堂之慶一作升堂之愛治平元年三月二十三日書一有此十一字甘棠館題名元第四百二治平元年清明前一日書一有此十字汾陽王廟碑元第九百二十九治平甲辰七月十三日以服藥家居書一有此十五字郭忠武公将佐略元第八百五至八百六謀謨一作謨謀濟瀆廟祭噐銘元第八百所記一作聞神女廟詩元第一百四十三嘉祐八年十一月十四日書一有此十字馬寔墓誌銘元第九十同前鍾山林下集序元第九百八十九而洪一無而字房太尉遺愛碑隂記元第四百三賀蘭夫人墓誌元第三十二陸文學傳元第五百四十七茶之此下一有載字號陸鴻漸此下一有至飲茶客稀則烹茶沃之云可祝利市十五字鴻漸以茶四字上一有盖字考其此下一有自字潮州一作湖州其多如此一無此四字不傳此下一有獨茶經著於世宜其自傳於此名也治平九年七月二十日書二十四字又别本右陸文學傳題云自傳而曰名羽字鴻漸或云名鴻漸字羽未知孰是然則豈其自傳也茶載前史自魏晉以來有之而後世言茶者必本鴻漸盖為茶著書自羽始也至今俚俗賣茶肆中多置一甆偶人云是陸鴻漸至飲茶客稀則以茶沃此偶人祝其利市其以茶自名久矣而此傳載羽所著書頗多云君臣契三卷源解三十卷江表四姓譜十卷南北人物志十卷呉興厯官記三卷湖州刺史記一卷茶經三卷占夣三卷豈止茶經而已也然他書皆不傳獨茶經著於世爾辨正禪師塔院記元第二百六十二徐峴此下一有所字柳筆此下一有法字盤谷詩序元第三百八十九當時一作盖時世㔾一作既㔾治平元年中元日書一有此八字韓退之題名元第四百七十記遇一無記字試也試一作誠田𢎞正家廟碑元第三百七十六尤甚此下一有焉字知其一作為為一作云南海神廟碑元第八百九十二羅池廟碑元第五十七碑言一作云荔子一作枝加子一作葉黄陵廟碑元第四十五餘事二字一作字本言一作云胡良公碑元第七百二十韓文公與顛師書元第三百一十五高閑草書元無卷第草書一無草字武侯碑隂記元第八百七十五禱聰明山記元第五百八十六復黄陂記元無卷第又一作祭樊仲文復黄陂記附元第八百九十五般舟和尚碑元第四百六十二彌陁和尚碑元第一百一十二惟韓一作稱韓今余一無余字其文一作書修桐栢宫碑元第一百一十為碑一作於碑虞城李令去思頌元第三百八陽公舊隠碣元第五百七十三當世一作時于夐神道碑元第九百六十八昭懿公主碑元第九百八義矣一無矣字李光進碑元第七百六十三兄弟一無兄字治平元年夏至日書一有此八字集古錄卷八
