body:
  text: 集古録卷七宋歐陽修撰唐開元金籙齋頌天寶九年衛包書撰右開元金籙齋頌雖不著書人姓氏而字為古文實為包書也唐世華山碑刻為古文者皆包所書包以古文見稱當時甚盛蓋古文世俗罕通徒見其字畫多竒而不知其筆法非工也余以集録所見三代以來古字尤多遂識之爾右集夲唐龍興七祖堂頌天寶十年右龍興寺七祖堂頌陳章甫撰胡霈然書霈然筆法雖未至而媚熟可喜今上黨佛寺畫壁有霈然所書多為流俗取去匣而藏之以為竒玩余數數於人家見之其墨迹尤工非石刻比也右真迹唐明禪師碑天寶十年徐浩書鄭靈之撰秋暑困甚覽之醒然治平丙午孟饗致齋東閣書右真迹唐徐浩玄隱塔銘天寶十一年右玄隱塔銘徐浩撰并書嗚呼物有幸不幸者視其所托與其所遭如何爾詩書遭秦不免煨燼而浮圖老子以託於字畫之善遂見珍藏余於集録屢志此言蓋慮後世以余為惑於邪説者八字集本作之疑余也比見當世知名士方少壯時力排異説及老病畏死則歸心釋老反恨得之晚者往往如此也可勝歎哉右真迹唐顔真卿書東方朔畫贊天寶十三年右東方朔畫贊晉夏侯湛撰唐顔真卿書贊在文選中今較選本二字不同而義無異也選本曰棄俗登仙而此云棄世選本曰神交造化而此云神友右集本唐顔魯公題名歲月見本文右靖居寺題名唐顔真卿題按唐書紀傳真卿當代宗時為檢校刑部尚書為宰相元載所惡坐論祭器不修為誹謗貶硤州員外别駕撫州湖州刺史載誅復為刑部尚書而此題名云永泰二年真卿以罪佐吉州與史不同據真卿湖州放生池碑陰所序云貶硤州旬餘再貶吉州蓋真卿未嘗至硤遂貶吉而史氏但據初貶書於紀傳耳真卿大厯三年始移撫州當遊靖居時猶在吉也右集本同前右魯公題名言五字集本作顔魯公華嶽靖居寺東西二林題名靖居寺在吉州據魯公言永泰二年真卿以罪貶佐吉州據舊一字集本作按唐書列傳云真卿代宗時為刑部尚書為宰相元載所惡貶硤州員外别駕撫州湖州刺史載誅復為刑部尚書不書其貶吉州也按真卿湖州放生池碑陰自敘云貶硤州旬餘再貶吉州蓋真卿未嘗至硤遂貶吉州集本無此四字而史官闕漏但書其初貶爾嘉祐八年十月二十三日書右真迹唐顔真卿麻姑壇記大厯六年右麻姑壇記顔真卿撰并書顔公忠義之節皎如日月其為人尊嚴剛徑象其筆畫而不免惑於神仙之説釋老之為斯民患也深矣右集本唐顔真卿小字麻姑壇記嵗月闕右小字麻姑壇記顔真卿撰并書或疑非魯公書魯公喜書大字余家所藏顔氏碑最多未嘗有小字者惟干祿字書注最為小字而其體法與此記不同蓋干祿之注持重舒和而不局蹙此記遒峻緊結尤為集本無此字精悍此所以或者疑之也余初亦頗以為惑及把玩久之筆畫巨細皆有法愈看愈佳然後知非魯公不能書也故聊志之以釋疑者治平元年二月六日書右真迹唐中興頌大厯六年右大唐中興頌元結撰顔真卿書書字尤竒偉而文辭古雅世多模以黃絹為圖障碑在永州磨崖石而刻之模打既多石亦殘缺今世人所傳字畫完好者多是傳模補足非其真者此本得自故西京留臺御史李建中家蓋四十年前崖石真本也尤為難得爾右集夲又右中興頌世傳顔氏書中興頌多矣然其崖石嵗久剝裂故字多訛缺近時人家所有往往為好事者嫌其剝缺以墨增補之多失其真余此本得自故西臺李建中家蓋四十年前舊本最為真爾右真迹唐干祿字樣大厯元年右干祿字樣别有模本文注完全可備檢用此本刻石殘缺處多直以魯公所書真本而録之爾魯公書刻石者多而絶少小字惟此注最小而筆力精徑可法尤宜愛惜而世俗多傳模本此以殘缺不傳獨余家藏之治平丙午九月二十九日書右集本唐干祿字樣模本嵗月見本文右干祿字樣模本顔真卿書楊漢公模真卿所書乃大厯九年刻石至開成中遽已訛缺漢公以謂一二工人用為衣食之業故摹多而速損者非也蓋公筆法為世楷模而字書辨正訛繆尤為學者所資故當時盛傳於世所以模多爾豈止工人為衣食業邪今世人所傳乃漢公模本而大厯真本以不完遂不復傳若顔公真迹今世在者得其零落之餘藏之足以為寶豈問其完不完也故余并録二本並藏之亦欲俾覽者知模本之多失真也右集本又右顔魯公干祿字書乃大厯元年刻石至開成中遽已訛缺蓋由公筆法為世楷模而字書辨正訛繆尤為學者所資而當時盛傳於世爾漢公謂一二工人用為衣食之業者惜其傳模多而早損然豈止為工人為衣食業也今世人多傳漢公模本而大厯真本以不完遂不復傳若顔公真迹今世在者得其零落之餘藏之尤足為寶豈問其完不完也故余并録二本並藏之亦欲俾覽者知模本之多失真也治平元年正月五日錫慶院賜夀聖節宴歸書右真迹唐歐陽琟碑大厯十年右歐陽琟碑顔真卿撰并書余自皇祐至和以來頗求歐陽氏之遺文以續家譜之闕既得顔魯公歐陽琟碑又得鄭真義歐陽諶墓志以與家所傳舊譜及陳書元和姓纂諸書參較又問於吕學士夏卿夏卿世稱博學精於史傳因為余考正訛舛而家譜遂為定本然獨琟碑所失者四顔公書穆公封山陽郡公吕學士云陳無山陽郡山陽今楚州是也當梁陳時自為南兗州而以連州為陽山郡然則陳書及舊譜皆云穆公封陽山公為是而顔公所失者一也舊譜皆云堅石子質南奔長沙顔公云自景達始南遷其所失者二也歐陽生自前漢以來諸史皆云字和伯而顔公獨云字伯和二字義雖不異然當從衆又顔氏獨異初無所據蓋其繆爾其所失者三也元和姓纂及諶銘皆云胤約之子而顔公獨以為紇子其所失者四也琟之世次不應舛亂如此蓋諶之卒葬在咸亨上元之間去率更未逺真義所志宜得其實琟卒大厯中唐之士族遭天寶之亂失其譜系者多顔公之失當時所傳如此不足怪也治平元年夏至日書銘闕其末數句不補右真迹唐杜濟神道碑大厯十二年右杜濟神道碑顔真卿撰并書藝之至者如庖丁之刀輪扁之斫無不中也顔魯公之書刻於石者多矣而有精有粗雖他人皆莫可及然在其一家自有優劣余意傳模鐫刻之有工拙也而此碑字畫遒徑豈傳刻不失其真者皆若是歟碑已殘缺銓次不能成集本有其字文第録其字法爾嘉祐八年中元假日書右真迹唐杜濟墓志銘大厯十二年右杜濟墓志銘但云顔真卿撰而不云書然其筆法非魯公不能為也蓋世頗以為非顔氏書更俟識者辨之右真迹唐顔真卿射堂記大厯十二年右射堂記顔真卿書魯公在湖州所書刻于石者余家集録多得之惟放生池碑字畫完好如干祿字書之類今已殘闕每為之歎惜若射堂記者最後得之今僕射相公筆法精妙為余稱顔氏書射堂記最佳遂以此本遺余以余家素所藏諸書較之惟張敬因碑與斯記為尤精徑惜其皆殘闕也右集本唐張敬因碑大厯十四年右張敬因碑顔真卿撰并書碑在許州臨潁縣民田中慶厯初有知此碑者稍稍往模之民家患其踐田稼遂擊碎之余在滁陽聞而遣人往求之得其殘闕者為七段矣其文不可次第獨其名氏存焉曰君諱敬因南陽人也乃祖乃父曰澄曰運其字畫尤竒甚可惜也右集本又右魯公之碑世所竒重此尤可珍賞也廬陵歐陽修書右續添唐顔勤禮神道碑大厯十四年右顔勤禮神道碑顔真卿撰并書序顔溫二家之盛云思魯大雅在隋俱仕東宫愍楚彥博同直內史省逰秦彥將皆典祕閣按唐書云溫大雅字彥𢎞弟彥博字大臨弟大有字彥將兄弟義當一體而名大者字彥名彥者字大不應如此蓋唐世諸賢名字可疑者多封德彛云名倫房玄齡云名喬高士亷云名儉顔師古云名籀而皆云以字行倫喬儉籀在唐無所諱不知何避而行字余於中書見顔氏裔孫有獻其家世所藏告身三卷以求官者其一思魯除儀同制其一勤禮除詹事府主簿制其一師古加正議大夫制思魯制云內史令臣瑀宣者蕭瑀也侍郎臣封德彞奉舍人臣彥將行不應內史令書名而侍郎舍人書字又必不稱臣而書字則德彛彥將皆當為名師古制有尚書左僕射梁國公玄齡右僕射申國公士亷又有吏部尚書君集者侯君集也侍郎纂者楊纂也四人並列於後不應二人書名二人書字也則玄齡士亷亦皆當為名矣又師古與令狐德棻同制不應德棻書名而師古書字則師古亦當為名也然余家集録有申文獻公塋兆記是高宗時許敬宗撰云公諱儉字士亷敬宗與士亷同時人而為其家作記必不繆誤則士亷又當為字也然告身書字在理豈安今新唐書雖云房玄齡字喬顔師古字籀以高儉塋兆記為名則喬籀果為字乎又按元和姓纂封氏蓚人隋通州刺史繡生四子曰德潤德輿德如德彞又云德彞更名倫亦不知果是否唐去今未逺事載文字者未甚訛舛殘缺尚可考求而紛亂如此故余嘗謂君子之學有所不知雖聖人猶闕其疑以待來者蓋慎之至也右集本唐顔氏家廟碑建中元年右顔氏家廟碑顔真卿撰并書真卿父名惟真仕至薛王友真卿其第七子也述其祖禰羣從官爵甚詳右集本唐顔魯公書殘碑嵗月闕右顔氏殘碑以家廟碑考之是顔允南碑也家廟碑云允南歷殿中膳部司封郎中司業金鄉男此碑云肅宗入中京遷司封尋封金鄉縣男又云遷國子司業此碑云二子潁熲熲好為五言詩授校書郎早卒家廟碑亦云熲好五言校書而此碑又云與弟允臧同時臺省則為允南可知不疑惟書潁事家廟碑云侍郎蔣冽賞其判此碑云為崔器所賞小不同爾治平元年寒食日書右真迹又余謂顔公書如忠臣烈士道德君子其端嚴尊重人初見而畏之然愈久而愈可愛也其見寶于世者不必多然雖多而不厭也故雖其殘缺不忍棄之右集本唐湖州石記嵗月闕右湖州石記文字殘缺其存者僅可識讀考其所記不可詳也惟其筆畫竒偉非顔魯公不能書也公忠義之節明若日月而堅若金石自可以光後世傳無窮不待其書然後不朽然公所至必有遺迹故今處處有之唐人筆迹見於今者惟公為最多視其巨書深刻或託於山崖其用意未嘗不為無窮計也蓋亦有趣好所樂爾其在湖州所書為世所傳者惟干祿字放生池碑尚多見於人家而干祿字書乃楊漢公摹本其真本以訛缺遂不復傳獨余集録有之惟好古之士知前人用意之深則其堙沉磨滅之餘尤為可惜者也右集本唐顔魯公帖嵗月闕右蔡明逺帖寒食帖附皆顔魯公書魯公後帖流俗多傳謂之寒食帖集本無此十三字其集本有後字印文曰忠孝之家者錢文僖公自號也希聖錢公字也又曰化鶴之系者丁崖相印也潤州觀察使者錢惟濟也右真迹唐顔魯公二十二字帖嵗月闕斯人忠義出於天性故其字畫剛徑獨立不襲前迹挺然竒偉有似其為人右真迹唐顔魯公法帖虞世南帖附嵗月闕右顔真卿書二帖并虞世南一帖合為一卷顔帖為刑部尚書時乞米於李大夫云拙於生事舉家食粥來已數月今又罄乏實用憂煎蓋其貧如此此本墨迹在豫亡友王子野家子野出於相家而清苦甚於寒士嘗模帖刻石以遺朋友故人云魯公為尚書其貧如此吾徒安得不思守約世南書七十八字尤可愛在智永干字文後今附于此右集本唐元次山銘嵗月闕右元次山銘顔真卿撰并書唐自太宗致治之盛幾乎三代之隆而惟文章獨不能革五國二字集本作陳隋之弊既久而集本有其字後韓柳之徒出蓋習俗難變而文章變體集本作之又難也次山當開元天寶時獨作古文其筆力雄健意氣超拔不減韓之徒也十二字集本作雖少雄健而意氣不俗亦可謂特立之士哉右真迹唐吕諲表上元二年右吕諲表元結撰顧誡奢八分書景祐三年余謫夷陵過荆南謁吕公祠堂見此碑立廡下碑無趺石埋地中勢若將踣惜其文翰遂得斯本而入于地處字多缺滅今世傳元子文編亦有此文以碑考之集本首尾不完中間時時小異當以石本為是然石本亦自多亡缺可不惜哉右集本又景祐三年余謫夷陵過荆南謁吕公祠堂見此碑立廡下碑無趺石埋地中勢若將踣惜其文翰遂得斯本而入于地處字多缺滅今世傳元子文編所載首尾不完中間時時小異當以石本為是集録實不為無益矣然石本亦自多亡缺可不惜哉書者顧誡奢也余得此碑三十年矣暇日因偶題之嘉祐八年五月中旬休日書右真迹唐元結窪鐏銘永泰二年右窪鐏銘元結撰瞿令問書次山喜名之士也其所有為惟恐不異於人所以自傳於後世者亦惟恐不竒而無以動人之耳目也視其辭翰可以知矣古之君子誠恥於無聞然不如是集本有人字之汲汲也右真迹唐元結陽華巖銘永泰二年右陽華巖銘元結撰瞿令問書元結好竒之士也其所居山水必自名之惟恐不竒而其文章用意亦然而氣力不足故少遺韻集本無此九字君子之欲著于不朽者有諸其內而見於外者必得於自然顔子蕭然臥於陋巷人莫見其所為而名高萬世所謂得之自然集本有者字也結之汲汲於後世之名亦已勞矣嘉祐八年十二月二十六日書右真迹唐元結峿臺銘大厯二年右斯人之作非好古者不知為可愛也然來者安知無同好也邪右真迹唐張中丞傳嵗月闕右張中丞傳李翰撰嗚呼集本無此二字張巡許逺之事壯矣秉筆之士皆喜為之稱述也然以翰所記考唐書列傳及韓退之所書皆互有得失而列傳最為踈略雖云史家當記大節然其大小數百戰屢敗賊兵其智謀材力亦有過人可以示後者史家皆滅而不著甚可惜也翰之所書誠為太繁然廣記備言所以備史官之采也右真迹唐李陽冰城隍神記乾元二年右城隍神記唐李陽冰撰并書陽冰為縉雲令遭旱禱雨約以七日不雨將焚其祠既而雨遂徙廟于西山陽冰所記云城隍神祀典無之吳越有爾然今非止吳越天下皆有而縣則少也右集本唐李陽冰忘歸臺銘乾元二年右忘歸臺銘唐李陽冰撰并書銘及孔子廟城隍神記三碑並在縉雲其篆刻比陽冰平生所篆最細瘦世言此三石皆活嵗久漸生刻處幾合故細爾然時有數字筆畫特偉徑者乃真迹也右集本唐縉雲孔子廟記上元二年右縉雲孔子廟記李陽冰撰并書孔子廟像之制前史不載開元八年國子司業郭瓘奏云先聖孔宣父以先師顔子配其像為立侍配享宜坐弟子十哲雖得列像而不在祀享之位按祠令何休范寧等二十二賢猶蒙從祀十哲請列享在何休等上於是詔十哲皆為坐像據陽冰記云換夫子之容貌增侍立者九人蓋獨顔回配坐而閔損等九人為立像矣陽冰修廟在肅宗上元二年其不用開元之詔何也右集本唐裴虬怡亭銘永泰元年右怡亭在武昌江水中小島上武昌人謂其地為吳王散花灘亭裴鶠造李陽冰名而篆之裴虬銘李莒八分書刻于島石四十六字集本作怡亭銘李陽冰篆裴虬撰李莒書銘在武昌江水中有小島亭在其上人謂其地為吳王散花灘銘刻于島石常為江水所沒故世亦罕傳鶠集本以鶠字作亭裴公作不知何人虬代宗時集本有為字道州刺史韓愈集本作退之為其子復墓志云虬為諌議大夫有寵代宗朝屢諌諍數命以官多辭不拜然唐史不見其事李莒華弟也治平二年正月十日孟春薦饗攝事致齋中書東閣書右真迹唐李陽冰庶子泉銘大厯六年右庶子泉銘李陽冰撰并書慶厯五年余自河北都轉運使貶滁陽屢至陽冰刻石處未嘗不裴回其下庶子泉昔為流溪今為山僧填為平地起屋于其上問其泉則指一大井示余集本無此二字曰此庶子泉也可不惜哉右真迹唐李陽冰阮客舊居詩嵗月闕右唐李陽冰阮客舊居詩云阮客身何在仙雲洞口橫人間不到處今日此中行阮客者不見其名氏蓋縉雲之隱者也彼以遁俗為高而終以無名於後世可謂獲其志矣然聖人有所不取也陽冰欲稱其人而不顯其名字何哉豈阮客見稱於當時而陽冰不慮於後世邪夫士固有顯聞於一時而泯沒於萬集本作後世者矣顧其道何如集本作如何也陽冰篆字世傳多矣此磨滅而僅存尤可惜也治平元年四月二十有六日書右真迹唐裴公紀德碣銘嵗月見本文右裴公紀德碣銘唐越州刺史王密撰國子監丞集賢院學士李陽冰篆裴公警為明州刺史密代之為作此文其文云皇唐御神器一百四十二年天下大康海隅小冦結亂甌越因言明州當出兵之衝民物殘弊警撫綏有惠愛而人思之爾按唐自戊寅武德元年受命至己亥乾元二年乃一百四十二年是時肅宗新起靈武上皇自蜀初還史思明僣號于河北是嵗洛陽汝鄭等州皆陷于賊不得云天下大康而海隅小冦也考于史傳又不見其事惟台州賊袁朝攻陷浙東州郡乃寶應元年當云一百四十五年又據密代警為明州刺史至大厯十四年移湖州則警密相繼為刺史宜在代宗時然密當時人推次唐年不應有失余友王回深父曰唐自武德至大厯八年實一百五十六年中間除則天稱周十四年則正得一百四十二年是時天下初定文人著辭以為大康理亦可通是嵗廣州哥舒晃作亂海隅小冦豈謂此歟余以謂晃之亂唐命江西路嗣恭討平之不當自明州出兵深父曰然兵家出竒明州海道去廣不逺亦或然也故并著之右集本又右裴公紀德碣王密撰裴公名警代宗時為明州刺史密代之碣文云皇唐御神器一百四十二載天下大康而海隅小冦結亂甌越按唐自武德元年至乾元二年實一百四十二年是時肅宗新起靈武上皇自蜀初還史思明僣號于河北是嵗洛陽汝鄭等州皆陷于賊不得云天下大康而海隅小冦考于史傳又不見其事然密當時人推次唐年不宜有失王回曰大厯八年廣州哥舒晃作亂此所謂海隅小冦者也自武德元年至是嵗實一百五十六年中間則天稱周者十四年去之正得一百四十二年矣豈謂此歟以事考驗理宜如此又不知密意為如何也姑志其語以俟知集本有之字者嘉祐八年十月三十日書右真迹唐玄靜先生碑大厯七年右玄靜先生碑柳識撰張從申書李陽冰篆額唐世工書之士多故以書知名者難自非有以過人者不能也然而張從申以書得名於當時者何也從申每所書碑李陽冰多為之篆額時人必稱為二絶其為世所重如此余以集録古文閲書既多故雖不能書而稍識字法從申所書棄者多矣而時録其一二者以名取之也夫非衆人之所稱任獨見以自信君子於是慎之故特録之必待知者右真迹唐龍興寺四絶碑首大厯八年右四絶碑首者李陽冰篆法慎律師碑額也在揚州龍興寺唐李華文張從申書李陽冰篆額律師者淮南愚俗素信重之謂此碑為四絶碑律師非余所知華文與從申書余亦不甚好故獨録此篆爾右集本唐滑州新驛記大厯九年右新驛記李陽冰篆碑在今滑州驛中其隂有銘曰斯去千載冰生唐時冰今義去後來者誰後千年有人吾不知之後千年無人當盡於斯嗚呼郡人為吾寶之不知作者為誰然賈耽嘗為李騰序説文字源盛稱陽冰此記耽為滑州刺史因見斯記而稱之耳陽冰所書世固多有可愛者不獨斯記也嘉祐八年十二月二十六日書右真迹唐王師乾神道碑大厯十三年右王師乾神道碑張從申書余初不甚以為佳但怪唐人多稱之第録此碑以俟識者前嵗在亳社因與秦玠郎中論書玠學書於李西臺建中而西臺之名重於當世余因問玠西臺學何人書云學張從申也問玠識從申書否云未嘗見也因以此碑示之玠大驚曰西臺未能至也以此知世以鑒書為難者誠然也從申所書碑今絶不行於世惟豫集録有之者吳季子碑隂記崔圓頌德碑并此才三爾熙寧三年十月二十七日書右真迹開元金籙齋頌元第七百二十七姓氏一作名氏治平元年七月三十日一有此九字七祖堂頌元第三十三明禪師碑元第五百二十五玄隱塔銘元第五百九十東方朔畫贊元第五十九畫贊碑隂元第六十顔魯公題名元第一百二麻姑壇記元第四十小字麻姑壇記元第三百唐中興頌元第四十八至五十干祿字樣元第二百三十七干祿字樣模本元第二百三十八歐陽琟碑元第七百七十六至七百七十七杜濟神道碑元第四百五碑已一作以杜濟墓志銘元第三百七十七射堂記元第五百三十為余二字上一有數字諸書一作本治平元年七月二十二日中書東閣書一有此十五字或問余曰何謂六一居士余曰吾家有書一萬卷集古録一十卷棊一局琴一張常置酒一壺問者曰此五一也奈何余曰以吾一翁老於五物之間豈非六一乎治平丙午秋饗攝事齋于東閣書跋後一有此七十五字張敬因碑元第四十二至四十三顔勤禮碑元第三百四十五至三百四十六彥將皆當為名此下一有也字字乎一作否治平元年二月二十八日書一有此十一字顔氏家廟碑元第五十二至五十三顔魯公書殘碑元第三百九十七又棄之一作也湖州石記元第二百七十七後世此下亦有而字不朽此下一有也字亦有一作其治平元年正月二十日書一有此十字顔魯公帖元第一百八十罄乏石本作罄竭顔魯公二十二字帖元無卷第顔魯公并虞世南帖元無卷第元次山銘元第二百四十三呂諲表元第一百五十五窪鐏銘元第三百一十八陽華巖銘元第二百二見於此下一有其字峿臺銘元第一百七十六張中丞傳元第二百八十二至二百八十三最為一無為字城隍神記元第一百三忘歸臺記元附一百四縉雲孔子廟記元第一百四郭瓘一作郭元瓘或作李元瓘案唐志李元瓘為是嘉祐八年十月二十三日一有此十字怡亭銘元第一百一十二庶子泉銘元第七十裴回一作徘徊阮客舊居詩元第五百九十五裴公紀德碣元第一百一十八玄靜先生碑元第五百二十七之必二字作以四絶碑首元第一百七十九覺寂碑首附嘉祐八年夏至日書一有此八字覺寂碑首亦陽冰篆也跋後又有此九字滑州新驛記元第二百一十王師乾碑元第七百五集古録卷七
