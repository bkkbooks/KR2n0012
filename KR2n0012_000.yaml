  text: 欽定四庫全書史部十四
  hash: sha256:1b0fee061afb4650a390a33f011206c9ad39b5a17ebb7b4f5e965df0aa8e4e0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0012_WYG_000-1a, image: WYG0681/WYG0681-0001a.png}
body:
  text: 集古錄目錄類二金石之屬提要臣等謹案集古錄十卷宋歐陽修撰修有詩本義已著録古人法書惟重真蹟自梁元帝始集録碑刻之文為碑英一百二十卷見所撰金樓子是為裒輯金石之祖今其書不傳曽鞏欲作金石録而未就僅製一序存元豐類稿中修始採摭佚逸積至千卷撮其大要各為之説至嘉祐治平間修在政府又各書其卷尾於是文或小異盖隨時有所竄定也修自書其後題嘉祐癸夘至熙寧二年己酉修季子棐復摭其略别為目録上距癸卯盖六年而棐記稱録既成之八年則是録之成當在嘉祐六年辛丑為真蹟跋尾則多係治平初年所書亦間有在熙寧初者知棐之目録固承修之命而為之也諸碑跋今皆具修集中其跋自為書則自宋方崧卿衷聚真蹟刻於廬陵曽宏父石刻鋪叙稱有二百四十六跋陳振孫書録解題稱有三百五十跋修子棐所記則曰二百九十六跋修又自云四百餘篇有跋近日刻集古録者為之説曰世傳集古跋四百餘篇而棐乃謂二百九十六雖是時修尚無恙然續跋不應多逾百篇因疑寫本誤以三百為二百以今考之則通此十卷乃正符四百餘跋之數盖以集本與真蹟合編與専據集本者不同宋時廬陵之刻本今已不傳無從核定不必以棐記為疑矣是書原本但隨得隨錄不復詮次年月故修之自叙曰有卷帙而無時世先後蓋其取多而未巳也近來刻本乃以時代先後為序而於每卷之末附列原本卷帙次第轉有年月倒置更易補正之處故錢曽讀書敏求記以為失其初意然考毛晉跋是書曰自序謂上自周穆王以來則當以吉日癸巳石刻為卷首毛伯敦三銘是作序目後所得宜在卷末即子棐亦未敢妄為詮次盖周益公未能精於考訂云云據此則周必大時之本已按時世為次其由來已久今刻修文集者但序時代不復存每卷末之原次益為疎耳今仍依見行篇次著於録焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀集古録序物常聚於所好而常得於有力之彊有力而不好好之而無力雖近且易有不能致之象犀虎豹蠻夷山海殺人之獸然其齒角皮革可聚而有也玉出崑崙流沙萬里之外經十餘譯乃至乎中國珠出南海常生深淵採者腰絙而入水形色非人往往不出則下飽蛟魚金礦於山鑿深而穴逺篝火餱糧而後進其崖崩窟塞則遂葬於其中者率常數十百人其逺且難而又多死禍常如此然而金玉珠璣世常兼聚而有也凡物好之而有力則無不至也湯盤孔鼎岐陽之鼓岱山鄒嶧㑹稽之刻石與夫漢魏已來聖君賢士桓碑彛器銘詩序記下至古文籀篆分𨽻諸家之字書皆三代以來至寶怪竒偉麗工妙可喜之物其去人不逺其取之無禍然而風霜兵火湮淪磨滅散棄於山崖墟莽之間未嘗収拾者由世之好者少也幸而有好之者又其力或不足故僅得其一二而不能使其聚也夫力莫如好好莫如一予性顓而嗜古凡世人之所貪者皆無欲於其間故得一其所好於斯好之已篤則力雖未足猶能致之故上自周穆王以來下更秦漢隋唐五代外至四海九州名山大澤窮崖絶谷荒林破塚神仙鬼物詭怪所傳莫不皆有以為集古録以謂轉一作傳寫失眞故因其石本軸而藏之有卷帙次第而無時世之先後葢其取多而未巳故隨其所得而録之又以謂聚多而終必散乃撮其大要别為録目因并載夫可與史傳正其闕謬者以傳後學庶益於多聞或譏予曰物多則其勢難聚聚久而無不散何必區區於是哉予對曰足吾所好玩而老焉可也象犀金玉之聚其能果不散乎予固未能以此而易彼也廬陵歐陽修序在昔洛陽與余遊者皆一時豪儁之士也而陳郡謝希深善評文章河南尹師魯辨論精博余每有所作二人者必伸紙疾讀便得余深意以示他人亦或時有所稱皆非余所自得者也宛陵梅聖俞善人君子也與余共處窮約每見余小有可喜事懽然若在諸已自三君之亡余亦老且病矣此叙之作既無謝尹之知音而集録成書恨聖俞之不見也悲夫嘉祐八年歲在癸夘七月二十四日書集古録目記公子棐集古録既成之八年家君命棐曰吾集録前世埋没缺落之文獨取世人無用之物而藏之者豈徒出於嗜好之僻而以為耳目之玩哉其為所得亦已多矣故常序其説而刻之又跋於諸卷之尾者二百九十六篇序所謂可與史傳正其闕謬者已粗備矣若撮其大要别為目録則吾未暇然不可以闕而不備也棐退而悉發千卷之藏而考之曰嗚呼可謂詳矣葢自文武以來迄于五代盛衰得失賢臣義士姦雄賊亂之事可以動人耳目者至於釋氏道家之言莫不皆有然分散零落數千百年而後聚於此則亦可謂難矣其聚之既難則其久也又將遂散而無傳宜公之惜乎此也於是各取其書撰之人事迹之始終所立之時世而著之為一十卷以附於跋尾之後夫事必簡而不煩然後能傳於久逺今此千卷之書者刻之金石託之山崖未常不為無窮之計也然必待集録而後著者豈非以其繁一作多而難於盡傳哉故著其大畧而不道其詳者公之志也熈寧二年二月記右集古録序成於嘉祐末年其云有卷帙次第無時世先後葢取多而未巳故隨其所得而録之此公述千卷不以世代為序之意也又云撮其大要别為録目因載夫可與史傳正其闕謬者以傳後學此公述録目跋尾之意也至熈寧二年公之子叔弼記其後云公命棐曰吾跋諸卷之尾者二百九十六篇若撮其大要别為録目則吾未暇棐乃盡發千卷著其大畧自今觀之公序明言别為録目而棐乃記公未暇之語世傳集古跋十卷四百餘篇而棐乃謂二百九十六篇雖是時公尚無恙後三年方薨然續跋纔十餘耳不應多踰百篇得非寫本誤以三百為二百或棐記在熈寧之前耶棐又云為十卷附跋尾之後今録目自為一書乃二十卷不過列碑石所在及其名氏歲月初無難者何未暇之有是皆可疑姑以棐所記附公本序之後而自周秦至於五季皆隨年代為之序庶幾時世先後秩然不紊間有書撰出於一手其歲月相邇則類而次之又於每卷之末備存當時卷帙之次第既以便今亦不失其初云集古録序經十一作重十葬於一作葬于所貪一作所好予固一作吾固
