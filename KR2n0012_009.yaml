body:
  text: 集古録卷九宋歐陽修撰唐樊宗師絳守居園池記長慶三年右絳守居園池記唐樊宗師撰或云此石宗師自書嗚呼元和之際文章之盛極矣其怪竒至於如此右集本唐張九齡碑長慶三年右張九齡碑按唐書列傳所載大節多同而時時小異傳云夀六十八而碑云六十三傳自左補闕改司勳員外郎而碑云遷禮部傳言集本作云張説卒召為祕書少監集賢院學士知院事碑云副知至後作相遷中書令始云知院事其載張守圭請誅安祿山事集本無此字傳云九齡判守圭狀碑云守圭所請留中不行而公以狀諌然其為語則略同碑長慶中立而公薨在開元二十八年至長慶三年實八十四年所傳或有同異而至於年夀官爵其子孫宜不繆當以碑為是也治平元年二月十日書右真迹唐田布碑長慶四年右田布碑庾承宣撰布之事壯矣承宣不能發於文也蓋其力不足爾布之風烈非得左丘明司馬遷筆不能書也故士有不顧其死以成後世之名者集本有猶字有幸不幸集本有焉字各視其所遭如何爾今有道史漢時事者其人偉然甚著而市兒俚嫗猶能道之自魏晉以下不為無人而其顯赫不及於前者無左丘明司馬遷之筆以起其文也治平甲辰秋社日書右真迹唐沈傳師遊道林嶽麓寺詩長慶中右嶽麓寺詩沈傳師撰并書題云酬唐侍御姚員外而二人之詩不見不知為何人也獨此詩以字畫傳於世而詩亦自佳傳師書非一體此尤放逸可愛也右集本唐崔能神道碑長慶三年右崔能神道碑李宗閔撰能弟從書碑云拜御史中丞持節觀察黔中仍賜紫衣金印按唐世無賜金印者官制古今集本作古今官制沿革不同而其名號尚或相襲自漢以來有銀青金紫之號當時所謂青紫者綬也金銀者乃其所佩印章爾綬所以繫印者也後世官不佩印此名虛設矣隋唐以來有隨身魚而青紫為服色所謂金紫者乃服紫衣而佩金魚爾宗閔謂賜金印者繆也今世自以賜緋銀魚袋賜紫金魚袋結入官銜集本有矣字而集本作今有階至金紫光祿大夫者遂於結銜去賜紫金魚袋皆流俗相承不復討集本作計正久矣故因宗閔之失并記之治平元年七月二十日書右真迹唐李德裕茅山三像記寶厯二年右茅山三像記李德裕撰德裕自號上清玄都大洞三景弟子上為九廟聖主次為七代先靈下為一切含識敬造老君孔子尹真人像三軀此固俚巷庸鄙人之所常為德裕為之有不足怪然以孔子與老君為伍而又居其下此豈止德裕之獨可罪耶今史記載孔子問禮於老􅡭集本作𥅆下同􅡭戒孔子去其驕集本作驕氣多欲而孔子歎其道集本無此字猶龍之語著于集本作於耳目自漢以來學者未有以為非者豈止德裕之罪哉治平元年八月八日書右真迹唐李德裕平泉草木記開成五年已下三篇同是李衛公撰故不與别碑嵗月為敘右平泉草木記李德裕撰余嘗讀鬼谷子書見其馳説諸侯之國必視其為人材性賢愚剛柔緩急而因其好惡喜懼憂樂而捭闔之陽開隂塞變化無窮顧天下諸侯無不在其術中者惟不見其所好者不可得其説也以此知君子宜慎其所好蓋泊然無欲而禍福不能動亦利害不能誘此鬼谷之術所不能為者聖賢之高致也其次簡其所欲不溺於所好斯可矣若德裕者處富貴招權利而好竒貪得之心不已至或疲弊精神於草木斯其所以敗也其遺戒有云壞一草一木者非吾子孫此又近乎愚矣右集本唐李文饒平泉山居詩開成五年讀山居詩見文饒夢寐不忘於平泉而終不得少償其志者人事固多如此也余聞釋子有云出家是大丈夫事蓋勇決者人之所難也而文饒詩亦云自是功高臨盡處禍來名滅不由人者誠哉是言也熙寧壬子正月二十九日書右真迹唐李德裕大孤山賦會昌五年贊皇文辭甚可愛也其所及禍或責其不能自免然古今聰明賢智之士不能免者多矣豈獨斯人也歟右集本唐大孤山賦嵗月未詳右字畫頗佳而傷於柔媚世傳工小篆此豈其筆耶一作也右見綿本拾遺唐辨石鍾山記大和元年右辨石鍾山記并善權寺詩遊靈巖記附覽三子之文皆有幽人之思迹其風尚想見其人至於書畫亦皆可喜蓋自唐以前賢傑之士莫不工於字書其殘篇斷稿為世所寶傳於今者何可勝數彼其事業超然高爽不當留情於此小藝豈其習俗承流家為常事抑學者猶有師法而後世偷薄漸趨苟簡久而遂至於廢絶歟今士大夫務以遠自高忽書為不足學往往僅能執筆而間有以書自名者世亦不甚知為貴也至於荒林敗塜時得埋沒之餘皆前世碌碌無名子然其筆畫有法往往今人不及兹甚可歎也石鍾山記字畫在二者間頗為劣而亦不為俗態皆忘憂之佳玩也右真迹唐法華寺詩大和八年右法華寺詩唐越州刺史李紳撰其後自序題云大和甲寅嵗逰寺刻詩于壁詳自序所言似紳自書然以端州題名較之字體殊不類甲寅大和八年也右集本唐薛蘋唱和詩大和中右薛蘋唱和詩其間馮宿馮定李紳皆唐顯人靈徹以詩名後世皆人所想見者集本有而宿元有詩名六字然詩皆不及蘋豈唱者得於自然和者牽於強作邪右真迹唐僧靈徹詩元和四年右靈徹詩云相逢盡道休官去林下何曽見一人世俗相傳以為俚諺慶厯中天章閣待制許元為江淮發運使因修江岸得斯石於池陽江水中始知為靈徹詩也徹以詩稱於唐故其與相唱和者皆當時知名之士包侍郎者佶也徐廣州者浩也代宗時為嶺南節度使右集本唐李藏用碑大和四年右李藏用碑王源中撰唐玄度書玄度以書自名于一時其筆法柔弱非復前人之體而流俗妄稱借之爾故存之以俟識者右真迹唐玄度十體書嵗月未詳右唐玄度十體書前本得於蘇氏後本得於李丕緒少卿丕緒長安人名家子喜收碑文二家之本大體則同而文有得失故並存之覽者得以自擇焉右集本唐鄭浣隂符經序開成二年右隂符經序鄭浣撰柳公權書唐世碑碣顔柳二家書最多而筆法往往不同雖其意趣或出於臨時而模勒鐫刻亦有工拙集本無此十八字公權書高重碑余特愛模者不失其真而鋒鋩皆在至集本有於字隂符經序則蔡君謨以為柳書之最精者云善藏筆鋒與余之説正相反然君謨書擅當世其論必精故為志之治平元年二月六日書右真迹又已下七篇同是柳誠懸書或撰故不與别碑嵗月為敘余自皇祐中得公權所書隂符經序遂求其經云石已亡矣常意必有藏于人間者求之十餘年莫可得治平三月有鐫工張景儒忽以此遺余家小吏遽録之信乎余所謂物常聚於所好也右真迹唐山南西道驛路記開成四年公權書往往以模刻失其真雖然其體骨終在也右見綿本拾遺唐何進滔德政碑開成五年右何進滔德政碑唐翰林學士承旨兼侍書柳公權撰并書進滔唐書有傳開成五年立其高數丈制度甚閎偉在今河北都轉運使公廨園中右集本唐李聼神道碑開成五年柳公權書右李聼神道碑李石撰聼父子為唐名將其勳業昭彰故以碑考傳少所差異而史家當著其大節其微時所厯官多不書於體宜然惟其自安州刺史遷神武將軍史不宜略而不書者蓋闕也右集本唐李石神道碑會昌三年右李石碑柳公權書余家集録顔柳書尤多惟碑石不完者則其字尤佳非字之然也譬夫金玉埋沒於泥滓時時發見其一二則粲然在目特為可喜爾熙寧三年季夏既望書右真迹唐高重碑會昌四年右高重碑元裕撰柳公權書唐世碑刻顔柳二公書尤多而字體筆畫往往不同雖其意趣或出於臨時而亦繫於模勒之工拙然其大法則常在也此碑字畫鋒力俱完故特為佳矧其墨迹想宜如何也治平元年正月二十五日書右真迹唐康約言碑大中七年右康約言碑柳公權撰并書約言宦者為河東監軍唐自開元以後職官益濫始有置使之名厯五代迄今多因而不廢世徒知今之使額非古官襲唐舊號而不知皆唐宦者之職集本有也字約言在大和開成間嘗為鴻臚禮賔使又為內外客省使以此見今之使名自樞密宣徽而下皆唐宦官職也又以見鴻臚卿寺亦以宦者為使於其間約言又為宣徽北院副使又見當時南北院宣徽皆有副使也治平甲辰秋社前一日書右真迹唐復東林寺碑大中十一年右唐湖州觀察使崔黯撰柳公權書東林寺會昌中廢之大中初黯為江州刺史而復之黯之文辭甚遒麗可愛而世罕有之右集本唐王質神道碑開成四年右王質神道碑唐太子賔客劉禹錫撰并書質字華卿王通之後也開成中為宣歙池等州觀察使右集本唐會昌投龍文會昌五年右會昌投龍文余修唐本紀至武宗以謂奮然除去浮圖鋭矣而躬受道家之籙服藥以求長年以此知其非明智之不惑者特其好惡有所不同爾及得會昌投龍文見其自稱承道繼玄昭明三光弟子南嶽炎上真人則又益以前言為不繆矣蓋其所自稱號者與夫所謂菩薩戒弟子者亦何以異余嘗謂佛言無生老言不死二者同出於貪信矣會昌之政臨事明果有足過人者至其心有所貪則其所為與庸夫何異治平元年五月五日書右真迹唐俞珣書陳果仁告身并捨宅造寺疏大中八年右陳果仁告身并妻軫靜緣捨宅造寺疏附疏後題云明政二年按隋書煬帝本紀大業十一年十月東海賊帥李子通擁衆渡淮僣稱楚王建元明政則明政二年乃大業十二年也唐高祖實録武德二年四月隋禦衛將軍陳稜以江都降即以稜為總管九月李子通敗稜陷江都國號吳建元明政則明政二年是武德三年矣二説不同如此呂夏卿為余言若以大業十二年為子通僣號之二年則江都方亂煬帝安得南幸而唐實録陳稜事可據則明政二年當為武德三年也隋書繆矣果仁終始事迹不顯略見於隋書云唐初為隋太僕丞元祐將煬帝已遇弒沈法興果仁共殺祐起兵據江表法興自稱總管大司馬録尚書事承制置百官以果仁為司徒其事止見此爾開元中僧德宣為果仁記捨宅造寺載其世家頗詳而其功閥官爵嵗月多繆德宣言中毒以死而宅疏言見屠戮當以宅疏為是德宣文辭不足録獨採其世次事迹終始著之俾覽者核其真偽而少益於廣聞煬帝本紀高祖實録皆唐初人所撰而不同如此何哉右集本唐圭峯禪師碑大中九年右圭峯禪師碑唐相裴休撰并書其文辭事迹無足採而其字法世所重也故録之云右集本唐濠州勸民栽桑敕碑大中十年余得劉莒修兗州文宣王廟碑見大中時中書門下牒又得此碑見大中時敕乃知平章事非署敕之官今世止見中書門下牒便呼為敕惟告身之制僅存焉右集本唐閩遷新社記嵗月見本文右閩遷新社記唐濮陽寧撰其辭云大中十年夏六月關西公命遷社于州坤或作城凡築四壇壇社稷其廣倍丈有五尺其高倍尺有五寸主以石壇風師廣丈有五尺高尺有五寸壇雨師廣丈而高尺云文字古雅甚可愛嗚呼唐之禮樂盛矣其遺文有足采焉州縣社稷有主見於此記蓋大中時其禮猶在也按唐書楊發自蘇州刺史為福建觀察使至大中十二年遷嶺南節度以嵗月推之關西公者楊發也右集本又唐時州縣社稷有主獨此碑見之開元定禮至大中時猶僅存也禮樂廢壞久矣故録此記以著之右真迹唐令狐楚登白樓賦咸通二年右登白樓賦令狐楚撰白樓在河中至楚子綯為河中節度使乃刻於石綯父子為唐顯人仍世宰相而楚尤以文章見稱世傳綯為文喜以語簡為工常飯僧僧判齋綯於佛前跪爐諦聼而僧倡言曰令狐綯設齋佛知蓋以此譏其好簡楚之此賦文無他意而至千有六百餘言何其繁也其父子之性相反如此信乎堯朱之善惡異也右集本唐百巖大師懷睴碑嵗月未詳右百巖大師懷睴碑權德輿撰文鄭餘慶書歸登篆額又有别碑令狐楚撰文鄭絪書懷睴者吾不知為何人而彼五君者皆唐世名臣其喜為之傳道如此欲使愚庸之人不信不惑其可得乎民之無知惟上所好惡是從是以君子之所慎者在乎所學楚之文曰大師泥洹茶毗之六年余以門下侍郎平章事攝太尉泥洹茶毗是何等語宰相坐廟堂之上而口為斯言集本有邪字臯夔稷契居堯舜之朝其語言尚書載之矣異乎此也治平元年七月十三日雨中書右真迹唐孔府君神道碑咸通十二年右孔岑父碑鄭絪撰柳知微書其碑云有子五人載戣戡戢戵按新唐書宰相世系表岑父六子戵之下又有威表據孔氏譜譜其家所藏碑文鄭絪撰絪自言與孔氏有世舊作碑文時戣等尚在然則譜與碑文皆不應有失而不同者何也余所集録與史傳不同者多其功過難以碑碣為正者銘志所稱有褒有諱疑其不實至於世系子孫官封名字無情增損故每據碑以正史惟岑父碑文及其家譜二者皆為可據故並存之以俟來者治平元年三月二十二日侍上御崇政疏決繫囚退遂家居謝客因書右真迹唐白敏中碑咸通三年右白敏中碑畢誠撰其事與唐書列傳多同而傳載敏中碑李德裕薦進以獲用及德裕貶詆之甚力以此為甚惡而碑云會昌中德裕起刑獄陷五宰相竄之嶺外公承是之後一年寃者皆復其位以此為能其為毁譽難信蓋如此故余於碑志惟取其世次官夀鄉里為正至於功過善惡未嘗為據者以此也碑又言桑道茂事云桑道慕不知孰是治平元年七月二十日書右真迹唐于僧翰尊勝經咸通五年右尊勝經于僧翰書僧翰筆畫雖遒徑然失分𨽻之法逺矣所以録者亦自成一家而為流俗所貴故聊著集本作述之庶知博采之不遺爾右真迹唐張將軍新廟記龍紀元年右張將軍新廟記李巨川撰唐彥謙書張魯事史傳詳矣巨川文辭匪工所録者彥謙書爾彥謙書頗知名於世故略存其筆迹也右集本唐王重榮德政碑中和四年同是唐彥謙書附此右王重榮德政碑歸仁澤撰唐彥謙書重榮當唐之末再逐其帥遂據河中雖破黃巢平朱玫之叛有功於一時而阻兵召亂為唐患者多矣碑文辭非工而事實無可采所以録者俾世知求名莫如自修善譽不能掩惡也考重榮之碑豈不欲垂美名於千載而其惡終暴於集本作于後世者毁譽善惡不可誣故也彥謙以詩知名而詩鄙俚字畫不甚工皆非余所取也治平元年清明前一日書右真迹唐磻集本作盤溪廟記咸通二年右磻溪廟記張翔撰高駢書駢為將嘗立戰功威惠著於蠻蜀筆研固非其所事然書雖非工字亦不俗蓋其明爽豪俊終異庸人至其惑妖人呂用之諸葛殷等信其左道以冀長年乃騎木鶴而習凌虛仙去之勢此至愚下品皆知為可笑而駢為之惟恐不至者何哉蓋其貪心已動集本作薰於內故邪説可誘於外內貪外誘則其何所集本增有而二字不為哉右真迹唐梁公儒碑天祐中右梁公儒碑于廣撰王説書公儒者世為成德軍將公儒當王鎔時為冀州刺史以卒其碑首題云唐故成德軍內中門樞密使特進檢校太保使持節冀州諸軍事冀州刺史團練守促等使軍器作坊使其餘所領事職甚多皆當時方鎮常事不足書惟樞密使唐之末年內官之職其後方鎮遂亦僣置於此見之軍器作坊五代之際號內諸司使皆朝廷官然不見其始置集本有之字時而今見於此豈方鎮之職朝廷因而用之耶將方鎮之盛亦僣置也公儒事迹無所取特以此録之治平元年五月十八日書右真迹唐花林宴别記嵗月未詳右花林宴别記唐竇常撰花林寺在滁州全椒縣余在滁陽遣推官陳銧以事至縣見寺旁石澗岸土崩出石崖隱隱有字亟命模得之右集本唐陽武復縣記真元十九年唐衢文世罕傳者余家集録千卷唐賢之文十居七八而衢文秪獲此爾然其氣格不俗亦足佳也右真迹唐崔敬嗣碑景龍二年右唐崔敬嗣碑胡皓撰郭謙光書崔氏為唐名族而敬嗣不顯皓為昭文館學士然亦無聞三字集本作觀其事實文辭不足多采而余録之者以謙光書也其字畫筆法不減韓蔡李史四家而名獨不著此余屢以為歎也治平元年七月三十日右真迹唐潤州陀羅尼經幢嵗月未詳右陀羅尼經幢今在潤州寶墨亭中唐雲陽野夫王奐之書字畫頗為世俗所重故録之以備廣採右集本唐夔州都督府記會昌五年余嘗謂唐世人人工書故其名堙沒者不可勝數每與君謨歎息于斯也如具靈該繆師愈今人尚不知其姓名况其書乎余以集録之博僅各得其一爾右見綿本拾遺唐鄭權碑寶厯二年右姚向書筆力精徑雖唐人工於書者多而及此者亦少惜其不傳於世而今人莫有知者惟余以集録之博得此而已熙寧辛亥孟夏清心堂書右見綿本拾遺唐玉蘂詩沈傳師李德裕唱和嵗月未詳惠泉在今荆門軍余貶夷陵道荆門裴回泉上得二子之詩佳其詞翰遂録之逮今蓋三十年矣嘉祐八年十一月二十日書右見綿本拾遺唐人書楊公史傳記嵗月未詳右楊公史傳記文字訛缺原作者之意所以刻之金石者欲為公不朽計也碑無年月不知何時然其字畫之法乃唐人所書爾今才幾時而磨滅若此然則金石果能傳不朽邪楊公之所以不朽者八字集本作楊公者震也其所不朽者果待金石之傳邪凡物有形必有終弊自古聖賢之傳也非皆託於物固能無窮也乃知為善之堅堅於金石也集本無也字嘉祐八年十一月二十日書右真迹唐放生池碑天寶十年右放生池碑不著書撰人名氏放生池唐世處處有之王者仁澤及於草木昆蟲使一物必遂其生而不為私惠也惟天地生萬物所以資於人集本有也字然代天而治物者常為之節使其足用而取之不過故集本作萬物得遂其生而不夭三代之政如斯而已易大傳曰庖犧氏之王也能通神明之德以類萬物之情作結繩而為網罟以佃以漁蓋言其始教民取物資生而為萬世之利此所以為聖人也浮圖氏之説乃謂殺物者有罪而放生者得福苟如其言則庖犧氏遂為集本有人間之聖人五字地下之罪人矣治平元年八月十日書右真迹綘守居園池記元第八十張九齡碑元分作上下卷卷上第三百六徐浩結銜云廣州刺史持節充嶺南節度當云廣州刺史豫章石本卷末有此二十二字卷下第三百七同異一作異同唐田布碑元第八百四十二道林嶽麓詩元第一百一十六崔能神道碑元第八百八十三官不一無官字茅山三像記元第九百九十老君一作子平泉草木記元第五百二十九無窮此下一有故字其利一無其字其次一作然則可矣二字上一有亦字有云一無有字非吾一作其治平元年七月二十四日書中書東廳後閣書一有此十七字又别本右平泉山居草木記李德裕撰余嘗讀鬼谷子書見其馳説諸侯之國常視其人賢愚材性剛柔緩急而因其好惡喜懼憂樂而捭闔之陽開隂閉變化無窮顧天下諸侯無不在其術中者惟不見其所好者不可得而説也以此知君子宜慎其所好泊然無欲而禍福不能動利害不能誘此鬼谷之術所不能為者也是聖賢之所難也平泉山居詩元附五百三十九大孤山賦元第二百一十九辨石鍾山記元第三百二見其此下一有為字以逺此下一有業字前世一作當世治平元年二月六日書一有此九字法華寺詩元第一百七薛蘋唱和詩元第三百一十四其間一無此二字名後世一無後字和者二字上有兩字靈徹詩元第一百八相唱和者四字作逰一郎者一無者字州者一無者字代宗二字上一有浩字李藏用碑元第三百七十唐玄度十體書元第四百八十四文有一作互有嘉祐癸卯七月二十五日書一有此十一字隂符經序元第一百九十九山南西道驛路記元第一百二十七何進滔德政碑元第二十二至二十七李聼神道碑元第七百一十七治平元年七月三十日書一有此十字李石神道碑元第四百一十三高重碑元第二百八十九康約言碑元第八百二十三復東林寺碑元第三百十一王質神道碑元無卷第會昌投龍文元第六百五十七陳果仁告身并捨宅造寺疏元第五百八十七子通為一作乃終始一無此二字沈法興此下一有與字嘉祐八年嵗在癸卯八月十一日書一有此十四字圭峯禪師碑元第六十九濠州勸民栽桑敕碑元第一百七十二又别本一作勸農碑皇祐元年春余自楊移潁舟過濠梁得此碑於今樞密使張公忭唐之制敕之文今不復見蓋官失其職久矣此大中時敕也尚可見其遺制焉閩遷新社記元第五十五登白樓賦元第九百四十五好簡此下一有也字治平元年八月八日祈晴于太社晨歸遂書一有此十七字百巖大師碑元第九百二十八孔府君神道碑元第四百六十三世繫一作系白敏中碑元第六百六十六薦進一作豸進十日此下一有書字于僧翰尊勝經元第三百十三張將軍新廟記元第一百五十四書頗知名書一作詩王重榮碑元第四百十六磻溪廟記元第九百三十五凌虛一作雲治平元年中秋日書一省此字梁公儒碑元第七百三十七花林宴别記元無卷第陽武復縣記元第九百四十九崔敬嗣碑元第七百四十二陀羅尼經幢元無卷第今在一作在今夔州都督府記元第七百一十四堙沒一作埋字于斯一作於斯鄭權碑元第七百六十八玉蘂詩元第一百六十九惠泉詩附一作沈傳師字文鼎蒙泉詩附楊公史傳記元第一百七十年月此下一有日字非皆一作皆不二十此下一有八字放生池碑元第九百五能通一作以通集古録卷九
