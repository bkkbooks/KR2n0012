body:
  text: 集古録卷二宋歐陽修撰後漢堯母碑歲月見本文右漢堯母碑漢建寧五年造其文略曰堯母慶都感赤龍而生堯遂以侯伯恢踐帝下有闕慶都仙沒蓋葬于兹欲人莫知名曰靈臺上立黃屋堯所奉祠三代改易荒廢不修漢受濡期興滅繼絶如堯為之遂遭亡新禮祠絶矣故廷尉姓名磨滅不可讀矣深惟大漢堯之苗胄當修堯祠追逺復舊前後奏上帝納其謀歲以春秋奉大牢祠時濟隂太守魏郡審晃成陽令博陵管遵各遣大掾輔助闕一字君經之營之不日成之此其大槩也按皇覽云堯家在濟隂成陽吕氏春秋云堯葬榖林皇甫謐云榖林即成陽然自史記地志及水經諸書無堯母葬處惟見於此碑蓋亦葬成陽也而諸書俗本多為城陽獨此碑為成陽當以碑為正碑後列當時人名氏又云審晃字元讓管遵字君臺又云漢受濡期莫曉其義也右集本後漢堯祠碑歲月見本文右漢堯祠碑在濟隂碑云帝堯者蓋昔世之聖王也又曰聖漢龍興纂堯之緒祠以上犧至於王莽絶漢之業而壇場夷替屏攝真蹟作欇無位大抵文字磨滅字雖可見而不復成文其後有云李樹連理生於堯祠太守河南張寵到官始初出錢二千敬致禮祠其餘不能一作可讀也碑後有年月蓋熹平四年建也治平元年五月晦日書真蹟後漢堯祠祈雨碑歲月見本文右漢堯祠祈雨碑首尾殘滅其僅可識者有云股肱賢良廣祈多福䖍䖍夙夜又云常以甲子日詔太常陳上古之禮舞先王之樂又云延熹十年仲春二月陽氣侵隂又云享祀羣神仰瞻雲漢又曰嘉㴻優霑利茂萬物又云孟府君知堯精靈與天通神修治大殿以此知為祈雨於堯祠也堯祠在漢濟隂郡孟府君者當是濟隂郡太守也其餘隸字完者頗多亦往往成句但斷續不可次序爾右集本後漢老子銘歲月見本文右漢老子銘按桓帝本紀云延熹八年正月遣中常侍左悺之苦縣祠老子至十一月又遣中常侍管霸祠之而此碑云八月夢見老子而祠之世言碑銘蔡雍作今檢雍集無此文皆不可知也右真蹟後漢魯相置孔子廟卒史碑歲月見本文右漢魯相置孔子廟卒史碑云司徒臣雄司空臣戒稽首言魯前相瑛書言詔書崇聖道孔子作春秋制孝經演易繫辭經緯天地故特立廟褒成侯四時來祠事已即去廟有禮器無常人掌領請置百石卒史一人典主守廟謹問太常祠曹掾馮牟史郭𤣥辭對故事辟雍祠先聖太宰太祝各一人備爵太常丞監祠河南尹給牛羊豕大司農給米臣愚以為如瑛言可許臣雄臣戒愚戇誠惶誠恐頓首頓首死罪死罪臣稽首以聞制曰可按漢書元嘉元年吳雄為司徒二年趙戒為司空即此云臣雄臣戒是也魯相瑛者據碑言姓乙字仲卿漢碑在者多磨滅此幸完可讀録之以見漢制三公奏事如此與羣臣上尚書者小異也又見漢祠孔子其禮如此治平元年六月二十日書右與蹟後漢修孔子廟器碑一作缺歲月見本文表右漢一有朝字韓明府修孔子廟器碑云永壽二年青龍二字一作歲在涒灘霜月之靈皇極之日永壽桓帝年號也按爾雅云歲在申曰涒灘桓帝永興三年正月戊申大赦改元永壽明年一有歲次二字丙申曰歲在涒灘是矣云霜月之靈皇極之日莫曉其義疑是九月五日前漢文章之盛庶幾三代之純深自建武以後頓爾衰薄崔蔡之徒擅名當世然其筆力辭氣非出自然與夫楊馬之言醇醨異味矣及其末也不勝其弊霜月皇極是何等語韓明府者名勑字叔節前世見於史傳未有名勑者豈自余學之不博乎春秋左氏傳載古人命名之說不以為名者頗多故以勑為名者少也治平元年二月晦日書右真蹟後漢魯相晨孔子廟碑歲月見本文右漢魯相上尚書章其略云建寧二年三月癸卯朔七日己酉魯相臣晨長史臣謙頓首死罪上尚書臣晨頓首頓首死罪死罪臣以元年到官行秋饗飲酒泮宫復禮孔子宅而無公出酒脯之祠臣輒依社稷出王家穀春秋行禮建寧靈帝年號也於此見漢制天子之尊其辭稱頓首死罪而不敢斥至尊因尚書以致逹而已余家集録漢碑頗多亦有奏章患其磨滅獨斯碑首尾完備可見當時之制也又云孔子乾坤所挺西狩獲麟為漢制作故孝經援神契曰𤣥丘制命帝卯行又尚書考靈耀曰丘生倉際觸期稽度為赤制䜟緯不經不待論而可知甚矣漢儒之狹陋也孔子作春秋豈區區為漢而已哉治平元年三月二十五日書右真蹟後漢碑隂題名歲月未詳右漢碑隂題名不知為何人碑余家集録古文既多或失其所得之自然漢碑存於今者惟華嶽與孔子廟最多其隂往往列修廟人姓名并記其所出錢數不過三百至五百今斯碑所題文字缺滅而中間有錢各五百四字則似是修廟人所記其人可見者有濟隂定陶蔡皓子盛山陽金鄉張諺季德河南宛陵趙堂世萇南陽南鄉鄧升升逺濟隂成武周鳳季節而其餘人姓名邑里多不完又時時有故吏字不知為何人祠廟第以漢隸難得録之爾治平元年閏五月八日書右真蹟同前右漢碑隂題名不知為何碑之隂蓋余家集録既多而或失其所得之處又其文字磨滅莫可考究惟有錢各五百四字似是漢時修廟人爾漢碑今在者惟華嶽與孔子廟中最多其碑隂題名者往往各書所出錢數不過三百五百也而此碑所列邑里姓名字完可見者尚十餘人然皆是濟隂山陽彭城汝南陳留人則疑為修孔子廟人也今列於後覽者可以察焉濟隂定陶蔡皓子盛濟隂張翔季審陳留酸棗李直顯節山陽金鄉張諺季德河南宛陵趙堂世萇南陽南鄉鄧升升逺濟隂成武周鳳季節山陽昌邑田𦙍元尊濟隂成武史楞世明彭城朱翔元舉右真蹟同前右漢碑隂題名二皆不知為何碑隂其人各記所出錢數似是漢時修廟人題名余家集録華嶽及孔子廟碑多如此此亦疑是二廟中碑前碑殘滅尤甚第時有門生濟南東郡等字而姓名無復完者後碑則有議曹功曹騎吏有蓮勺左鄉有秩池陽左鄉有秩池陽集丞有秩皆不知是何名號又有闕一字陽候長祋祤候長則是縣吏之名其隸字不甚精又無事實可考姑録其名號以俟知者爾右集本後漢張公廟碑歲月見本文真蹟右漢張公廟碑在黎陽而碑無題首又其文字殘滅不可考究莫知為何碑第時時得其字之可識而僅成文者曰惟和平元年正月丙寅和平桓帝年號以此知為漢碑也又曰豐碑廟堂之前又曰於穆張公則又知為張公廟碑矣又云國無災祲屢獲豐年作歌九章頌公德芳其辭有云公與守相駕蜚魚往來倐忽逺熹娛祐此兆民寧厥居其餘字畫尚完者甚多但不成文爾治平元年閏五月九日書是日奏事垂拱退召赴延和閲謝契丹禮物遂歸休後漢公昉碑一作仙人唐君碑歲月未詳右漢公昉碑者乃漢中太守南陽郭芝為公昉修廟記也漢碑今在者類多磨滅而此記文字厪存可讀所謂公昉者初不載其姓名但云君子公昉爾又云耆老相傳以為王莽居攝二年君為郡吏啖瓜旁有真人一有居字左右莫察君獨進美瓜又從而敬禮之真人者遂與期谷口山上乃與君神藥曰服藥以後當移意萬里知鳥獸言語是時府君去家七百餘里休謁往來轉景即至闔郡驚焉白之府君徙為御史一作吏鼠齧被具君乃畫地為獄召鼠誅之視其腹中果有被具府君欲從學道頃無所進府君怒敕尉部吏收公昉妻子公昉呼其師告以厄其師以藥飲公昉妻子曰可去矣妻子戀家不忍去於是乃以藥塗屋柱飲牛馬六畜須臾有大風雲來迎公昉妻子屋宅六畜翛然與之俱去其說如此可以為怪妄矣嗚呼自聖人殁而異端起戰國秦漢以來一作之際竒辭怪說紛然爭出不可勝數久而佛之徒來自西夷老之徒起於中國而二患交攻為吾儒者往往牽而從之其卓然不惑者僅能自守而已欲排其說而黜之常患乎力不足也如公昉之事以語愚人豎子皆知其妄矣不待有力而後能破其惑也然彼漢人乃刻之金石以傳後世其意惟恐後世之不信然後世之人未必不從而惑也治平元年四月二十三日以旱開宫寺祈雨五月中一日休務假書右真蹟後漢析里橋郙閣頌歲月見本文右漢析里橋郙閣頌建寧五年立云惟斯析里處漢之右溪源漂疾橫注於道涉秋霖漉稽滯商旅休謁往還常失日晷行理咨嗟郡縣所苦斯溪既然郙閣尤甚臨深長淵三百餘丈接木相連號為萬柱遭遇隤納人物俱隋一作隳沉沒洪淵酷列為禍於是太守阿陽李君諱㑹字伯都以建寧三年二月辛巳到官思惟惠利有以綏濟聞此為難其日久矣乃俾府掾仇審改解危殆即便求隱析里大橋於爾乃造又醳散關之􅢉漯徙朝陽之平慘減西高閣就安寧之石道禹導江河以靖四海經紀厥績艾康萬里乃作頌曰頌後又有詩皆磨滅不完其云遭遇隤納又云醳散關之􅢉漯徙朝陽之平慘刻畫適完非其訛繆而莫詳其義疑當時人語與今異又疑後人用字簡略假借不同爾故録之以俟博識君子治平元年六月十日書右真蹟後漢人闕銘歲月未詳真蹟右漢人闕銘二其一曰永樂少府賈君闕其一曰雒陽令王君闕二者皆不知為何人按漢書桓帝母孝崇匽皇后居永樂宫和平元年詔置太僕少府如長樂故事又按顔師古注地里志曰魚豢真蹟誤作券云漢火行忌水故去洛水加佳師古謂光武以後始改為雒然則二人者皆後漢時人也又按漢書儀長樂少府以宦者為之則賈君者蓋亦宦者也治平元年九月十五日書後漢文翁石柱記歲月見本文右漢文翁石柱記云漢初平五年倉龍甲戌旻天季月修舊築周公禮殿始自文翁開建泮宫據顔有意益州學館廟堂記云按一無此字華陽國志文翁為蜀郡守造講堂作一無七字石室一名玉堂安帝永初間烈火為災堂及寺舍並皆焚燎惟石室獨存至獻帝興平元年太守高朕於玉堂東復造一石室為周公禮殿有意又謂獻帝無初平五年當是興平四字一作當如華陽志為興平元年蓋時天下喪亂西蜀僻逺年號不通故仍稱舊號也今檢范曄漢書本紀初平五年正月改為興平顔說是也治平元年六月十三日書右真蹟後漢文翁學生題名右漢文翁學生題名凡一百有八人文學祭酒典學從事各一人司儀主事各二人左生七十三人右生三十人文翁在蜀教學之盛為漢稱首其弟子著籍者何止於此蓋其磨滅之餘所存者此爾治平元年六月二十日書右真蹟後漢泰山都尉孔君碑歲月見本文右漢泰山都尉孔君碑云君諱宙字季將二字一作秀特孔子十九世之孫也年六十一延熹四年正月乙未以疾卒一有于家二字其序官閥甚簡又或殘滅不完但見其舉孝廉為郎遷元城令遂為泰山都尉爾其辭有云躬忠恕以及人兼禹湯之罪已宙人臣而引禹湯以為比在今人於文為不類蓋漢世近古簡質猶如此也治平元年閏五月二十一日書右真蹟後漢孔宙碑隂題名右漢孔宙碑隂題名漢世公卿多自教授聚徒常數百人其親授業者為弟子轉相傳授者為門生今宙碑殘缺其姓名邑里僅可見者才六十二人其稱弟子者十人門生者四十三人故吏者八人故民者一人宙孔子十九世孫為泰山都尉自有録治平元年閏五月二十一日書右真蹟後漢孔君碑歲月見本文真蹟右漢孔君碑其名字磨滅不可見而世次官閥粗可考云孔子十九代孫潁川君之元子也舉孝廉除郎中博昌長遭太守君憂服竟拜尚書侍郎治書御史博陵太守遷下邳相河東太守建寧四年十月卒其餘文字歷歷可讀以其斷絶處多文理難續故不復盡録然其終始略可見矣惟其名字皆亡為可惜也治平元年五月十日書後漢孔德讓碑一作碣歲月見本文右漢孔德讓碑蓋其名已磨滅但云字德讓者宣尼公二十世孫都尉君之子也仕歷郡諸曹史年二十永興一年七月遭疾不祿碑在今兗州孔子墓林中永興孝桓帝年號也一有都尉者宙也五字其人二字一作德讓早卒無事蹟可考余集録所藏一有獨闕二字孔林中漢一無此字碑最後得此遂無遺者蓋以其文字簡少無事實故世人遺而不取獨余家有之也治平元年閏五月二十日書右真蹟後漢劉寬碑中平二年右漢太尉車騎將軍特進逯鄉二字一作封昭烈侯劉公碑公諱寬有兩碑皆在洛陽余家集録皆得之其一故吏李謙所一作等立而此碑門生殷包等所一無此字立其所書與李謙等一作碑所載不異惟漢隸難得當録二字一作故録之漢公卿一有卒字故吏門生各自立碑以伸感慕惟見於此今人家碑碣非其子孫則他人不為立也治平元年六月十四日書右真蹟後漢太尉劉寬碑同前右漢太尉劉寬碑漢書有傳其官閥始卒與碑多同而傳載遷官次序頗略蓋史之所記善惡大事官次雖小略不足為失惟其繆誤與闕其大節不可不正碑云大將軍以禮脅命拜侍御史遷梁令三府並用博士徴皆不就司隸校尉舉其有道公車徵拜議郎司徒長史而傳但云大將軍辟五遷司徒長史今據碑止四遷爾博士未嘗拜也碑於長史下遂云入登侍中延熹八年地震有詔詢異而拜尚書遷南陽太守拜太中大夫復拜侍中屯騎尉宗正光祿勳遂授太尉傳至太中大夫始云遷侍中其前自長史入登侍中史闕書也碑又云固疾遜位拜光祿大夫遷衛尉復作太尉而傳云以日食免拜衛尉以日食免當從傳為正而不書光祿大夫史闕也其餘皆同故不復録右集本後漢太尉劉寬碑隂題名歲月見本文右漢太尉劉寬碑隂題名寬碑有二其故吏門生各立其一也此題名在故吏所立之碑隂其别列於後者在寬子松之碑隂也寬以漢中平二年卒至唐咸亨元年其裔孫湖一作胡城公爽以碑歲久皆仆于野為再立之并記其世序嗚呼前世士大夫世家著之譜牒故自中平至咸亨四百餘年而爽能知其世次如此之詳也蓋自黃帝以來子孫分國受姓歷堯舜三代數千歲間詩書所紀皆一有各字有次序豈非譜繫源流傳之百世而一無此字不絶歟此古人所以為重也不然則士生於世皆莫自知其所出而昧其世德逺近其所以異於禽獸者僅能識其父祖爾其可忽哉唐世譜牒尤備士大夫務以世家相高至其弊也或陷輕薄婚姻附託邀求貨賂君子患之然而士子修飭喜自樹立兢兢惟恐墜其世業亦以有譜牒而能知其世也今之譜學亡矣雖名臣巨族未嘗有家譜者然而俗習苟簡廢失者非一豈止家譜而已哉嘉祐八年七月二十九日書右真蹟後漢楊震碑歲月未詳右漢楊震碑首題云漢故太尉楊公神道碑銘文字殘缺首尾不完其可見而僅成文者云聖漢龍興神祗降祉乃生于公又云窮神知變與聖同符鴻漸衡一作于門羣英雲集又云貽我三魚以章懿德又云大將軍辟舉茂材除襄城令遷荆州刺史東萊涿郡太守又云司徒太尉立朝正色恪勤竭忠其餘字存者多而不復成文矣治平元年六月十日書右真蹟後漢楊震碑隂題名右漢楊震碑隂題名者一百九十人其餘磨滅不完者又十餘人余家所録漢碑隂題名頗多或稱故吏門生弟子或稱從事曹掾之類其人皆著州縣邑里名字甚詳獨此碑所書簡略直云河間賈伯錡博陵劉顯祖之類凡百九十人者皆然疑其所書皆是字爾蓋後漢時人見於史傳者未嘗有名兩字者也漢隸世所難得幸而在者多殘滅不完獨此碑刻畫完具而隸法尤精妙甚可喜也治平元年中伏日書真蹟後漢沛相楊君碑歲月見本文真蹟右漢沛相楊君碑在閿鄉楊震墓側碑首尾不完失其名字按後漢書震及中子秉秉子賜賜子彪皆有傳又云震長子牧富波相牧孫竒侍中竒子亮陽城亭侯又云少子奉奉子敷敷子衆蓩亭侯又有彪子修楊氏子孫載於史傳者止此爾不知沛相為何人也碑云孝順皇帝西巡以掾史召見拜郎中遷常山長史換犍為府丞宰司纍辟應于司徒州察茂才遷鮦陽侯相後拜議郎五官中郎將沛相年五十六建寧元年六月癸丑遘疾而卒其終始尚可見而惜其名字亡矣治平元年六月十日書後漢繁陽令楊君碑熹平中右漢繁陽令楊君碑首尾不完文字磨滅可識者四百三十字不可識者六十一字碑云君遭叔父太尉薨委榮輕舉吏民攀轅守關上書運穀萬斛助官賑貧以乞君還又云一作君富波君之子按漢書楊震子牧為富波相君乃牧子也叔父太尉者秉也出米乞令前史所無惜其名字磨滅不可見矣嘉祐八年十月二十三日書右真蹟後漢高陽令楊君碑右漢高陽令楊著碑首尾不完而文字尚可識云司隸從事定潁侯相最後為善侯相善上一字磨滅不可見蓋其中間嘗為高陽令而碑首不書最後官者不詳其義也按楊震碑高陽令著震孫也今碑在震墓側一有也字右真蹟後漢楊君碑隂題名真蹟右漢楊君碑隂題名首尾不完今可見者四十餘人楊震子孫葬閿鄉者數世碑多殘缺此不知為何人碑隂其後有云右後公門生又云右沛二字集本作後史君門生沛君疑是沛相者自有碑而亡其名字矣後公亦不知為何人也治平元年六月十日書同前真蹟右漢楊君碑隂題名凡一百三十一人有稱故吏者故民者處士者故功曹史者故門下佐者類例不一似當時人各隨意書之而文字磨滅僅可讀其姓名字俱完可識者八十三人其餘或在或亡蓋後漢楊震墓域中碑也楊氏墓在閿鄉有碑數廳皆漢世所立余家集録得其四震及沛相繁陽高陽令碑并得碑隂題名然一有嚮字得時參錯不知為何碑之隂也其名氏可見者當時皆無所稱述顧其人亦不足究考第以漢隸真蹟金石所傳者至今類多磨滅可惜故録之爾治平元年三月晦日書後漢碑隂題名右漢碑隂題名在閿鄉楊震墓側文字磨滅不復可考其僅可見者曰候長汾隂趙遺子宣候上滅一字又曰故督郵曹史縣功曹鄉部吏柏昱等人名鄉上又滅一字又曰西鄉亭長柏昱子政又曰鄉亭長翟國相如鄉上又滅一字又曰麟都亭長隂定安定谷口亭長方文雅方上又滅一字東門亭長梁忠子孝四望亭長吳鴻子名麟武亭長常皓君宣其餘缺裂不完蓋楊氏子孫當時皆葬閿鄉碑碣往往磨滅此不知為誰碑也治平五年五月二十日謝雨致齊于太社書右真蹟後漢楊公碑隂題名真蹟右漢楊公碑隂題名楊氏世葬閿鄉墓側皆有碑今其存者四余家集録皆得之乃太尉沛相高陽繁陽令也此碑隂者不知為何人碑文字殘缺其僅存者十五人又滅其一其在者十四人曰懷陵圉令相蔣禧字武仲宜祿長蕭劉瑞字仲祐孝廉杼秋劉旭字子明太官日丞譙曹臻字建國辭曹史鄲公孫銀字山根門下書佐史韓純字子敬豐畢珮字廣世鄲孟縱字河洛決曹書佐鄲公孫暘字元暘皆稱故吏又有故吏一無二字贊陳俊字仲顯蘄夏陽字儀公蘄兒銀字伯玉杼秋劉順字子選沛周儀字帛民凡五人皆不著職一有但稱故吏四字而孟縱字河雒周儀字帛民文字皆完非訛繆而莫曉其義也治平元年六月十四日書後漢殘碑隂歲月未詳右漢殘碑隂前後二字一作亦磨滅不知為何人碑其知為漢碑者蓋其隸字非漢人莫能為也其字僅可見者尚數十而姓名完者九人曰王伯鄉趙仲方賈元周王景陽賈元輔宗石處王仲宣馬安國王通國皆無官號邑里莫知為何人惟漢隸在者少為難得故録之治平元年五月十八日書右真蹟後漢朔方太守碑隂歲月見本文右漢朔方太守碑隂題名一無此字云永壽二年朔方太守上郡仇君察察下滅一字除郎中大曲長大下又滅一字延熹四年九月乙酉詔書遷衙令五年正月到官奉見明府見下又滅一字立祠刋石表章大聖之遺靈永示來世之未一作未未下乂滅一字謹出錢千千下又滅兩字者下行因紀姓名一無七字據此乃當時修廟出錢人爾今其姓名往往可見云衙鄉三老時勤伯秋上官鳳季方録事史楊禹孟布衙主記椽楊綬子長門下功曹裴篤伯安倉曹掾任就子優又有集曹掾軍一作君假司馬之類名字多不完其所出錢不過三百至五百蓋漢世物輕幣重今華嶽孔子廟碑隂所列亦皆如此其所立祠蓋不知為何廟也治平元年夏至日書右真蹟後漢劉曜碑一有并隂二字歲月未詳真蹟右漢劉曜碑在今鄆州界中文字磨滅僅有存者云諱曜字季尼年七十三其餘爵里官閥卒葬歲月皆不可見字為漢隸亦不甚工惟其銘云天臨大漢錫以明哲碑首題云漢故光祿勳東平無鹽劉府君之碑以此知為漢碑也治平元年四月一日書後漢北海相景君銘歲月見本文右漢北海相景君銘其碑首題云漢故益州太守北海相景君銘其餘文字雖往往可讀而漫滅多不成文故君之名世邑里官閥皆不可考一作見其可見者云惟漢安二年北海相任城府君卒城下一字不可識當為景也漢功臣景丹封櫟陽侯傳子尚尚傳子苞苞傳子臨以無嗣絶安帝永初中鄧太后紹封苞弟遽為監亭侯以續丹後自是而後史不復書而他景氏亦無顯者漢安順帝年號也君卒於順帝時蓋與遽同時人也碑銘有云不永麋壽余家集録三代古器銘有云眉壽者皆為麋蓋古字簡少通用至漢猶然也治平元年四月二十九日書右真蹟後漢謁者景君碑右漢景君碑尤磨滅惟謁者任城景君數字尚完其餘班班可見者皆不能成文故其年世壽考功行卒葬莫可考也蓋漢𨽻今尤難得其磨滅之餘可惜爾右集本後漢景君石郭銘右景君石郭銘者余既得前景君碑又得此銘皆在任城不知一景君乎將任城景氏之族多耶文字磨滅不可考故附於此熙寧三年正月朔旦山齊記右真蹟後漢袁良碑歲月見本文右漢袁良碑云君諱良字卿卿上一字磨滅陳國扶樂人也厥先舜苗世為封君周興虞閼父自此而滅又云滿為陳侯至𤣥孫濤塗以字立姓曰袁自此又滅又云當秦之亂隱居河洛高祖破項實從其冊天下既定還宅扶樂蓋不知為何人也又云孝武征和三年曽孫斬賊先勇拜黃門郎曽孫滅其名賊下亦一作又滅一字又曰封關內侯食遺鄉六百户薨子經嗣經薨子山嗣傳國三世至王莽而絶君即山之曽孫也舉孝廉郎中謁者將作大匠丞相令廣陵太守討江賊張路等威震徐方謝病歸家孝順初初下數字滅一作滅數字又云府舉君拜議郎符節令其後又云永建六年二月卒其碑首題云漢故國三老袁君碑而碑文有使者持節安車又有几杖之尊袒割之養君實饗之之語以此知良嘗為三老矣其餘磨滅雖時時可讀而不能次第也又云帝御九龍殿引對飲宴九龍殿名惟見於此治平元年五月二十九日夏至假書右真蹟後漢張平子墓銘永和四年右漢張平子墓銘世傳崔子玉撰并書按范曄漢書張衡傳贊云崔子玉謂衡數術窮天地制作侔造化此銘有之四字一作今銘有此語則真子玉作也其刻石為二本一在南陽一在向城天聖中有右班殿直趙球者知南陽縣事因治縣署毁馬臺得一石有文驗之乃斯銘也遂龕於聽事之壁其文至凡百君子而止其後一有半字亡矣其在向城者今尚書屯田員外郎謝景初得其半於向城之野自凡百君子以上則亡矣三字一作其前半亡矣今以二本相補續其文遂復完而闕其最後四字然則昔人為二本者不為無意矣據徐方回所計二十一字乃趙球所得南陽石之亡者二十一字一作唐寶應中有徐方回者别得二十一字云是銘最後文疑球所得南陽石之半亡者爾今不復見則又亡矣惜哉嘉祐八年歲在癸卯十月十八日書右真蹟堯母碑元第四百六十一堯母一有祠字恢踐帝一有宫字奉祠一作祀讀矣一無矣字諸書此下一有皆字嘉祐元年三月二十九日書一有此十一字堯祠碑元第七百九十一屛懾真碑及公跋皆作屏懾或因國語并左氏傳疑懾為攝非祈雨碑元第九百六十一又云一作云斷續一作絶治平元年六月六日書一有此九字老子銘元第一百六十一置孔子廟卒史碑元第三百九十一辟雍一作雍碑作雍修孔子廟器碑元第三百五十一莫曉莫字上一有者字孔子廟碑元第四百七十一碑隂題名元第八百一斯碑一無碑字世萇一作長同前元第八百二十一又有此下闕一夏字治平元年閏五月九日書一有此十字張公廟碑元第八百六十一災祲一作寇公昉碑元第五百七十一府君一無君字君徙碑作從郙閣頌元第九百八十一府掾碑作衡官掾徙朝碑作從朝經紀碑作記後漢人闕銘元第七百八十一人也一無也字石柱記元第二百二十一文翁學生題名元第六十一都尉孔君碑元第三百八十一宙人臣一作宙為人臣此也一無也字孔宙碑隂題名元第八百六十一孔君碑元第七百一孔德讓碑元第八百五十漢碑最一作碑最多劉寬碑元第二百七十一殷包古碑作苞太尉劉寬碑元第二百六十一漢書二字上一有寬字善惡大事事一作節與闕其大節一無五字舉其有道四字一作舉茂才太尉舉有道而拜一作轉拜屯騎此下一有校字治平元年六月十四日書一有此十字劉寬碑隂題名元第五百二十一楊震碑元第九十一降祉一作祚楊震碑隂題名元第八百七十一沛相楊君碑元第十一長子一無長子右漢楊君碑者其名字皆已磨滅惟其銘云明明楊君其姓尚可見爾其官閥始卒則粗可考云孝順皇帝西巡以掾史召見帝嘉其忠臣之苗器其璵璠之質詔拜郎中遷常山長史換犍為府丞非其好也乃翻然輕舉宰司纍辟應于司徒州察茂才遷鮦陽侯相金城太守南蠻蠢迪王師出征拜車騎將軍從事軍還䇿勳復以疾辭後拜議郎五官中郎將沛相年五十六建寧元年五月癸丑遘疾而卒其終始頗可詳見而獨其名字泯滅為可惜也是故余嘗以謂君子之垂乎不朽者顧其道如何爾不託於事物而傳也顔子窮卧陋巷亦何施於事物耶而名光後世物莫堅於金石蓋有時而敝也治平元年閏五月二十八日書此與前本不同故兩存之繁陽令楊君碑元第一百一高陽令楊君碑元第一百十一楊君碑隂題名元第二十一亦不知為一作不知其為同前元第四百八十六楊君一作氏史者一無者字同前元第七百四十二五年一作元年同前元第一百二十一後漢殘碑隂元附二百二十一惟漢隸在者少為難得故録之一無此十二字朔方太守碑隂元附二百二十一劉曜碑元第五百一哲一作詰景君碑元第六百二十一景君碑元第九百七十一熙寧二年十月朔一作晦日山齊書一有此十一字景君石郭銘元附九百七十一袁良碑元第七百七十一時時一作有時張平子墓銘元第三十一謂衡一作稱衡集古録卷二
