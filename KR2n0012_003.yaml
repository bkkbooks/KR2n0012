  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0012_WYG_003-1a, image: WYG0681/WYG0681-0039a.png}
body:
  text: 集古録卷三宋歐陽修撰後漢費鳳碑歲月見本文右漢費鳳碑云集本冇君諱鳳三字字伯蕭梁相之元子也集本無也字漢安二年舉孝廉拜郎中除陳國新平長又云試守故障長其文班班可見而卒葬年壽皆不載其後悉為五言韻語其略曰不悟集本作語奄忽終藏形而匿景集本作影耕夫釋耒耜桑女投釣筥道阻而且長起坐淚如雨其文既非工故不悉録八字集本作文字工拙古今皆然惟漢隸難得故録爾熙寧二年十一月十六日山齊書右真蹟略曰一作云後漢武班碑歲月見本文右漢班碑者蓋其字畫殘滅不復成文其氏族州里官閥卒葬皆不可見其僅見者曰君諱班爾其首書云建元年太歲在丁亥而建下一字不可識以漢書考之後漢自光武至獻帝以建名元者七謂建武建初建光建康建和建寧建安也以厯推之歲在丁亥乃章帝章和元年後六十一年桓帝即位之明年改本初二年為建和元年又歲在丁亥則此碑所缺一字當為和字真蹟無此六字乃建和元年也碑文缺滅者十八九惟亡者多而存者少尤為可惜也故録之治平元年四月二十日書右集本後得别本模搨粗明始辨其一二云武君諱班乃易去前本熙寧二年九月朔日記後漢中常侍費亭侯曹騰碑歲月見本文真蹟右漢中常侍費亭侯曹騰碑文字磨滅其粗可見者云維建和元年七月二十二日己巳皇帝若曰其遣費亭侯之國其餘不可識也建和桓帝即位之元年也後三十七年獻帝中平元年騰養子操始為騎都尉集本有領兵二字擊黃巾矣治平元年六月十日書後漢司隸楊君碑歲月見本文右漢司隸校尉楊厥碑云惟川靈定位川澤攸同澤有所注川有所通余谷之川其澤南隆八方所達益城為充高祖受命興於漢中道由子午出散入秦建定帝位以漢詆焉後以子午塗路混難更隨圍谷復通堂光凡此四道垓鬲允艱至於未平其有四年詔書開余鑿通石門中遭元二西夷虐殘橋梁斷絶子谷復循於是故司隸校尉犍為武陽楊厥字孟文深執忠伉數上奏請廢子由斯得其度經至建和二年漢中太守王升字稚紀嘉君明知美其仁賢勒石頌德以明厥勳其辭大略如此其刻畫尚完可讀大抵述厥修復斜谷路爾但其用字簡省復多舛繆惟以川為坤以余為斜漢人皆爾獨詆字未詳永平明帝建和桓帝年號也右集本後漢樊常侍碑歲月見本文右漢樊常侍碑云君諱安字子佑南陽湖陽人也君幼學治韓詩論語孝經歷中黃門拜小黃門小黃門右史遷藏府令中常侍年五十有六永壽四年四石本作二月甲辰卒其先為中黃門後為小黃門又為小黃門右史蓋漢官之制今不詳其次序也余少家漢東天聖四年舉進士赴尚書禮部道出湖陽一本作間見此碑立道左下馬讀之徘徊碑下者久之後三十年始得而入集録蓋初不見録于世自余集録古文時人稍稍知為可貴自此古碑漸見收采也右集本後漢郎中鄭固碑固一本作宣歲月見本文右漢郎中鄭固碑文字磨滅其官閥卒葬年月皆莫可考其僅可見者云君諱固字伯堅孝友著于閨門至行立乎鄉黨初授業於歐陽仕郡諸曹掾史主簿督郵五官掾功曹又曰忠以衛上清以自修其餘殘缺不復成文又云延熹元年二月詔拜而不見其官惟其碑首題云漢故郎中鄭君之碑以此知其官至郎中爾漢隸刻石存於今者少惟余以集録之勤所得為獨多然類多殘缺一作滅不完蓋其難得而可喜者其零落之餘尤為可惜也延熹元年二月之下一本云詔拜郎中非其好也以疾銅辭年四十二遭命殞身而中間又有逡遁退讓之語遁當作循錮當作固疑漢人用字多假借又疑以疾錮辭謂疾已堅固若云以疾篤辭覽者誶之右集本後漢田君碑歲月見本文真蹟右漢田君碑今在沂州其名字皆已磨滅惟云其先出自帝舜之苗裔自完適齊因以為氏乃知為姓田爾又云周秦之際家於東平陽君總角修韓詩京氏易真蹟作易京氏究洞神變窮奧極微為五官掾功曹州從事辟太尉延熹二年辛亥詔書泰山琅琊盜賊未息州郡吏有仁惠公清撥煩整化者試守滿歲為真州言名時牧劉君知君宿操表上試守費自此以後殘缺不可次第而隱隱可見蓋無年壽卒葬月日而有故吏薛咸等立石勒銘之語乃費縣令長德政去思碑爾治平元年六月二十九日書後漢孫叔敖碑延熹三年右漢孫叔敖碑云名饒字叔敖而史記不著其名而見於他書者亦皆曰叔敖而已微斯碑後世遂不復知其名饒也此集本無此字碑世亦集本作所罕傳余以集録二十年間求之博且勤乃得之然則世之未見此碑者猶不知為名饒也謂余集古為無益可乎集本無此九字右真蹟後漢王元賞碑歲月見本文右漢王元賞碑云君諱某字元賞御史君之孫茂才君之子也歷秦及漢有國有家宰相牧守踵武相襲又曰遭父喪以孝立稱土階環堵兼業並受門徒雨集盛於洙泗又云郡察孝廉郎中謁者宛陵丞封丘令母憂去官服祥辟司空府延熹四年五月辛酉遭命而終其文字磨滅隱隱可見者如此其名既亡又不序其姓惟其銘云於惟王君以此知其姓王爾右集本後漢祝睦碑歲月見本文真蹟右漢祝睦碑云君諱睦字元其下遂缺滅不能成文惟其官壽年月可見云賓於王庭除北海長史潁川郾令辟司空府北軍中候拜大尚書尚書僕射遷常山相山陽太守年六十有八延熹七年八月丁巳卒睦有二碑皆在今南京虞城縣此碑不見世次而隱隱有云其先高辛爾其後碑則頗完故録於次也治平元年六月立秋日書後漢祝睦後碑延熹七年右漢祝睦後碑其前碑不知所立人名氏兩碑所載官閥壽考年月悉同而此碑有立碑人名氏及睦世次云故吏王堂等竊聞下有述上之功臣有叙君之德又曰君兆自黎辛祝融苗胄鄭有祝􅖫君其𦙍也其餘文字亦完可讀二銘皆以三言為文而後銘尤完云穆我君邦之陽資五就闓道綱綱下滅一字表微凖樞衡稽列宿覽四方德合乾道應皇領二郡曜重光化流洽緄豳昌性天約元用長頌聲作謠令香功烈著遺椒芳存覿榮淪弗忘其後二句磨滅難詳故録其成文以見其雅質亦可佳也治平元年六月立秋日書右真蹟後漢衡方碑歲月見本文真蹟右漢衡方碑云府君諱方字興祖其先伊尹在殷號稱阿衡因而氏焉又曰州舉孝廉除郎中即丘侯相膠東令州舉尤異遷㑹稽東部都尉又拜議郎北平太守遷潁川太守又曰拜步兵校尉年六十有三建寧元年二月五日癸丑卒於是海內門生故吏采嘉石樹靈碑鐫茂伐祕將來此其始終之大略其餘歷歷可見而時亦磨滅以其文多不備録也治平元年六月三日書後漢冀州從事張表碑歲月見本文真蹟右漢冀州從事張表碑云君諱表字元異其碑首題云漢故冀州從事張君碑而文為韻語叙其官閥不甚詳但云春秋六十四以建寧元年三月癸巳蘉疾而終其辭有云仕郡為督郵鷹撮盧擊是以狗喻人集本有也字又有畔桓利正之語蓋漢人猶質不嫌取類於鷹犬畔桓疑是盤桓集本有漢時二字文字簡少假借爾治平元年六月二十九日書後漢竹邑侯相張壽碑歲月見本文右漢竹邑侯相張壽碑云君諱壽字仲吾其先晉大夫張老盛德之裔孝友恭懿明允篤信博物多識獵一作略涉傳記臨疑獨照確然不撓有孔甫之風舉孝廉除郎中給事謁者遷竹邑侯相年八十建寧元年五月辛酉卒其大略可見者如此其餘殘缺或在或亡亦班班可讀爾右集本後漢金鄉守長侯君碑歲月見本文真蹟右漢金鄉守長侯君碑云君諱成字伯盛山陽防東人也其先出自豳岐周文之後封於鄭鄭共仲賜氏曰侯厥𦙍宣多以功佐國漢之興也侯公納䇿濟太上皇於鴻溝之厄諡曰安國君曽孫酺封明統侯光武中興𤣥孫霸為臨淮太守轉拜執法右刺姦五威司命大司徒公封於陵侯枝葉繁茂或家河洧或邑山濟君即上黨太守之弟郡請署主簿督郵五官掾功曹守金鄉長建寧二年四月癸酉卒年八十一碑文首尾皆完故得詳其世次其云上黨太守不見其名按漢書執法左右刺姦五威司命皆王莽官名侯霸列傳云霸莽時為隨令遷執法刺姦而未嘗為五威司命後事光武代伏湛為大司徒封關內侯既薨光武下詔追封則鄉侯而此碑言封於陵侯未知孰是據碑言刺姦司命為光武時官蓋碑文之繆矣治平元年四月二十九日書後漢愼令劉君墓碑建寧四年右漢愼令劉君墓碑在今南京下邑其名已磨滅其字伯麟少罹艱苦身服田畝舉孝廉除郎中辟從事司徒掾遷愼令卒年六十有二其銘曰於惟君德忠孝正直至行通洞高明柔克鬼神福謙受茲介福知命不延引輿旋歸忽然輕舉志激拔葵人皆有亡貴終譽兮殁而不朽垂名著兮余家漢碑常患其銘多缺滅而斯銘偶完故録之右真蹟後漢北軍中候郭君碑歲月見本文右漢北軍中候郭君碑其名字磨滅云元城君第四子也其先蓋周之胄緒枝葉雲布列於州郡自東郡衛國家於河內汲兄竹邑侯相次尚書侍郎次濟北相順弟臨沂長次徐州刺史次中山相次雒陽令君為五官掾功曹司隸中都官從事三辟將軍府舉廉北陽長復辟司徒拜北軍中候年六十有六建寧四年九月丙子卒其於兄竹邑侯相上一字缺滅不完疑是惠字其下又云順弟莫曉其義豈漢人謂兄弟為此語耶故闕其疑以候知者治平元年六月二十九日書右真蹟後漢司隸從事郭君碑歲月見本文右漢司隸從事郭君碑云君諱究汲人也元城君之孫雒陽令之適歷主簿督郵五官掾功曹守令長辟司隸從事部郡都官春秋二十八而卒中平元年歲在甲子三月而葬據北軍中侯碑為元城君子而弟為雒陽令考其世次皆同前世碑碣但書子孫而不及兄弟惟郭氏碑載其兄弟甚詳蓋古人譜牒既完而於碑碣又詳如此可見其以世家為重不若今人之苟簡也治平元年六月二十九日書右真蹟後漢魯峻碑歲月見本文集本右漢魯峻碑云君諱峻字仲嚴山陽昌邑人監營謁者之孫修武令之子治魯詩顔氏春秋舉孝廉除郎中謁者河內太守丞辟司徒司空府舉高第御史東郡頓丘令遷九江太守拜議郎太尉長史御史中丞司隸校尉遭母憂自乞拜議郎服竟還拜屯騎校尉以病遜位熹平元年卒門生于商等二百三十人諡曰忠惠父其餘文字亦粗完故得遷拜次序頗詳以見漢官之制如此惟云遭母憂自乞拜議郎又其最後為屯騎校尉而碑首題云漢故司隸校尉忠惠父魯君碑二者莫曉其義治平元年四月二十三日後漢𤣥儒婁先生碑歲月見本文右漢𤣥儒婁先生碑云先生諱壽字九考南陽隆人也祖太常博士父安貧守賤不可營集本作榮以祿先生童孩多竒岐嶷有志好學不厭不飭小行善與人交久而能敬榮沮溺之偶耕甘山林之杳藹又曰有朋自逺冕紳莘莘講習不倦年七十有八熹平三年二月甲子不祿今光化軍乾德縣圖經載此碑景祐中余自夷陵貶所再遷乾德令按圖求碑而壽有墓在穀城界中余率縣學生親拜其墓見此碑在墓側遂據圖經遷碑還縣立於敕書樓下至今在焉治平元年六月十三日書右真蹟後漢郭先生碑真蹟歲月未詳右漢郭先生碑云諱輔字輔成其先出於王季之中子為文王卿士食采於虢後世謂之郭歷戰國秦漢子孫流分來居荆土先生其少也孝友而悅學其長也寬舒如好施是以宗親歸懷鄉䣊高尚年五十有二遇疾而終其以而為如及用鄉䣊字與婁壽碑同蓋漢人如此爾治平元年六月二十日書又集本右不見書撰人名氏碑在襄州穀城縣界中其辭云先生諱輔字輔成其先出自有周王季之中子為文王卿士食采於虢至於武王錫而封之後世謂之郭春秋之時為晉所并歷戰國秦漢子孫派分來居荆土氏國立姓焉傳云聖賢之後必有達者先生應焉孝友而悅學其長也寬舒如好施是以宗親歸懷鄉䣊高尚年五十有二遇疾而終其文字古質蓋漢之碑也其用鄉䣊字與漢婁壽碑同其曰寬舒如好施蓋以如字為而也春秋書星隕如雨釋者曰如而也然施於文章以如為而始見於此也後漢桂陽太守周府君紀功銘熹平中此君檢漢書無之今碑石缺不見其名惜乎遂不見於世也南人紀其所修瀧水即韓文公所謂昌樂瀧者是也至今以為利祠宇甚嚴云右集本後漢桂陽周府君碑熹平中右漢桂陽周府君碑按韶州圖經云後漢桂陽太守周府君碑按廟在樂昌縣西一百一十八里武溪上武溪驚湍激石流數百里昔馬援南征其門人轅寄生善吹笛援為作歌和之名曰武溪深其辭曰滔滔武溪一何深鳥飛不渡獸不能臨嗟哉武溪何毒淫周使君開此溪下合真水桂陽人便之為立廟刻石又云碑在廟中郭蒼文今碑文磨滅云府君字君光而名已訛缺不可辨圖經但云周使君亦不著其名後漢書又無傳遂不知為何人也按武水源出郴州臨武縣鸕鷀石南流三百里入桂陽而桂陽真水一有梨溪二字盧溪曹溪諸水皆與武水合流其俗謂水湍峻為瀧韓退之詩云南下昌樂瀧即此水也碑首題云神漢者如唐人云聖唐爾蓋當時已為此語而史傳他書無之獨見於此碑也右集本後漢桂陽周府君碑後本熹平中右漢桂陽周府君碑余初得前本恨其名遂磨滅後有國子監直講劉仲章者因出其碑而為余言前為樂昌令因道府君事云名憬問其何以見之云碑刻雖闕尚可識也乃以此碑并隂遺余蓋前本特模者不工爾又余初以韓集云昌樂瀧疑其誤乃改從樂昌仲章曰不然縣名樂昌而瀧名昌樂其舊俗所傳如是韓集不誤也乃知古人傳疑而愼於更改者以此右集本後漢費府君碑歲月未詳集本右漢梁相費府君碑其名字若云諱況字仲慮而況疑為泛慮疑為寬其官閥可見者為蕭令九年沛有蝗獨不入其界國以狀聞朝廷嘉諸拜梁相春秋八十卒其銘頗簡而文字粗完云顯祖厥德懿鑠播勛於前丕碩基業遺愛於民福流於後胙自此磨滅不可識者八字其卒章云功烈休矣來昆戮力而穆字為穆古文多然後漢郎中王君碑光和元年右漢郎中王君碑文字磨滅不復成文而僅有存者其名字官閥卒葬年月皆莫可考惟其碑首題云漢故郎中王君之銘知君為漢人姓王氏而官為郎中爾蓋夫有形之物必有時而弊是以君子之道無弊而其垂世者與天地而無窮顔回高卧於陋巷而名與舜禹同榮是豈有託於物而後傳耶豈有為於事而後著耶故曰久而無弊者道隱而終顯者誠此君子之所貴也若漢王君者託有形之物欲垂無窮之名及其弊也金石何異乎瓦礫治平元年四月晦日書右真蹟後漢太尉陳球碑歲月見本文真蹟右漢太尉陳球碑云君諱球字伯真廣漢太守之元子也又云除郎中尚書符節郎愼陵園令換中東城門候遷繁陽令拜侍御史其後又云拜將作大匠其餘磨滅僅存按後漢書球傳云父亹廣漢太守陽嘉中球舉孝廉稍遷繁陽令太尉揚秉表球零陵太守後纍拜司空光和元年遷太尉坐日食免復拜光祿大夫與司徒劉郃等謀誅宦官曹節等不果下獄死球在零陵破賊胡蘭朱蓋有功威著南邦今碑破蘭蓋事班班可讀與傳皆合惟不著誅宦官事至其卒時文字磨滅不可識惟云六十有二亦與傳合豫所集録古文與史傳多異惟此碑所載與列傳同也治平元年四月晦日書右真蹟後漢敬仲碑歲月見本文右漢敬仲碑者其姓名字皆不可見惟其初有敬仲二字尚可識故以寓其名爾蓋疑其人姓田氏也大抵文字磨滅比其他漢碑尤甚字可識者頗多第不成文爾惟云州郡課最臨登大郡又云居喪致哀又云司隸從事治書侍御史又云光和四年閏月庚申此數句粗可讀爾其餘字畫僅完者以漢隸今為難得録之爾治平元年閏五月二十九日書右真蹟後漢無名碑此與前跋大槩同右漢無名碑文字磨滅其姓氏名字皆不可見其僅可見者云州郡課最臨登大郡又云居喪致哀曽參閔損又曰辟司隸從事拜治書侍御史又曰奮乾剛之嚴威揚哮虎之武節又曰年六十三光和四年閏月庚申遭疾而卒其餘字畫尚完者多但不能成文爾夫好古之士所藏之物未必皆一作能適世之用惟其埋沒零落之餘尤以為可惜此好古之僻也治平元年六月五日書右真蹟後漢槀長蔡君頌碑光和四年真蹟右漢槀長蔡君頌碑在鎮府故天章閣待制楊畋嘗為余言漢時隸書在者此為最佳畋自言平生惟學此字余不甚識隸書因畋言遽遣人之常山求得之遂入于録後漢唐君碑歲月見本文右漢唐君碑其名已磨滅其字正南云集本作云字正南潁川郾人也其先出自慶都感赤龍生堯王有天下苖胄枝分相土視居因氏唐焉君父孝廉郎中早卒君繼厥緒耽道好古敦書味詩守舞陽丞潁陽令察能治劇遷豫章其後遂復磨滅雖文字班班可見而不能得其次序其後又云換君昌陽令吏民慕戀牽君車輪不得行君臣流涕道路琅玕是故從事郡掾刋石樹頌歌君之美據此蓋縣令去思碑爾其後又云光和六年二月壬午朔二十五日丙午則知唐君為後漢時人矣治平元年閏五月二十八日右真蹟後漢朱龜碑歲月見本文右漢朱龜碑云字伯靈察孝廉除郎中尚書侍郎以將事去官于時幽州州下滅一字夷侵寇以君為御史中丞討伐其後磨滅又云鮮卑侵犯障塞復舉君拜幽州刺史年六十四光和六年卒龜之事迹不見史傳其僅見於此碑者如此碑在今亳州界中云將事去官莫曉其語治平元年六月十四日書右真蹟後余守亳州徙碑置州學中後漢小黃門譙君碑歲月見本文右漢小黃門譙君碑云君諱敏字漢達年五十七中平二年卒其文不甚磨滅而官閥無所稱述惟云肅將王命守靜韜光以逺悔咎而已後漢宦者用事靈帝時尤盛敏卒之歲張讓等十二人封侯於斯之時能守靜逺悔是亦可佳然敏以一小黃門而立碑稱頌於此可見宦官之盛也治平元年四月三日書右真蹟後漢熊君碑歲月見本文右漢熊君碑云君諱喬字舉舉上滅一字其官閥不可詳考其僅可知者劉表時為綏民校尉後遷騎都尉建安二十一年卒享年七十有一其云治歐羊尚書其字非訛闕而以陽為羊蓋古文字少故須假借至漢字已備而猶假用何哉後云太歲在申申上滅一字以歷推之當是丙申又云碑師舂陵福造福上滅一字當是其姓其書顯字皆為􅢃按許愼說文顯從㬎聲而轉為纍其失逺矣莫曉其義也右集本後漢俞鄉侯季子碑歲月未詳右漢俞鄉侯季子碑云君諱熊字孟下闕一字廣陵海西人也厥祖天皇大帝垂精接感篤生聖明子孫享之分源而流枝葉扶疏出王别𦙍受爵列土封侯載德君光武皇帝之𤣥廣陵王之孫俞鄉侯之季子也由是而後文字缺滅其稍稍可讀者時得其一二云六籍五典如源如泉既練州郡卷舒委隨化流南城政猶北辰三祀有成來臻我邦仁恩如冬日威猛烈夏日吏民愛若慈父畏如神明其後又云採托謡言作詩三章據碑文無卒葬年月而其辭若此似是德政碑按後漢書光武皇帝子曰廣陵思王荆荆子元壽等四人皆封鄉侯史略而不載其名俞鄉侯者不知為誰也思王荆之第幾子也天皇大帝之語自漢以來有矣右集本後漢武榮碑歲月未詳右漢武榮碑云君諱榮字舍集本作含和治魯詩經韋君章句孝經論語漢書史記左氏國語為州書佐郡曹史集本作文學主簿督郵五官掾功曹年三十六南蔡府君察舉孝廉執金吾丞孝桓大憂屯守𤣥武闕加遇害氣遭疾殞靈其餘文字殘缺不見其卒葬年月又不著氏族所出惟其碑首題云漢故執金吾丞武君之碑云治平元年五月六日書右真蹟後漢秦君碑首歲月見本文漢碑今存者少此篆亦與今文小異勢力徑健可愛蔡君謨題右漢熹平中碑在南陽界中字已摩或作磨非滅不可識獨其碑首字大僅存其筆畫頗竒偉蔡君謨甚愛之此君謨過南都所題乃皇祐三年也今一紀矣嘉祐八年九月十七日書右真蹟又此集本與真蹟頗不同故兩存右漢秦君碑首題云漢故南陽太守秦君之碑秦君不知為何人碑在南陽界中字已磨滅不可識獨其碑首字大僅存其筆畫頗竒偉蔡君謨甚愛之後漢元節碑歲月未詳右漢元節碑文字磨滅不見其氏族其可見者才數十字爾云君集本無此字諱立字元節其先出自伊尹其餘不復成文其銘云於穆從事疑其姓伊而為從事也碑無年月而知為漢人者以其隸體與他漢碑同爾治平元年五月三日書右真蹟後漢殘碑歲月未詳真蹟右漢殘碑不知為何人所存者才三十二字不復成文惟云高字幼知其名高又云漢一有中字興復知為後漢時人而隸字在者甚完體質淳徑非漢人莫能為也故録之後漢天祿辟邪字歲月未詳右漢天祿辟邪四字在宗資墓前石獸膊上按後漢書宗資南陽安衆人也今墓在鄧州南陽界中墓前有二石獸刻其膊上一曰天祿一曰辟邪余自天聖中舉進士往來穰集本作襄鄧間見之道側逮今三十餘年矣其後集録古文思得此字屢求於人不能致尚書職方員外郎謝景初家於鄧為余模得之然字畫集本作或訛缺不若余見時完也按黨錮傳云資祖均自有傳今後漢書有宋均傳云南陽安衆人而無宗均傳疑黨錮傳轉集本無此字寫宗為宋爾蜀志有宗預南陽安衆人豈安衆當漢時有宗宋二族而字與音皆相近遂至訛謬邪史之失傳如此者多矣嘉祐八年臘日書費鳳碑元第九百九十一起坐一作坐起按古碑作望逺武班碑元第五百五十一書云一無云字又歲一作歲又曹騰碑元第一百七十一司隸楊君碑元第六百九十一至六百九十二右漢一有故字攸同一作股躬益城一作域樊常侍碑元第一百四十二右漢至序也九十四字一本無集録一無録字右碑一無此二字嘉祐八年十月十四日書一有此十字鄭固一作宣碑元第五百四十一又曰一作云治平元年四月十二日書一有此十字田君碑元第四百五十一今在一作在今為姓一作其姓孫叔敖碑元第二百八十一王元賞碑元第六百四十一茂才一作材治平元年五月二日書一有此九字祝睦碑元第三百一十一皆在今一作今皆在祝睦後碑元第三百二十一衡方碑元第九百二十一張表碑元第四百一十一漢故真蹟圖去漢字張君此下一有之字張壽碑元第六百七十一治平元年端午日書一有此八字侯君碑元第六百三十一碑文一無文字繆矣一無矣字劉君墓碑元第七百五十一北軍中侯郭君碑元第四百三十一司隸從事郭君碑元第四百四十一魯峻碑元第五百六十一司空一無二字故得此下一有其字婁先生碑元第一百五十一偶一作耦藹一作靄郭先生碑元第五十一碑云此下一有先生字輔成古碑作甫成歷一作婁壽二字上一有漢字二十日一作二十二日周府君紀功銘元第一百八十一周府君碑元第一百八十一碑按一無此二字桂陽一作桂水或作桂陽桂水湍峻一作浚周府君碑後本元附一百八十一因出其碑而一無此五字費府君碑元第七百一十一文字一無此二字於後一無於字磨滅不可識者八字一作八字已滅不可識其卒一無其字多然一作多如此也熙寧二年十一月十六日山齊書一有此十三字王君碑元第六百一陳球碑元第六百一十一敬仲碑元第九百一十一無名碑元第六百八十一又云一作曰蔡君頌碑元第五百八十一為最一作最為唐君碑元第八百八十一朱龜碑元第二百三十一譙君碑元第五百一十一熊君碑元第九百一其云一作其辭有云熙寧二年十月晦日山齊書一有此十一字季子碑元第九百三十一字孟一本此下再有孟字夏日一作炎夏史略一無此二字誰也一無此二字天皇至有矣十二字一本無治平元年六月五日書一有此九字武榮碑元第五百三十一南古碑作汝南秦君碑首元第八十一元節碑元第六百五十一後漢殘碑元第一百三十天祿辟邪字元第七十一集録一無録字集古録卷三
